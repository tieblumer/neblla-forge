<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Neblla Forge</title>
<link rel="icon" type="image/svg+xml" href="/forge/favicon.svg" />
<style>
  :root {
    /* paleta de marca Neblla (tema oscuro de developers.neblla.com) */
    --bg: #08080c;
    --panel: #222228;
    --panel-2: #14151e;
    --border: #1a1b28;
    --text: #e8eaf0;
    --muted: #8089a0;
    --accent: #ff0066;        /* magenta de marca */
    --accent-ink: #ffffff;    /* texto sobre el magenta */
    --secondary: #5b33f6;     /* púrpura de marca */
    --tie: #2a2150;           /* burbuja de Tie: tinte púrpura */
    --other: #14151e;         /* burbuja de los demás: neutra */
    --gate: #c9912e;          /* color cálido de las dos PUERTAS con ajustes */
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  /* Layout: una BARRA DEL CICLO arriba (miga de pan + transporte) ocupando todo
     el ancho, y debajo las tres columnas (ideas · chat · tareas). */
  body {
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text);
    display: grid; grid-template-columns: 280px 1fr 300px; grid-template-rows: auto 1fr;
    height: 100vh; transition: grid-template-columns .18s ease;
  }
  body.left-collapsed                     { grid-template-columns: 44px 1fr 300px; }
  body.right-collapsed                    { grid-template-columns: 280px 1fr 44px; }
  body.left-collapsed.right-collapsed     { grid-template-columns: 44px 1fr 44px; }

  .col { min-height: 0; min-width: 0; height: 100%; display: flex; flex-direction: column; }
  .col-left   { grid-column: 1; grid-row: 2; background: var(--panel); border-right: 1px solid var(--border); overflow-y: auto; overflow-x: hidden; }
  .col-center { grid-column: 2; grid-row: 2; background: var(--bg); }
  .col-right  { grid-column: 3; grid-row: 2; background: var(--panel); border-left: 1px solid var(--border); overflow-y: auto; overflow-x: hidden; }
  /* plegada: solo queda la cabecera con el botón; el resto se esconde */
  body.left-collapsed .col-left .col-head { padding: 14px 0; justify-content: center; }
  body.left-collapsed .col-left .col-head > span,
  body.left-collapsed .col-left .new-btn,
  body.left-collapsed .col-left .chat-list { display: none; }
  body.right-collapsed .col-right .col-head { padding: 14px 0; justify-content: center; }
  body.right-collapsed .col-right .col-head > span,
  body.right-collapsed .col-right .tarea-list { display: none; }

  /* ── BARRA DEL CICLO (F21): un SENDERO que se lee de izquierda a derecha ────
     IZQUIERDA: el objetivo (forge/producto), separado del viaje.
     CENTRO: el carril del viaje — Nuevo ciclo › [fases … Cierre], con
             ◀ Retroceder / Avanzar ▶ como únicos botones; debajo, el modelo.
             "Cierre" es la última fase del recorrido, NO una puerta de salida.
     DERECHA: los mandos que no son el viaje (Pausar). */
  .cycle-bar {
    grid-column: 1 / -1; grid-row: 1;
    display: flex; align-items: center; justify-content: space-between; gap: 14px;
    padding: 8px 16px; background: var(--panel); border-bottom: 1px solid var(--border);
    overflow: visible;
  }
  .bar-left, .bar-right { display: flex; align-items: center; flex: 0 0 auto; }
  /* indicador del uso de la ventana de 5h: etiqueta + barrita + % · tiempo restante */
  .usage-chip { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--muted);
    border: 1px solid var(--border); border-radius: 10px; padding: 3px 9px; margin-right: 8px;
    font-variant-numeric: tabular-nums; white-space: nowrap; cursor: pointer; user-select: none; }
  .usage-chip:hover { border-color: var(--secondary); }
  .usage-chip .uc-lbl { color: var(--secondary); font-weight: 600; }
  .usage-chip .uc-bar { width: 56px; height: 6px; background: var(--panel-2); border-radius: 4px; overflow: hidden; }
  .usage-chip .uc-fill { display: block; height: 100%; width: 0; background: var(--secondary); transition: width .3s; }
  .usage-chip.warn .uc-fill { background: #e0a23a; }
  .usage-chip.danger .uc-fill { background: #ff6b6b; }
  .usage-chip.warn .uc-meta { color: #e0a23a; }
  .usage-chip.danger .uc-meta { color: #ff6b6b; }
  .usage-chip.off { cursor: default; }
  .usage-chip.off:hover { border-color: var(--border); }
  /* lucecita de estado de la forja: verde encendida / ámbar apagándose / gris-rojo desconectada */
  .forge-status { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600;
    border: 1px solid var(--border); border-radius: 10px; padding: 3px 9px; margin-right: 8px;
    white-space: nowrap; user-select: none; font-variant-numeric: tabular-nums; }
  .forge-status.on { color: #3ad07a; border-color: rgba(58,208,122,.4); }
  .forge-status.draining { color: #e0a23a; border-color: rgba(224,162,58,.5); }
  .forge-status.down { color: #ff6b6b; border-color: rgba(255,107,107,.5); }
  /* interruptor de arranque automático (junto a la lucecita de estado) */
  .autostart-toggle { display: inline-flex; align-items: center; gap: 6px; font-size: 11px;
    color: var(--muted); user-select: none; cursor: pointer; margin-right: 8px; white-space: nowrap; }
  .autostart-toggle input { margin: 0; cursor: pointer; }
  .autostart-toggle .autostart-label { font-weight: 600; }
  .autostart-toggle .autostart-hint { color: var(--muted); font-style: italic; opacity: .8; }
  /* modal de uso (desglose de las ventanas) */
  .usage-modal { display: none; position: fixed; inset: 0; z-index: 1200; padding: 24px;
    background: rgba(0,0,0,.7); align-items: center; justify-content: center; }
  .usage-box { background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 12px; box-shadow: 0 8px 40px rgba(0,0,0,.6); width: min(460px, 94vw); padding: 20px 24px; }
  .usage-box h3 { margin: 0 0 14px; font-size: 16px; position: relative; padding-right: 28px; }
  .usage-box .um-x { position: absolute; top: -4px; right: -4px; background: transparent; color: var(--muted);
    border: 1px solid var(--border); border-radius: 8px; cursor: pointer; padding: 2px 9px; }
  .usage-box .um-x:hover { color: var(--accent); border-color: var(--accent); }
  .um-win { margin: 0 0 14px; }
  .um-win-head { display: flex; align-items: baseline; gap: 8px; font-size: 13px; margin-bottom: 5px; }
  .um-win-name { font-weight: 700; color: #fff; }
  .um-win-pct { margin-left: auto; font-variant-numeric: tabular-nums; }
  .um-win-bar { height: 8px; background: var(--panel-2); border-radius: 5px; overflow: hidden; }
  .um-win-fill { display: block; height: 100%; background: var(--secondary); }
  .um-win-fill.warn { background: #e0a23a; }
  .um-win-fill.danger { background: #ff6b6b; }
  .um-win-sub { font-size: 11px; color: var(--muted); margin-top: 4px; font-variant-numeric: tabular-nums; }
  .um-stale { font-size: 11px; color: #e0a23a; margin-top: 8px; }
  /* sección SUBVENCIÓN dentro del modal de uso */
  .um-subsidy { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }
  .um-subsidy h4 { margin: 0 0 8px; font-size: 13px; color: #fff; }
  .um-sub-big { font-size: 22px; font-weight: 700; color: var(--secondary); font-variant-numeric: tabular-nums; }
  .um-sub-big.danger { color: #ff6b6b; }
  .um-sub-row { font-size: 12px; color: var(--muted); margin-top: 6px; font-variant-numeric: tabular-nums; }
  .um-sub-row b { color: var(--text); font-weight: 600; }
  .um-sub-note { font-size: 10.5px; color: var(--muted); font-style: italic; margin-top: 6px; opacity: .85; line-height: 1.4; }
  .um-fee { margin-top: 12px; display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); flex-wrap: wrap; }
  .um-fee input { width: 84px; background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 8px; font: inherit; font-size: 12px; font-variant-numeric: tabular-nums; }
  .um-fee input:focus { outline: none; border-color: var(--accent); }
  .um-sub-mult { font-weight: 700; color: #2ec16a; }
  /* desglose por personaje: % de ventana por mensaje */
  .um-personas { margin-top: 12px; }
  .um-personas-cap { font-size: 12px; color: var(--text); font-weight: 600; margin-bottom: 7px; }
  .um-personas-cap span { color: var(--muted); font-weight: 400; }
  .um-persona { display: grid; grid-template-columns: 64px 1fr auto; align-items: center; gap: 8px; margin: 4px 0; }
  .up-name { font-size: 12px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .up-bar { height: 7px; background: var(--panel-2); border-radius: 4px; overflow: hidden; }
  .up-fill { display: block; height: 100%; background: var(--secondary); }
  .up-meta { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .up-meta b { color: var(--text); font-weight: 600; }
  .bar-left { flex-direction: row; align-items: center; gap: 8px; }
  .bar-center { flex: 1 1 auto; display: flex; flex-direction: column; align-items: center; gap: 5px; min-width: 0; }

  /* IZQUIERDA — chip del objetivo + rama debajo */
  .target-chip {
    font: inherit; font-size: 12px; font-weight: 700; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--panel-2); border: 1px solid var(--secondary); color: var(--text);
    border-radius: 999px; padding: 4px 12px;
  }
  .target-chip.is-project { border-color: #2ec16a; }
  .target-chip.is-project .tc-name { color: #2ec16a; }
  .target-chip.is-forge   .tc-name { color: var(--secondary); }
  .target-chip:hover { filter: brightness(1.12); }
  /* BLOQUEADO: fuera de "Nuevo ciclo" (fase Spike) el objetivo no se puede cambiar. */
  .target-chip:disabled { cursor: not-allowed; opacity: .55; filter: none; }
  .target-chip:disabled:hover { filter: none; }
  .target-branch { font-size: 11px; color: var(--muted); }
  /* en "Nuevo ciclo" la rama es editable (clic). Fuera, solo texto. */
  .target-branch.editable { cursor: pointer; }
  .target-branch.editable:hover { color: var(--text); text-decoration: underline dotted; }

  /* CENTRO — el carril del viaje */
  .rail { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; min-width: 0; }
  .rail-sep { color: var(--border); font-size: 16px; user-select: none; }
  .breadcrumb { display: flex; align-items: center; gap: 2px; flex-wrap: wrap; min-width: 0; }
  .bc-phase {
    font-size: 13px; font-weight: 600; color: var(--muted);
    padding: 3px 10px; border-radius: 7px; border: 1px solid transparent; white-space: nowrap;
  }
  .bc-phase.active {
    color: var(--accent-ink); background: var(--accent); border-color: var(--accent);
    box-shadow: 0 0 14px rgba(255,0,102,.35);
  }
  .bc-sep { color: var(--border); font-size: 14px; padding: 0 2px; user-select: none; }

  /* la PUERTA-parada de entrada ("Nuevo ciclo"): una parada con ajustes dentro.
     Normalizada al MISMO look que las fases de la miga (.bc-phase): texto apagado,
     borde transparente, mismo tamaño/radio. Solo el engranaje la distingue. */
  .gate { position: relative; }
  /* NO ES UN BOTÓN: es una etiqueta de estado, la primera parada del carril. Se
     navega SOLO con la flecha ◀ (igual que las fases). Sin cursor de mano, sin hover. */
  .gate-stop {
    font: inherit; font-size: 13px; font-weight: 600; white-space: nowrap;
    background: transparent; color: var(--muted);
    border: 1px solid transparent; border-radius: 7px; padding: 3px 10px;
    user-select: none;
  }
  .col-center { position: relative; }
  /* "Nuevo ciclo" parado = etiqueta de estado resaltada, con el MISMO rosa-neblla que
     una fase activa (.bc-phase.active) — no el dorado de --gate. */
  .gate-stop.active {
    color: var(--accent-ink); background: var(--accent); border-color: var(--accent);
    box-shadow: 0 0 14px rgba(255,0,102,.35);
  }

  /* pie del carril: el combo de modelos, abajo-derecha pero DENTRO del carril */
  .rail-foot { display: flex; align-items: center; gap: 6px; align-self: flex-end; }
  .rf-lbl { font-size: 11px; color: var(--muted); font-weight: 600; }

  .cycle-bar.offline .rail,
  .cycle-bar.offline .target-chip { opacity: .45; }
  .cycle-paused {
    font-size: 11px; font-weight: 700; color: var(--secondary);
    border: 1px solid var(--secondary); border-radius: 999px; padding: 1px 9px; margin-left: 6px;
  }

  .tp-btn {
    font: inherit; font-size: 12px; font-weight: 700; cursor: pointer;
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    border-radius: 7px; padding: 5px 12px; white-space: nowrap;
  }
  .tp-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .tp-btn:active:not(:disabled) { transform: translateY(1px); }
  .tp-btn:disabled { opacity: .4; cursor: not-allowed; }
  .tp-btn.primary:not(:disabled) { border-color: var(--accent); color: var(--accent); }

  .col-head {
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    font-weight: 600; font-size: 13px; letter-spacing: .02em;
    display: flex; align-items: center; gap: 8px; justify-content: space-between;
    background: inherit; flex: 0 0 auto;
  }
  .cycle-btn {
    font: inherit; font-size: 12px; font-weight: 600; cursor: pointer;
    background: transparent; color: var(--muted); border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 9px;
  }
  .cycle-btn:hover { color: var(--text); border-color: var(--accent); }
  /* selector de modelo (global, junto a las acciones secundarias de la barra). */
  .model-picker {
    font: inherit; font-size: 12px; font-weight: 600; cursor: pointer;
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 6px;
  }
  .model-picker:hover { border-color: var(--accent); }
  .model-picker:focus { outline: none; border-color: var(--accent); }

  .collapse-btn {
    font: inherit; font-size: 14px; line-height: 1; cursor: pointer;
    background: transparent; color: var(--muted); border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 7px; flex: 0 0 auto;
  }
  .collapse-btn:hover { color: var(--text); border-color: var(--accent); }

  .new-btn {
    margin: 12px 16px; padding: 10px 12px; width: calc(100% - 32px);
    background: var(--accent); color: var(--accent-ink); border: 0; border-radius: 8px;
    font-weight: 600; font-size: 14px; cursor: pointer;
  }
  .new-btn:hover { filter: brightness(1.08); }
  .new-btn:active { transform: translateY(1px); }

  /* lista de conversaciones COMPACTA estilo Slack: una línea por chat, solo el título */
  .chat-list { list-style: none; margin: 0; padding: 4px 6px 16px; }
  .chat-item {
    padding: 4px 10px; border-radius: 6px; cursor: pointer; margin-bottom: 0;
    border: 1px solid transparent;
  }
  .chat-item:hover { background: var(--panel-2); }
  .chat-item.active { background: var(--panel-2); border-color: var(--border); }
  .chat-item .row { display: flex; align-items: center; gap: 6px; }
  .chat-item .body { flex: 1 1 auto; min-width: 0; }
  .chat-item .title { font-weight: 400; font-size: 13px; line-height: 1.5;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  /* fila de iconos de estado de las tareas que nacieron de este chat (tarea #020).
     Contenedor inline para convivir con el título truncado sin romper su layout. */
  .chat-item .title .chat-tareas { display: inline-flex; align-items: center; gap: 2px;
    margin-left: 6px; vertical-align: middle; }
  .chat-item .title .ct-ico { font-size: 11px; line-height: 1; }
  .chat-item .title .ct-mas { font-size: 10px; line-height: 1; color: var(--muted); margin-left: 1px; }
  /* botón de borrar (tarea #001): oculto hasta que el ratón pasa por la fila */
  .chat-del {
    flex: 0 0 auto; font: inherit; font-size: 14px; line-height: 1; cursor: pointer;
    background: transparent; color: var(--muted); border: 1px solid transparent;
    border-radius: 6px; padding: 2px 7px; opacity: 0; transition: opacity .12s ease;
  }
  .chat-item:hover .chat-del, .chat-item.active .chat-del { opacity: 1; }
  .chat-del:hover { color: #ff6b6b; border-color: #ff6b6b; }
  .empty { color: var(--muted); padding: 24px 16px; text-align: center; font-size: 13px; }

  /* CENTRO: hilo arriba (scroll), compositor abajo */
  /* el carril central que scrollea: contiene la ficha de la tarea + el hilo, así
     bajan JUNTOS (la ficha no se queda fija ni roba sitio al hilo). */
  /* el carril central recorta en horizontal: un mensaje ancho NO desplaza la sesión;
     el contenido ancho (un bloque de código) scrollea DENTRO de su propio mensaje. */
  .center-scroll { flex: 1 1 auto; min-height: 0; overflow-y: auto; overflow-x: hidden; }
  .thread { padding: 20px 24px; }
  .thread .placeholder { color: var(--muted); padding: 24px 0; }

  /* árbol de mensajes (estilo reddit) */
  .node { margin: 0 0 10px; }
  .who { font-size: 11px; color: var(--muted); margin: 0 2px 3px; display: flex; align-items: center; gap: 6px; }
  .who .who-txt { flex: 1 1 auto; min-width: 0; }
  /* borrar UN mensaje (tarea #018): oculto hasta que el ratón pasa por la fila */
  .msg-del {
    flex: 0 0 auto; font: inherit; font-size: 12px; line-height: 1; cursor: pointer;
    background: transparent; color: var(--muted); border: 1px solid transparent;
    border-radius: 6px; padding: 1px 6px; opacity: 0; transition: opacity .12s ease;
  }
  .node:hover > .who .msg-del, .node.selected > .who .msg-del { opacity: 1; }
  .msg-del:hover { color: #ff6b6b; border-color: #ff6b6b; }
  .bubble {
    padding: 9px 13px; border-radius: 12px; background: var(--other);
    white-space: pre-wrap; word-wrap: break-word; display: inline-block; max-width: 100%;
    cursor: pointer; border: 2px solid transparent;
  }
  .bubble.tie { background: var(--tie); }
  .bubble:hover { border-color: var(--border); }
  /* pantallazo pegado: thumbnail dentro del mensaje + lightbox al clicar */
  .thumb {
    display: block; max-width: 220px; max-height: 160px; margin: 4px 0;
    border-radius: 8px; border: 1px solid var(--border); cursor: zoom-in;
  }
  /* markdown renderizado dentro de una burbuja / ficha (motor mdToFragment) */
  .md-rendered { white-space: normal; }
  .md-rendered > :first-child { margin-top: 0; }
  .md-rendered > :last-child { margin-bottom: 0; }
  .md-rendered p { margin: 6px 0; white-space: pre-wrap; }
  .md-rendered h1, .md-rendered h2, .md-rendered h3,
  .md-rendered h4, .md-rendered h5, .md-rendered h6 { margin: 10px 0 6px; line-height: 1.25; font-weight: 700; }
  .md-rendered h1 { font-size: 1.32em; }
  .md-rendered h2 { font-size: 1.18em; }
  .md-rendered h3 { font-size: 1.07em; }
  .md-rendered h4, .md-rendered h5, .md-rendered h6 { font-size: 1em; }
  .md-rendered ul, .md-rendered ol { margin: 6px 0; padding-left: 22px; }
  .md-rendered li { margin: 2px 0; }
  .md-rendered code { background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 4px; padding: 0 4px; font-size: .92em; font-variant-ligatures: none; }
  .md-rendered pre { background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 10px; overflow-x: auto; max-width: 100%; margin: 8px 0; }
  .md-rendered { overflow-wrap: anywhere; }   /* parte palabras larguísimas (URLs/paths) */
  .md-rendered pre code { background: none; border: none; padding: 0; }
  .md-rendered blockquote { margin: 6px 0; padding-left: 10px; border-left: 3px solid var(--border); color: var(--muted); }
  .md-rendered a { color: var(--accent); text-decoration: underline; }
  .md-rendered hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
  .md-rendered strong { font-weight: 700; }
  .md-rendered em { font-style: italic; }
  .lightbox {
    display: none; position: fixed; inset: 0; z-index: 1000; padding: 24px;
    background: rgba(0,0,0,.82); align-items: center; justify-content: center; cursor: zoom-out;
  }
  .lightbox img { max-width: 95vw; max-height: 95vh; border-radius: 8px; box-shadow: 0 8px 40px rgba(0,0,0,.6); }
  /* chapa de coste $ pegada a la burbuja */
  .cost-chip {
    display: inline-block; margin: 2px 0 0 2px; padding: 1px 7px; font-size: 11px;
    font-variant-numeric: tabular-nums; color: var(--muted); background: var(--panel-2);
    border: 1px solid var(--border); border-radius: 10px; cursor: pointer; user-select: none;
  }
  .cost-chip:hover { color: var(--accent); border-color: var(--accent); }
  /* botón "📸 Resumir" en el mensaje de un build en vivo (resumen a demanda) */
  .resume-chip {
    display: inline-block; margin: 2px 0 0 6px; padding: 1px 9px; font: inherit; font-size: 11px;
    color: var(--secondary); background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 10px; cursor: pointer; user-select: none;
  }
  .resume-chip:hover:not(:disabled) { color: var(--accent); border-color: var(--accent); }
  .resume-chip:disabled { opacity: .55; cursor: progress; }
  /* ticker en vivo del build: cuenta los segundos en el navegador */
  .live-ticker { margin: 3px 0 0 2px; font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .live-ticker.stale { color: #e0a23a; font-weight: 600; }
  /* modal de desglose de coste */
  .cost-modal {
    display: none; position: fixed; inset: 0; z-index: 1100; padding: 24px;
    background: rgba(0,0,0,.82); align-items: center; justify-content: center;
  }
  .cost-box {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 12px; box-shadow: 0 8px 40px rgba(0,0,0,.6); cursor: default;
    width: min(1200px, 94vw); max-height: 90vh; overflow-y: auto; padding: 20px 24px;
  }
  .cost-head { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; position: relative; padding-right: 28px; }
  .cost-total { font-size: 24px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }
  .cost-sub { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .cost-x { position: absolute; top: -4px; right: -4px; background: transparent; color: var(--muted);
    border: 1px solid var(--border); border-radius: 8px; cursor: pointer; padding: 2px 8px; }
  .cost-x:hover { color: var(--accent); border-color: var(--accent); }
  .cost-loading { padding: 24px 0; color: var(--muted); font-size: 13px; }
  .cost-list { margin-top: 14px; display: flex; flex-direction: column; gap: 10px; }
  .cost-req { border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; background: var(--panel-2); }
  .cost-req.warn { border-color: #b58900; }
  .cost-req-head { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 13px; }
  .cost-tag { font-size: 11px; color: var(--muted); border: 1px solid var(--border); border-radius: 6px; padding: 0 6px; }
  .cost-price { margin-left: auto; font-variant-numeric: tabular-nums; color: var(--text); font-weight: 600; }
  .cost-req-toks { margin-top: 5px; font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .cost-input { margin-top: 6px; font-size: 11px; }
  .cost-input summary { cursor: pointer; color: var(--muted); }
  .cost-input pre { white-space: pre-wrap; word-break: break-word;
    margin: 6px 0 0; padding: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-size: 11px; }
  /* 👥 Equipo: pestaña de perfiles a pantalla completa (overlay) */
  .team-modal {
    display: none; position: fixed; inset: 0; z-index: 1150; padding: 16px;
    background: rgba(0,0,0,.78); overflow-y: auto;
  }
  .team-box {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 14px; box-shadow: 0 8px 40px rgba(0,0,0,.6);
    width: 100%; max-width: none; margin: 0 auto; padding: 20px 24px; box-sizing: border-box;
  }
  .team-head { display: flex; align-items: baseline; gap: 12px; position: relative; padding-right: 32px; margin-bottom: 4px; }
  .team-head h2 { font-size: 20px; margin: 0; }
  .team-head .team-sub { font-size: 12px; color: var(--muted); }
  .team-x { position: absolute; top: -6px; right: -6px; background: transparent; color: var(--muted);
    border: 1px solid var(--border); border-radius: 8px; cursor: pointer; padding: 3px 10px; font-size: 14px; }
  .team-x:hover { color: var(--accent); border-color: var(--accent); }
  /* panorámico: rejilla que aprovecha TODO el ancho — tantas columnas como quepan (≥330px). */
  .team-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
    gap: 14px; margin-top: 16px; align-items: start; }
  .team-card { border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; background: var(--panel-2); }
  .team-card .tc-top { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .team-card .tc-name { font-size: 15px; font-weight: 700; }
  .team-card .tc-slug { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .team-card .tc-desc { margin: 10px 0 0; font-size: 13px; color: var(--text); }
  .team-card .tc-desc.md-rendered { line-height: 1.45; }
  /* clic en la descripción / el bloque de permisos = editar (sin botón) */
  .team-card .tc-clickable { cursor: pointer; border-radius: 8px; }
  .team-card .tc-desc.tc-clickable { padding: 8px 10px; margin: 8px -10px 0; transition: background .12s; }
  .team-card .tc-desc.tc-clickable:hover { background: var(--bg); }
  .team-card .tc-edit { width: 100%; box-sizing: border-box; min-height: 240px; resize: vertical;
    font: inherit; font-size: 13px; line-height: 1.45; padding: 10px 12px; margin-top: 10px;
    background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; outline: none; }
  .team-card .tc-edit:focus { border-color: var(--secondary); }
  .team-card .tc-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
  /* secciones apiladas: etiqueta blanca arriba, control debajo (modelo y permisos igual) */
  .team-card .tc-sec { margin-top: 13px; }
  .team-card .tc-sec-lbl { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em;
    color: var(--secondary); margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .team-card .tc-sec-ctl { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .team-card select.tc-model { font: inherit; font-size: 12px; padding: 5px 9px;
    background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 7px; cursor: pointer; }
  .team-card .tc-model-hint { font-size: 11px; color: var(--muted); }
  .team-card .tc-perm { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 9px 11px; }
  .team-card .tc-perm:hover { border-color: var(--secondary); }
  .team-card .tc-perm-line { font-size: 13px; margin: 3px 0; color: var(--text); }
  .team-card .tc-perm-k { font-weight: 700; color: #fff; }
  .team-btn { font: inherit; font-size: 12px; cursor: pointer; padding: 5px 12px; border-radius: 7px;
    background: transparent; color: var(--secondary); border: 1px solid var(--border); }
  .team-btn:hover { border-color: var(--secondary); }
  .team-btn.primary { color: #fff; background: var(--accent); border-color: var(--accent); }
  .team-btn.busy { opacity: .55; cursor: progress; }
  .tc-saved { font-size: 11px; color: #51cf66; opacity: 0; transition: opacity .2s; text-transform: none; letter-spacing: 0; }
  .tc-saved.show { opacity: 1; }
  /* modal de permisos (sub-overlay por encima del de Equipo) */
  .perm-modal { position: fixed; inset: 0; z-index: 1200; padding: 24px;
    background: rgba(0,0,0,.6); display: flex; align-items: center; justify-content: center; overflow-y: auto; }
  .perm-box { background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 12px; box-shadow: 0 8px 40px rgba(0,0,0,.6); width: min(520px, 94vw);
    max-height: 90vh; overflow-y: auto; padding: 18px 22px; }
  .perm-box h3 { margin: 0 0 12px; font-size: 16px; }
  .perm-sec { margin: 0 0 14px; }
  .perm-sec-h { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: #fff; margin-bottom: 6px; }
  .perm-sec-hint { font-weight: 400; text-transform: none; letter-spacing: 0; color: var(--muted); }
  .perm-sec-body { display: flex; flex-wrap: wrap; gap: 6px 16px; }
  .perm-opt { display: inline-flex; align-items: center; gap: 5px; font-size: 13px; cursor: pointer; }
  .perm-opt code { background: var(--panel-2); border: 1px solid var(--border); border-radius: 4px; padding: 0 5px; font-size: 12px; }
  .perm-opt .perm-desc { color: var(--muted); font-size: 12px; }
  .perm-ask { margin: 4px 0 14px; font-size: 13px; }
  .perm-acts { display: flex; gap: 10px; margin-top: 6px; }
  /* F9b: definición FIJA de la tarea, anclada arriba del hilo */
  .tarea-def {
    flex: 0 0 auto; border-bottom: 1px solid var(--border); background: var(--panel);
    padding: 14px 24px;   /* sin max-height/scroll interno: la ficha se ve entera, como un mensaje */
  }
  /* T21: la def es el rey (raíz del hilo en modo tarea) — mismo lenguaje visual que
     .node.selected > .bubble (F22): acento en el borde + halo rosado. */
  .tarea-def.rey {
    border-color: var(--accent); cursor: pointer;
    background: rgba(255,0,102,.10);
    box-shadow: inset 0 0 0 2px var(--accent), 0 0 20px rgba(255,0,102,.22);
  }
  .tarea-def .td-eyebrow { font-size: 11px; color: var(--accent); font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
  /* link origen: "↰ viene de …" — la cabecera con la que empieza la tarea */
  .tarea-def .td-origen { font-size: 12px; margin-bottom: 6px; }
  .tarea-def .td-origen a { color: var(--muted); cursor: pointer; border-bottom: 1px dotted var(--muted); }
  .tarea-def .td-origen a:hover { color: var(--accent); border-bottom-color: var(--accent); }
  /* mensaje-stub de tarea aprobada: el plan salió, esto es un LINK a la tarea */
  .bubble.tarea-link-msg { cursor: pointer; border: 1px dashed var(--accent);
    color: var(--accent); font-weight: 600; background: rgba(255,0,102,.06); }
  .bubble.tarea-link-msg:hover { background: rgba(255,0,102,.12); }
  /* PREGUNTA de un agente esperando respuesta */
  .bubble.pregunta { border-left: 3px solid #e0a23a; }
  .bubble.pregunta-pendiente { background: rgba(224,162,58,.10); border-color: #e0a23a; }
  .answer-box { margin: 6px 0 0 12px; display: flex; flex-direction: column; gap: 6px; max-width: 70%; }
  .answer-input {
    width: 100%; background: var(--bg); color: var(--text); border: 1px solid #e0a23a;
    border-radius: 8px; padding: 8px 10px; font: inherit; outline: none; min-height: 54px; resize: vertical;
  }
  .answer-box .td-btn { align-self: flex-start; }
  /* aviso global de preguntas esperando (arriba del hilo) */
  .pregunta-banner {
    background: rgba(224,162,58,.16); border: 1px solid #e0a23a; color: var(--text);
    border-radius: 8px; padding: 8px 12px; margin: 0 0 12px; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .tarea-def h2 { margin: 4px 0 6px; font-size: 16px; }
  /* tarea sin plan todavía: cartel claro en vez de complejidad/estructura falsas */
  .tarea-def .td-sinplan {
    margin: 12px 0 0; padding: 10px 12px; border: 1px dashed var(--border);
    border-radius: 8px; color: var(--muted); font-size: 13px;
  }
  .tarea-def .td-body { white-space: pre-wrap; color: var(--text); font-size: 13px; }
  .td-acts { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .td-btn {
    font: inherit; font-size: 12px; font-weight: 600; cursor: pointer;
    border: 1px solid var(--border); background: var(--panel-2); color: var(--text); border-radius: 7px; padding: 4px 12px;
  }
  .td-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .td-btn:disabled { opacity: .5; cursor: not-allowed; }
  /* el PASO NATURAL que toca: resaltado en rosa (magenta de marca) */
  .td-btn.td-next { background: var(--accent); color: #fff; border-color: var(--accent); }
  .td-btn.td-next:hover:not(:disabled) { filter: brightness(1.08); color: #fff; }
  /* barra FIJA de acciones de la tarea: vive en el composer, encima del input, y
     NO se va con el scroll del hilo. Crece hacia arriba si hay muchos botones. */
  .tarea-acts-bar { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .tarea-acts-bar .td-acts { margin-top: 0; }
  /* EL paso siguiente: un botón ancho, rosa, imposible de no ver. */
  .nextstep-bar { margin-bottom: 10px; }
  .nextstep-btn {
    width: 100%; font: inherit; font-size: 13px; font-weight: 700; cursor: pointer;
    border: 1px solid var(--accent); background: var(--accent); color: #fff;
    border-radius: 8px; padding: 8px 14px; text-align: left;
  }
  .nextstep-btn:hover:not(:disabled):not(.waiting) { filter: brightness(1.08); }
  .nextstep-btn:disabled { opacity: .55; cursor: not-allowed; filter: none; }
  /* EN CURSO: se ve apagado (no rosa) y avisa de que hay que esperar. */
  .nextstep-btn.waiting {
    background: var(--panel-2); color: var(--muted); border-color: var(--border);
    cursor: default;
  }
  .tarea-def input.td-edit, .tarea-def textarea.td-edit {
    width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px; font: inherit; outline: none; margin-bottom: 8px;
  }
  .tarea-def textarea.td-edit { min-height: 90px; resize: vertical; }
  /* el PLAN estructurado de Aubé (resumen + partes + contrato) */
  .td-plan { margin: 10px 0 0; border-top: 1px dashed var(--border); padding-top: 10px; }
  .td-plan .tp-h { font-size: 11px; color: var(--accent); font-weight: 700; letter-spacing: .04em; text-transform: uppercase; margin: 8px 0 4px; }
  .td-plan .tp-resumen { font-size: 13px; color: var(--text); }
  .td-plan .tp-parte { font-size: 12.5px; margin: 3px 0; padding-left: 10px; border-left: 2px solid var(--border); }
  .td-plan .tp-parte b { color: var(--accent); }
  .td-plan .tp-files { color: var(--muted); font-variant-numeric: tabular-nums; }
  .td-plan .tp-contrato { font-size: 12.5px; margin: 3px 0; padding-left: 10px; border-left: 2px solid var(--accent); }
  .td-plan .tp-contrato .tp-iface { font-family: ui-monospace, monospace; color: var(--text); }
  .td-plan .tp-estado { font-size: 11px; font-weight: 700; margin-top: 8px; }
  .td-plan .tp-aprobado { color: #36c08a; }
  .td-plan .tp-pendiente { color: var(--muted); }
  .td-plan .tp-motivos { color: #d98b5f; font-size: 12px; margin-top: 4px; }
  /* estructura: subtareas con su alcance + tests colgando (el dibujo de Tie) */
  .td-struct { margin: 10px 0 0; border-top: 1px dashed var(--border); padding-top: 10px; }
  .td-struct .st-h { font-size: 11px; color: var(--accent); font-weight: 700; letter-spacing: .04em; text-transform: uppercase; margin: 6px 0 3px; }
  .td-struct .st-sub { margin: 10px 0 2px; }
  .td-struct .st-name { font-size: 13px; font-weight: 700; color: var(--text); }
  .td-struct .st-alcance { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; margin-left: 14px; }
  .td-struct .st-tests { margin: 2px 0 0 14px; }
  .td-struct .st-test { font-size: 12.5px; color: var(--text); padding: 2px 4px; border-radius: 5px; }
  .td-struct .st-test b { color: var(--accent); font-weight: 600; }
  .td-struct .st-clickable { cursor: pointer; }
  .td-struct .st-clickable:hover { background: var(--panel-2); }
  .td-struct .st-empty { font-size: 12px; color: var(--muted); font-style: italic; margin-left: 14px; }
  .td-struct .st-nivel { font-size: 11px; cursor: help; }
  .td-struct .st-perm { color: #36c08a; }   /* persistente: se queda */
  .td-struct .st-impl { color: var(--muted); }  /* temporal: efímero */
  .td-struct .st-estado { font-size: 12px; display: inline-block; width: 15px; text-align: center; }
  .td-struct .st-est-pasa { color: #36c08a; }
  .td-struct .st-est-falla { color: #ff6b6b; }
  .td-struct .st-est-ejecutando { color: #e0a23a; }
  /* fila de COMPLEJIDAD: etiqueta + segmentado fácil/mediana/compleja (override de Tie) */
  .td-complej { display: flex; align-items: center; gap: 10px; margin: 12px 0 0; flex-wrap: wrap; }
  .td-complej .tc-lbl { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: var(--secondary); }
  .td-complej .tc-seg { display: inline-flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .td-complej .tc-seg button { font: inherit; font-size: 12px; font-weight: 600; cursor: pointer;
    background: transparent; color: var(--muted); border: 0; border-right: 1px solid var(--border); padding: 4px 12px; }
  .td-complej .tc-seg button:last-child { border-right: 0; }
  .td-complej .tc-seg button.active { background: var(--secondary); color: #fff; }
  .td-complej .tc-origen { font-size: 11px; color: var(--muted); }
  /* botón "Añadir test" a mano (cabecera de la estructura de tests) */
  .td-struct .st-add { font: inherit; font-size: 11px; font-weight: 600; cursor: pointer; margin-left: 8px;
    background: transparent; color: var(--secondary); border: 1px solid var(--border); border-radius: 6px; padding: 1px 8px; }
  .td-struct .st-add:hover { border-color: var(--secondary); color: var(--text); }
  /* botón "Completar" (el gate) — destacado en verde */
  /* modal de edición de un test (reusa .perm-modal/.perm-box) */
  .tm-field { margin: 0 0 10px; }
  .tm-field label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--secondary); margin-bottom: 4px; }
  .tm-in { width: 100%; box-sizing: border-box; font: inherit; font-size: 13px; padding: 7px 9px;
    background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 7px; outline: none; }
  textarea.tm-in { min-height: 52px; resize: vertical; }
  .tm-in:focus { border-color: var(--secondary); }
  .tm-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin: 4px 0 8px; }
  .tm-row .tm-lbl { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--secondary); }
  .tm-sel { font: inherit; font-size: 12px; padding: 5px 8px; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 7px; cursor: pointer; }
  .team-btn.tm-del { color: #ff6b6b; border-color: transparent; margin-left: auto; }
  .team-btn.tm-del:hover { border-color: #ff6b6b; }
  /* F22 — el mensaje SELECCIONADO es el REY: se ve muy marcado (lo más
     importante de la pantalla). Define sobre qué actúan las herramientas. */
  .node.selected > .bubble {
    border-color: var(--accent);
    background: rgba(255,0,102,.10);
    box-shadow: 0 0 0 4px rgba(255,0,102,.18), 0 0 20px rgba(255,0,102,.28);
  }
  .node.selected > .who { color: var(--accent); font-weight: 700; }

  /* contenedor de hijos: por defecto SIN sangría (la respuesta única va justo
     debajo, misma columna). Si la madre tiene varias respuestas, .branch sangra
     +1 unidad a todo el grupo y los marca con la línea del hilo. */
  .children { }
  .children.branch { padding-left: 22px; margin-left: 4px; border-left: 2px solid var(--border); }

  .reply-banner { font-size: 12px; color: var(--muted); margin-bottom: 8px; display: none; }
  .reply-banner b { color: var(--accent); }
  .reply-banner a { color: var(--accent); cursor: pointer; margin-left: 10px; text-decoration: underline; }

  /* compositor fijo abajo */
  .composer { flex: 0 0 auto; border-top: 1px solid var(--border); padding: 12px 16px 14px; background: var(--panel); }

  /* F22 — barra de SELECCIÓN: qué mensaje es el rey + sus acciones propias +
     el selector de SCOPE universal (mensaje / hilo / conversación). */
  .selection { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
  .sel-info {
    font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px;
    min-width: 0; max-width: 100%;
  }
  .sel-info b { color: var(--text); }
  .sel-info .king { color: var(--accent); }
  .sel-info .preview {
    color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 220px;
  }
  .sel-acts { display: flex; gap: 6px; }
  .sel-act {
    font: inherit; font-size: 11px; font-weight: 600; border-radius: 6px; padding: 2px 9px;
    border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer;
  }
  .sel-act:hover { color: var(--text); border-color: var(--accent); }
  .sel-act.special { color: var(--accent); border-color: var(--accent); }

  .scope-pick { display: flex; align-items: center; gap: 6px; margin-left: auto; }
  .scope-lbl { font-size: 11px; color: var(--muted); font-weight: 600; }
  .scope-seg { display: inline-flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .scope-btn {
    font: inherit; font-size: 12px; font-weight: 600; cursor: pointer;
    background: transparent; color: var(--muted); border: 0; border-right: 1px solid var(--border);
    padding: 4px 11px;
  }
  .scope-btn:last-child { border-right: 0; }
  .scope-btn:hover { color: var(--text); }
  .scope-btn.active { background: var(--accent); color: var(--accent-ink); }

  /* el área crece sola con el texto hasta 10 líneas (~232px) y luego hace scroll. */
  .composer textarea {
    width: 100%; resize: none; min-height: 64px; max-height: 232px; overflow-y: auto;
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px; font: inherit; outline: none;
  }
  .composer textarea:focus { border-color: var(--accent); }
  .composer textarea:disabled { opacity: .5; }

  /* modo de envío: cómo se porta Enter (envía / salta línea). Persiste. */
  .send-mode { display: inline-flex; align-items: center; gap: 6px; margin-left: auto; }
  .send-mode .sm-lbl { font-size: 11px; color: var(--muted); font-weight: 600; }
  .sm-seg { display: inline-flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .sm-seg button {
    font: inherit; font-size: 11px; font-weight: 600; cursor: pointer;
    background: transparent; color: var(--muted); border: 0; border-right: 1px solid var(--border); padding: 4px 10px;
  }
  .sm-seg button:last-child { border-right: 0; }
  .sm-seg button.active { background: var(--accent); color: var(--accent-ink); }

  .tools { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .tool {
    padding: 7px 14px; border-radius: 8px; font: inherit; font-weight: 600; font-size: 13px;
    border: 1px solid var(--border); background: var(--panel-2); color: var(--text); cursor: pointer;
  }
  .tool.primary { border-color: var(--accent); color: var(--accent); }
  .tool.primary:hover { background: rgba(255,0,102,.12); }
  .tool:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .tool:active:not(:disabled) { transform: translateY(1px); }
  .tool:disabled { cursor: not-allowed; opacity: .5; }

  .placeholder-pad { color: var(--muted); padding: 24px 16px; font-size: 13px; }

  /* lista de tareas (columna derecha) — agrupada por estado, ordenada por el motor */
  .tarea-list { list-style: none; margin: 0; padding: 4px 8px 16px; }
  /* cabecera de cada cajón (Revisar / En curso / Por hacer / Terminadas) */
  .tarea-grupo { color: var(--muted); font-size: 11px; font-weight: 700; letter-spacing: .05em;
    text-transform: uppercase; padding: 12px 6px 4px; cursor: pointer; user-select: none;
    display: flex; align-items: center; gap: 6px; }
  .tarea-grupo:hover { color: var(--secondary); }
  .tarea-grupo:first-child { padding-top: 4px; }
  .tarea-grupo .tg-arrow { font-size: 9px; width: 9px; }
  .tarea-grupo .tg-label { flex: 1 1 auto; }
  .tarea-grupo .tg-count { font-weight: 600; opacity: .7; }
  .tarea-item {
    padding: 8px 10px; border-radius: 8px; margin-bottom: 4px; cursor: pointer;
    border: 1px solid var(--border); background: var(--panel-2);
  }
  .tarea-item:hover { border-color: var(--accent); }
  .tarea-item.active { border-color: var(--accent); background: rgba(255,0,102,.10); }
  /* fila principal: icono de estado + título cortísimo */
  .tarea-row { display: flex; align-items: center; gap: 8px; }
  .tarea-ico { flex: 0 0 auto; font-size: 14px; width: 18px; text-align: center; }
  .tarea-ico.rojo { color: #ff5470; }
  .tarea-ico.verde { color: #2ecc71; }   /* ✓ en master = cierre feliz */
  .tarea-item .title { font-weight: 500; flex: 1 1 auto; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  /* borrar tarea: oculto hasta el hover de la fila (como .chat-del) */
  .tarea-del {
    flex: 0 0 auto; font: inherit; font-size: 13px; line-height: 1; cursor: pointer;
    background: transparent; color: var(--muted); border: 1px solid transparent;
    border-radius: 6px; padding: 2px 6px; opacity: 0; transition: opacity .12s ease;
  }
  .tarea-item:hover .tarea-del, .tarea-item.active .tarea-del { opacity: 1; }
  .tarea-del:hover { color: #ff6b6b; border-color: #ff6b6b; }
  /* barrita clicable que despliega el contenedor de subtareas */
  .tarea-bar { margin-top: 7px; height: 5px; border-radius: 3px; background: var(--border);
    cursor: pointer; position: relative; overflow: hidden; }
  .tarea-bar:hover { background: var(--secondary); }
  .tarea-bar .fill { position: absolute; inset: 0 auto 0 0; background: var(--accent); opacity: .55; }
  .tarea-subs { margin: 6px 0 1px; padding-left: 4px; border-left: 2px solid var(--border); }
  .tarea-subs.hidden { display: none; }
  .tarea-sub { display: flex; align-items: center; gap: 8px; padding: 2px 0;
    font-size: 12px; color: var(--text); }
  .tarea-sub .tarea-ico { font-size: 12px; width: 16px; }
  .tarea-sub .sname { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* bloque "pensando": fantasma con barrido (shimmer) mientras el headless piensa. */
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .node.thinking { margin: 0 0 12px; }
  .bubble.skeleton-wrap { width: 240px; max-width: 70%; padding: 11px 13px; cursor: default; }
  .skeleton {
    height: 11px; border-radius: 6px; margin: 0 0 8px;
    background: linear-gradient(90deg, #14151e 25%, #26223d 50%, #14151e 75%);
    background-size: 200% 100%; animation: shimmer 1.3s linear infinite;
  }
  .skeleton:last-child { margin-bottom: 0; }

  /* cabecera central: título editable + varita de nombre automático */
  .head-title-wrap { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .chat-title {
    cursor: text; border-radius: 6px; padding: 2px 6px; margin: -2px -6px;
    outline: none; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .chat-title:hover { background: var(--panel-2); }
  .chat-title[contenteditable="true"] {
    background: var(--bg); border: 1px solid var(--accent); white-space: normal; cursor: text;
  }
  .wand-btn {
    font: inherit; font-size: 13px; line-height: 1; cursor: pointer; flex: 0 0 auto;
    background: transparent; color: var(--secondary); border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 8px;
  }
  .wand-btn:hover:not(:disabled) { color: var(--accent); border-color: var(--accent); }
  .wand-btn:disabled { opacity: .4; cursor: not-allowed; }
  .wand-btn.busy { opacity: .6; cursor: progress; }
</style>
</head>
<body>
  <!-- BARRA DEL CICLO (F21): un SENDERO izquierda→derecha.
       IZQUIERDA: el objetivo · CENTRO: el carril del viaje · DERECHA: Pausar. -->
  <header class="cycle-bar" id="cycleBar">
    <!-- IZQUIERDA: el objetivo del ciclo, separado del viaje -->
    <div class="bar-left">
      <button class="target-chip" id="targetChip" disabled title="El objetivo (forge/producto) se fija al abrir un Nuevo ciclo. No se cambia a mitad de ciclo.">
        <span class="tc-icon">🎯</span><span class="tc-name" id="targetName">forge</span>
      </button>
      <div class="target-branch" id="targetBranch"></div>
    </div>

    <!-- CENTRO: el carril del viaje (Nuevo ciclo › fases … Cierre) -->
    <div class="bar-center">
      <div class="rail" id="rail">
        <!-- carril: ◀ Retroceder / Avanzar ▶. El orden del viaje es:
             ◀ ⚙ Nuevo ciclo › Spike › … › Cierre ▶. En "Nuevo ciclo", ▶ = EMPEZAR
             (borra el taller y arranca); en el resto, ◀/▶ son SOFT (no destruyen). -->
        <button class="tp-btn" id="btnBack" title="Retroceder a la fase anterior (corregir el rumbo)">◀</button>
        <!-- "Nuevo ciclo" NO ES UN BOTÓN: es la PRIMERA parada del carril, una etiqueta
             de estado. Se llega SOLO con la flecha ◀ desde Spike. Sin modal: el objetivo
             y la rama se editan arriba a la izquierda; el centro lo ocupa la charla de Iris. -->
        <div class="gate" id="gateNew">
          <span class="gate-stop" id="gateNewBtn" title="La primera parada del carril. Navega hasta aquí con la flecha ◀ desde Spike.">⚙ Nuevo ciclo</span>
        </div>
        <span class="rail-sep">›</span>
        <div class="breadcrumb" id="breadcrumb"></div>
        <button class="tp-btn" id="btnAdvance" title="Avanzar a la fase siguiente (comprueba que se puede y mueve)">▶</button>
        <!-- "Cierre" ya NO es una puerta de salida: es la última fase del recorrido
             (Spike › … › QA › Cierre), se navega con las flechas como las demás. -->
      </div>
    </div>

    <!-- DERECHA: los mandos que no son el viaje -->
    <div class="bar-right">
      <span class="forge-status on" id="forgeStatus" title="Estado de la forja y nº de claudes activos">🟢 encendida</span>
      <label class="autostart-toggle" id="autostartToggle" title="Arranque automático: con la ventana de 5h recuperada y sin nadie construyendo, la forja lanza sola las tareas pendientes, de una en una.">
        <input type="checkbox" id="autostartCheck">
        <span class="autostart-label">Arranque automático</span>
        <span class="autostart-hint" id="autostartHint"></span>
      </label>
      <span class="usage-chip" id="usageChip" title="Uso de la ventana de 5h de tu suscripción">5h —</span>
      <button class="tp-btn" id="btnTeam" title="Ver y editar los perfiles del equipo (descripción y modelo de cada empleado)">👥 Equipo</button>
      <button class="tp-btn" id="btnRestart" title="Apagado ordenado: deja de aceptar trabajo nuevo, espera a que los claudes terminen y queda lista para reinicio manual">⟳ Schedule restart</button>
      <button class="tp-btn" id="btnPause" title="Pausar / reanudar el trabajo de la fase actual">⏸ Pausar</button>
    </div>
  </header>

  <!-- IZQUIERDA: ideas (conversaciones) -->
  <aside class="col col-left">
    <div class="col-head">
      <button class="collapse-btn" id="toggleLeft" title="Plegar / desplegar la columna">«</button>
      <span>Ideas</span>
    </div>
    <button class="new-btn" id="newChat">+ Nueva conversación</button>
    <ul class="chat-list" id="chatList"></ul>
  </aside>

  <!-- CENTRO: hilo + compositor -->
  <main class="col col-center">
    <!-- "Nuevo ciclo" ya NO tiene modal: el objetivo y la rama se editan arriba a la
         izquierda, la conversación de Iris ocupa el centro como una más, y ▶ = empezar. -->
    <div class="col-head" id="centerHead">
      <span class="head-title-wrap">
        <span id="chatTitle" class="chat-title" title="Clic para editar el nombre">Chat</span>
        <button class="wand-btn" id="btnWand" title="Generar un nombre automático" disabled>✦</button>
      </span>
    </div>
    <!-- la ficha de la tarea + el hilo comparten UN solo scroll: la ficha baja como
         un mensaje más en vez de quedarse fija arriba robándole sitio al hilo. -->
    <div class="center-scroll" id="centerScroll">
      <!-- F9b: la definición de la tarea (solo al abrir una tarea) -->
      <div class="tarea-def" id="tareaDef" style="display:none"></div>
      <div class="thread" id="thread">
        <div class="placeholder">Crea o elige una conversación a la izquierda.</div>
      </div>
    </div>
    <div class="composer">
      <!-- EL paso siguiente (determinista, lo decide la forja): un clic = un paso.
           En una conversación recorre William→Iris→Aubé→aprobar; en una tarea,
           definir→escribir→ejecutar→probar→completar. -->
      <div class="nextstep-bar" id="nextStepBar" style="display:none"></div>
      <!-- barra FIJA con las acciones de la tarea (Aprobar/Ejecutar/Probar/Completar/
           Subir a master…): siempre a la vista encima del input, no se va con el scroll. -->
      <div class="tarea-acts-bar" id="tareaActsBar" style="display:none"></div>
      <!-- F22: qué mensaje es el rey + sus acciones + el scope universal -->
      <div class="selection" id="selection">
        <span class="sel-info" id="selInfo"></span>
        <span class="sel-acts" id="selActs"></span>
        <div class="scope-pick">
          <span class="scope-lbl">Alcance</span>
          <div class="scope-seg" id="scopeSeg">
            <button class="scope-btn" data-scope="mensaje" title="Actuar sobre el mensaje seleccionado">Mensaje</button>
            <button class="scope-btn" data-scope="hilo" title="Actuar sobre toda la rama que nace en el mensaje">Hilo</button>
            <button class="scope-btn" data-scope="conversacion" title="Actuar sobre la conversación entera">Conversación</button>
          </div>
        </div>
      </div>
      <div class="reply-banner" id="replyBanner"></div>
      <textarea id="input" placeholder="Escribe aquí…" disabled></textarea>
      <div class="tools" id="tools">
        <button class="tool" id="btnResponder" disabled title="Envía tu texto sin que conteste nadie (punto final)">☝️ Enviar</button>
        <button class="tool" id="btnCharlar" disabled title="Iris mira HACIA DENTRO: cómo encaja la idea en el panorama actual y qué afecta a la empresa (qué rompe, qué acelera, qué descoloca)">💬 Opinión de Iris</button>
        <button class="tool" id="btnChallenge" disabled title="William mira HACIA FUERA: qué técnicas, herramientas o ideas del mercado aplicarían bien aquí (según el alcance elegido)">⚔️ Opinión de William</button>
        <button class="tool" id="btnInvestigar" disabled title="Stevens baja al código REAL: los hechos — qué está implementado de verdad, en qué estado, el nombre exacto de una variable. Cero interpretación, solo el mapa de lo que hay">🔍 Auditar código</button>
        <button class="tool" id="btnConsejo" disabled title="Mr. Miyagi da una opinión honesta">🌿 Consejo</button>
        <button class="tool" id="btnDiscutir" disabled title="Romina o Ariel salta con un lado (al azar); vuelve a pulsar y salta el otro con el lado contrario">🙎‍♂️🙎‍♀️ Discutir</button>
        <button class="tool" id="btnResumir" disabled title="Anselmo resume el hilo (su nota se puede compactar)">📝 Resumir</button>
        <button class="tool" id="btnTarea" disabled title="Aubé baja el hilo a una tarea">❎ Crear tarea</button>
        <!-- SOLO en "Nuevo ciclo": sustituye a "Crear tarea". Analiza la charla, crea la rama,
             pasa a Spike y dispara a Iris (frentes) y William (tecnologías externas). -->
        <button class="tool" id="btnEmpezarCiclo" style="display:none" title="Analiza la conversación, crea la rama del ciclo, pasa a Spike y abre frentes (Iris) y tecnologías externas (William)">🚀 Empezar ciclo</button>
        <!-- SOLO dentro de una tarea: Ana Liz define los tests (en papel) y luego los escribe (código) -->
        <button class="tool tool-tarea" id="btnDefinirTests" disabled title="Ana Liz define los tests en papel (dado/cuando/entonces). Ciega al código; recibe el contexto seleccionado.">🎯 Definir tests</button>
        <button class="tool tool-tarea" id="btnEscribirTests" disabled title="Ana Liz convierte sus definiciones en tests REALES de código (con su ID). Necesita tests definidos.">⌨️ Escribir tests</button>
        <button class="tool" id="btnDebug" disabled title="Vuelca en la consola del navegador (F12) el texto que se ENSAMBLA para el alcance elegido: el hilo + el foco. No manda nada a nadie, solo log.">🐞 Debug</button>
        <!-- doble modo de envío: qué hace Enter (envía / salta línea). Persiste. -->
        <div class="send-mode">
          <span class="sm-lbl">Enter:</span>
          <div class="sm-seg" id="sendModeSeg">
            <button data-mode="send" title="Enter envía · Shift+Enter salta línea">envía</button>
            <button data-mode="newline" title="Enter salta línea · Ctrl/⌘+Enter envía">salta línea</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- DERECHA: tareas (las crea Aubé al aprobar; independientes) -->
  <aside class="col col-right">
    <div class="col-head">
      <span>Tareas</span>
      <button class="collapse-btn" id="toggleRight" title="Plegar / desplegar la columna">»</button>
    </div>
    <ul class="tarea-list" id="tareaList"></ul>
  </aside>

<script src="/forge/forge-md.js"></script>
<script>
  const listEl = document.getElementById('chatList');
  const tareaListEl = document.getElementById('tareaList');
  const tareaDefEl = document.getElementById('tareaDef');
  const tareaActsBarEl = document.getElementById('tareaActsBar');
  const nextStepBarEl = document.getElementById('nextStepBar');
  let chatNext = null;   // el paso siguiente de la CONVERSACIÓN abierta (lo decide la forja)
  let liveEnHilo = false;   // ¿hay un mensaje vivo (agente trabajando) en el hilo abierto?
  let currentTarea = null;   // F9b: la tarea abierta en el centro (su definición fija), o null
  let editingTareaDef = false; // true mientras se edita la definición a mano (no la pises con el sondeo)
  const threadEl = document.getElementById('thread');
  // Click en el fondo vacío del hilo (no en una .bubble/.node) = salir del sub-hilo
  // y volver al hilo principal (el primer mensaje). Las burbujas/nodos tienen su
  // propio onclick con stopPropagation, así que este handler solo dispara en vacío.
  threadEl.addEventListener('click', (e) => {
    if (e.target.closest('.bubble') || e.target.closest('.node')) return;
    // En modo tarea, el fondo vacío deselecciona hacia la DEF de Aubé (la raíz real):
    // selectedId = null + re-render. En conversación, vuelve al primer mensaje.
    if (currentTarea) {
      if (selectedId != null) { selectedId = null; if (lastChat) renderThread(lastChat); else updateSelectionUI(); }
      return;
    }
    const first = firstMsgId();
    if (first != null && first !== selectedId) selectMsg(first);
  });
  const titleEl = document.getElementById('chatTitle');
  const btnWand = document.getElementById('btnWand');
  const inputEl = document.getElementById('input');
  const banner = document.getElementById('replyBanner');
  const selInfo = document.getElementById('selInfo');
  const selActs = document.getElementById('selActs');
  const scopeSeg = document.getElementById('scopeSeg');
  const btnResponder = document.getElementById('btnResponder');
  const btnCharlar = document.getElementById('btnCharlar');
  const btnInvestigar = document.getElementById('btnInvestigar');
  const btnConsejo = document.getElementById('btnConsejo');
  const btnDiscutir = document.getElementById('btnDiscutir');
  const btnChallenge = document.getElementById('btnChallenge');
  const btnTarea = document.getElementById('btnTarea');
  const btnEmpezarCiclo = document.getElementById('btnEmpezarCiclo');
  const btnResumir = document.getElementById('btnResumir');
  const btnDebug = document.getElementById('btnDebug');
  const btnDefinirTests = document.getElementById('btnDefinirTests');
  const btnEscribirTests = document.getElementById('btnEscribirTests');
  const composerBtns = [btnResponder, btnCharlar, btnInvestigar, btnConsejo, btnDiscutir, btnChallenge, btnTarea, btnResumir, btnDebug, btnDefinirTests, btnEscribirTests];
  // Los botones SOLO-de-tarea (Definir/Escribir tests): se ocultan fuera de una tarea.
  const tareaBtns = [btnDefinirTests, btnEscribirTests];
  function syncTareaBtns() {
    const enTarea = !!currentTarea;
    for (const b of tareaBtns) b.style.display = enTarea ? '' : 'none';
    if (enTarea) {
      const tests = (currentTarea.testsPlan && currentTarea.testsPlan.tests) || [];
      const facil = complejidadDe(currentTarea) === 'facil';
      const pendientes = tests.some((x) => (x.estado || 'definido') === 'definido');
      // FÁCIL: Ana Liz no define → 🎯 bloqueado.
      btnDefinirTests.disabled = facil || !active;
      btnDefinirTests.title = facil
        ? 'Tarea fácil: Ana Liz no define tests. Añádelos a mano desde la ficha.'
        : 'Ana Liz define los tests en papel (dado/cuando/entonces)';
      // ESCRIBIR: solo si hay definiciones PENDIENTES de escribir (cualquier nivel).
      btnEscribirTests.disabled = !pendientes || !active;
      btnEscribirTests.title = pendientes ? 'Ana Liz escribe los tests reales (código) de las definiciones pendientes' : 'No hay definiciones pendientes de escribir';
    }
  }

  // ── barra del ciclo (F21) ────────────────────────────────────────────────────
  const bcEl = document.getElementById('breadcrumb');
  const cycleBarEl = document.getElementById('cycleBar');
  const btnAdvance = document.getElementById('btnAdvance');
  const btnBack = document.getElementById('btnBack');
  const btnPause = document.getElementById('btnPause');
  const targetChip = document.getElementById('targetChip');
  const targetName = document.getElementById('targetName');
  const targetBranch = document.getElementById('targetBranch');
  // si la forja aún no expone /api/cycle, pintamos la miga de pan en gris y
  // dejamos el transporte inerte (no inventamos estado): fases canónicas de §2.
  // Espejo de LINEAR_PHASES (forge-firme.js): Cierre es la última fase del recorrido,
  // no una puerta de salida. Debe verse aun con el endpoint /api/cycle caído.
  const FALLBACK_PHASES = [
    { key: 'spike', label: 'Spike' }, { key: 'grooming', label: 'Grooming' },
    { key: 'sprint', label: 'Sprint' }, { key: 'qa', label: 'QA' },
    { key: 'cierre', label: 'Cierre' },
  ];
  let cycle = null; // último estado del ciclo, o null si el endpoint no responde

  let currentTitle = '';
  let active = null;
  let lastCount = -1;
  let lastPendingSig = '';
  let lastSig = '';
  let pollTimer = null;
  // Fantasmas "pensando": UNO por personaje en vuelo. Cada fantasma PERSISTE hasta
  // que llega el mensaje OFICIAL de ESE personaje — que hable otro NO lo borra.
  //   { author, parent, base }  — base = nº de mensajes de ese autor al lanzar; el
  //   fantasma se retira cuando ese contador crece (llegó su mensaje).
  let pendings = [];
  let otherCount = 0;
  // F22: el mensaje SELECCIONADO (el rey) + el SCOPE universal. La selección
  // manda sobre qué actúan las herramientas; charlar/responder cuelgan de él.
  let selectedId = null;
  let scope = 'mensaje';
  let editTarget = null;  // id del mensaje en edición (null = no estamos editando)
  let selectAfterReplyAuthor = null; // Discutir: al llegar la réplica de ESE autor, el rey salta a ella

  // Añade un fantasma "pensando" para `author` (colgando de `parent`). base = cuántos
  // mensajes suyos hay AHORA → el sondeo lo retira cuando ese número crezca. Si ya
  // había uno suyo (relanzado), lo reemplaza. Los personajes con mensaje VIVO real
  // (Aubé/Miguel) NO usan esto: su placeholder ya es un mensaje de verdad.
  function countAuthorMsgs(author) {
    const msgs = (lastChat && lastChat.messages) || [];
    return msgs.filter((m) => !m.collapsed && m.author === author).length;
  }
  function addPending(author, parent) {
    pendings = pendings.filter((p) => p.author !== author);
    pendings.push({ author, parent: (parent == null ? null : parent), base: countAuthorMsgs(author) });
  }
  function pendingSig() { return pendings.map((p) => p.author + ':' + p.parent).join(','); }
  let lastChat = null;    // último chat renderizado

  const NAMES = {
    tie: 'Tie', iris: 'Iris', william: 'William', anselmo: 'Anselmo', aube: 'Aubé',
    stevens: 'Stevens', miyagi: 'Mr. Miyagi', romina: 'Romina', ariel: 'Ariel', miguel: 'Miguel', sistema: 'Sistema', revisor: 'Revisor',
    analiz: 'Ana Liz',
  };
  function nameOf(a) { return NAMES[a] || (a ? a[0].toUpperCase() + a.slice(1) : '?'); }

  // ── el ciclo: cargar, pintar y mover (transporte) ───────────────────────────
  async function loadCycle() {
    try {
      const res = await fetch('/api/cycle');
      if (!res.ok) throw new Error('no cycle');
      cycle = await res.json();
    } catch { cycle = null; }
    renderCycle();
  }

  // El objetivo (forge/producto) SOLO se cambia desde el chip cuando estás en la parada
  // "Nuevo ciclo" (chip editable). Al cambiarlo, Iris abre la conversación del backlog
  // de ese objetivo (POST /api/cycle/target + abrirBacklog). Fuera de ahí, avisa.
  async function toggleTarget() {
    if (!cycle) return;
    if (!nuevoActive) {
      alert('El objetivo (forge/producto) solo se cambia en "Nuevo ciclo" (la flecha ◀ desde Spike).');
      return;
    }
    const next = (cycle.target === 'project') ? 'forge' : 'project';
    try {
      const res = await fetch('/api/cycle/target', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ target: next }),
      });
      if (!res.ok) { alert('No se pudo cambiar el objetivo.'); return; }
      cycle = await res.json();
      renderCycle();
      abrirBacklog(cycle.target);   // Iris abre (o reabre) la del nuevo objetivo
    } catch { alert('No se pudo cambiar el objetivo.'); }
  }

  // "Nuevo ciclo" es la PRIMERA parada del carril (◀ Nuevo ciclo › Spike › … ▶), no
  // una fase del ciclo. nuevoActive = estás parado en ella (panel abierto). Es una
  // parada de SOLO-vista: entras/sales con las flechas (suave), y el arranque real
  // (destructivo) es el botón rojo de dentro. Ver showNuevoCiclo + las flechas.
  let nuevoActive = false;
  function cycleIdx() {
    if (!cycle) return -1;
    const phases = (cycle.phases && cycle.phases.length) ? cycle.phases : FALLBACK_PHASES;
    return (cycle.cursor != null) ? cycle.cursor : phases.findIndex((p) => p.key === cycle.phase);
  }

  function renderCycle() {
    const phases = (cycle && cycle.phases && cycle.phases.length) ? cycle.phases : FALLBACK_PHASES;
    let curIdx = -1;
    if (cycle) {
      curIdx = (cycle.cursor != null) ? cycle.cursor : phases.findIndex((p) => p.key === cycle.phase);
    }
    // CENTRO: solo las fases del medio (las dos puertas son markup fijo del carril).
    bcEl.innerHTML = '';
    phases.forEach((p, i) => {
      if (i) {
        const sep = document.createElement('span');
        sep.className = 'bc-sep'; sep.textContent = '›';
        bcEl.appendChild(sep);
      }
      const span = document.createElement('span');
      // si estás parado en "Nuevo ciclo", ninguna fase está activa (te saliste del carril).
      span.className = 'bc-phase' + (i === curIdx && !nuevoActive ? ' active' : '');
      span.textContent = p.label;
      bcEl.appendChild(span);
    });
    if (cycle && cycle.paused) {
      const tag = document.createElement('span');
      tag.className = 'cycle-paused'; tag.textContent = 'pausado';
      bcEl.appendChild(tag);
    }
    // IZQUIERDA: el chip del objetivo + la rama debajo.
    const target = (cycle && cycle.target) || 'forge';
    targetName.textContent = target === 'project' ? 'producto' : 'forge';
    targetChip.classList.toggle('is-project', target === 'project');
    targetChip.classList.toggle('is-forge', target !== 'project');
    targetBranch.textContent = '⌥ ' + getBranch();
    cycleBarEl.classList.toggle('offline', !cycle);
    // En "Nuevo ciclo" el botón "Crear tarea" se cambia por "Empezar ciclo".
    syncCicloBtn();

    const avail = !!cycle;
    // El objetivo (forge/producto) y la rama SOLO se editan en la parada "Nuevo ciclo".
    // Fuera de ella el chip está bloqueado: no se cambia de objetivo a mitad de ciclo.
    targetChip.disabled = !(avail && nuevoActive);
    targetChip.title = nuevoActive
      ? 'Clic para cambiar el objetivo (forge ⇄ producto). Iris abrirá la conversación del backlog de ese objetivo.'
      : 'El objetivo (forge/producto) solo se cambia en "Nuevo ciclo" (la flecha ◀ desde Spike).';
    // La rama ya NO se edita a mano: la nombra Iris al empezar el ciclo (1-3 palabras
    // del objetivo) y se crea de verdad en git. Aquí solo se muestra.
    targetBranch.title = nuevoActive
      ? 'La rama la nombra Iris al pulsar "Empezar ciclo" (1-3 palabras del objetivo) y se crea en git.'
      : 'Rama git del ciclo.';
    targetBranch.classList.remove('editable');

    // "Nuevo ciclo" como parada: resáltala cuando estás en ella (etiqueta de estado).
    gateNewBtn.classList.toggle('active', nuevoActive);

    const paused = !!(cycle && cycle.paused);
    // ▶ en "Nuevo ciclo" VUELVE a la fase (Spike); si no, avanza salvo en la última.
    btnAdvance.disabled = !avail || (!nuevoActive && (curIdx < 0 || curIdx >= phases.length - 1));
    // ◀ en Spike (cursor 0) ENTRA en "Nuevo ciclo"; estando ya en ella, no hay más atrás.
    btnBack.disabled = !avail || nuevoActive;
    btnPause.disabled = !avail;
    btnPause.textContent = paused ? '▶ Reanudar' : '⏸ Pausar';
    btnPause.title = paused ? 'Reanudar el trabajo de la fase actual' : 'Pausar el trabajo de la fase actual';
  }

  // La rama del ciclo vive en el backend (cycle.branch): la nombra Iris al "Empezar
  // ciclo" y se crea de verdad en git. 'sin rama' hasta que exista.
  function getBranch() { return (cycle && cycle.branch) || 'sin rama'; }

  // En "Nuevo ciclo" el botón "Crear tarea" se oculta y aparece "Empezar ciclo"
  // (mismo sitio en la barra del hilo). Fuera de esa parada, al revés.
  function syncCicloBtn() {
    if (!btnEmpezarCiclo) return;
    btnEmpezarCiclo.style.display = nuevoActive ? '' : 'none';
    btnTarea.style.display = nuevoActive ? 'none' : '';
    btnEmpezarCiclo.disabled = !cycle;
  }

  async function cycleDo(path) {
    try {
      const res = await fetch('/api/cycle/' + path, { method: 'POST' });
      if (!res.ok) throw new Error('cycle move failed');
      cycle = await res.json();
      renderCycle();
      return true;
    } catch {
      alert('No se pudo mover el ciclo.');
      return false;
    }
  }

  // ── Avanzar / Retroceder son SOFT: no son hard actions. Primero comprueban
  // que existe la situación que permite cambiar de fase (canChangePhase) y
  // entonces mueven. NO destruyen nada: el borrado del taller vive en su guardián
  // fuerte dentro de "Nuevo ciclo". Hoy la precondición es un gancho que siempre
  // dice que sí; falta cablear los chequeos reales (¿hay diana?, ¿build verde?).
  function canChangePhase(/* dir */) {
    if (!cycle) return { ok: false, reason: 'El ciclo aún no está disponible.' };
    return { ok: true };
  }
  btnAdvance.onclick = async () => {
    // ▶ desde "Nuevo ciclo" = EMPEZAR: borra el taller y arranca en Spike.
    if (nuevoActive) { await empezarCiclo(); return; }
    const gate = canChangePhase('advance');
    if (!gate.ok) { alert(gate.reason); return; }
    await cycleDo('advance');
  };
  btnBack.onclick = async () => {
    // desde Spike (la primera fase), ◀ no retrocede de fase: ENTRA en "Nuevo ciclo"
    // (la parada anterior a Spike). Suave: abre la conversación de Iris, no borra nada.
    if (!nuevoActive && cycleIdx() <= 0) { showNuevoCiclo(true); return; }
    const gate = canChangePhase('back');
    if (!gate.ok) { alert(gate.reason); return; }
    await cycleDo('back');
  };
  btnPause.onclick = () => cycleDo(cycle && cycle.paused ? 'resume' : 'pause');
  targetChip.onclick = toggleTarget;
  // La rama del ciclo ya NO se edita a mano: la nombra Iris al "Empezar ciclo" y se
  // crea en git. El clic solo recuerda de dónde sale.
  targetBranch.onclick = () => {
    if (nuevoActive && getBranch() === 'sin rama') {
      alert('La rama la nombra Iris al pulsar "Empezar ciclo" (1-3 palabras del objetivo) y se crea en git.');
    }
  };

  // ── 👥 Equipo: la pestaña de perfiles ────────────────────────────────────────
  // Lee /api/people y pinta una tarjeta por empleado: su descripción (las
  // instrucciones REALES que usa al lanzarse, renderizadas en markdown y editables)
  // y su modelo por persona ('' = hereda el global). Guardar va al JSON al instante.
  const btnTeam = document.getElementById('btnTeam');
  let teamModalEl = null;
  btnTeam.onclick = openTeam;

  function ensureTeamModal() {
    if (teamModalEl) return teamModalEl;
    const modal = document.createElement('div');
    modal.className = 'team-modal'; modal.id = 'team-modal';
    const box = document.createElement('div'); box.className = 'team-box';
    box.onclick = (e) => e.stopPropagation();
    const head = document.createElement('div'); head.className = 'team-head';
    const h = document.createElement('h2'); h.textContent = '👥 Equipo';
    const sub = document.createElement('span'); sub.className = 'team-sub';
    sub.textContent = 'El perfil de cada empleado: su descripción (sus instrucciones reales) y el modelo con el que trabaja.';
    const x = document.createElement('button'); x.className = 'team-x'; x.textContent = '✕';
    x.onclick = () => { modal.style.display = 'none'; };
    head.appendChild(h); head.appendChild(sub); head.appendChild(x);
    const list = document.createElement('div'); list.className = 'team-list';
    box.appendChild(head); box.appendChild(list);
    modal.appendChild(box);
    modal.onclick = () => { modal.style.display = 'none'; };
    document.body.appendChild(modal);
    teamModalEl = modal;
    return modal;
  }

  async function openTeam() {
    const modal = ensureTeamModal();
    const list = modal.querySelector('.team-list');
    list.innerHTML = '<div class="cost-loading">Cargando equipo…</div>';
    modal.style.display = 'block';
    let data;
    try { data = await (await fetch('/api/people')).json(); }
    catch (e) { list.innerHTML = '<div class="cost-loading">No se pudo cargar: ' + esc(e.message) + '</div>'; return; }
    list.innerHTML = '';
    const choices = data.choices || [];
    const gm = data.globalModel || '';
    const catalogo = data.catalogo || { lee: [], escribe: [], herramientas: [] };
    for (const p of (data.people || [])) list.appendChild(renderProfileCard(p, choices, gm, catalogo));
  }

  function renderProfileCard(p, choices, globalModel, catalogo) {
    const card = document.createElement('div'); card.className = 'team-card';
    const rebuild = () => card.replaceWith(renderProfileCard(p, choices, globalModel, catalogo));

    // cabecera: nombre · id NEUTRO (P-NNN). El id manda en URLs/botones; el nombre
    // se puede cambiar libremente sin romper nada.
    const top = document.createElement('div'); top.className = 'tc-top';
    const nm = document.createElement('span'); nm.className = 'tc-name'; nm.textContent = p.nombre;
    const sl = document.createElement('span'); sl.className = 'tc-slug'; sl.textContent = p.id;
    top.appendChild(nm); top.appendChild(sl);
    card.appendChild(top);

    // descripción renderizada (markdown). CLIC en el texto = editar (no hay botón).
    const desc = document.createElement('div'); desc.className = 'tc-desc tc-clickable';
    desc.title = 'Clic para editar la descripción';
    fillBubble(desc, p.descripcion || '_(sin descripción)_');
    card.appendChild(desc);

    // ── Modelo (etiqueta arriba, control debajo) ──
    const modelSec = document.createElement('div'); modelSec.className = 'tc-sec';
    const mlbl = document.createElement('div'); mlbl.className = 'tc-sec-lbl'; mlbl.textContent = 'Modelo';
    const sel = document.createElement('select'); sel.className = 'tc-model';
    for (const c of choices) { const o = document.createElement('option'); o.value = c.value; o.textContent = c.label; sel.appendChild(o); }
    sel.value = p.modelo || '';
    const hint = document.createElement('span'); hint.className = 'tc-model-hint';
    const setHint = () => { hint.textContent = sel.value ? '' : ('hereda el global' + (globalModel ? ': ' + globalModel : '')); };
    setHint();
    const saved = document.createElement('span'); saved.className = 'tc-saved'; saved.textContent = '✓ guardado';
    sel.onchange = async () => {
      sel.disabled = true;
      try {
        const r = await fetch('/api/people/' + encodeURIComponent(p.id), {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ modelo: sel.value }),
        });
        if (!r.ok) throw new Error(((await r.json()) || {}).error || 'error');
        p.modelo = sel.value; setHint(); flash(saved);
      } catch (e) { alert('No se pudo cambiar el modelo: ' + e.message); sel.value = p.modelo || ''; }
      sel.disabled = false;
    };
    const modelCtl = document.createElement('div'); modelCtl.className = 'tc-sec-ctl';
    modelCtl.appendChild(sel); modelCtl.appendChild(hint); modelCtl.appendChild(saved);
    modelSec.appendChild(mlbl); modelSec.appendChild(modelCtl);
    card.appendChild(modelSec);

    // ── Permisos (etiqueta arriba; lee/escribe/MCP en líneas; clic = abre el modal) ──
    const permSec = document.createElement('div'); permSec.className = 'tc-sec';
    const plbl = document.createElement('div'); plbl.className = 'tc-sec-lbl'; plbl.textContent = 'Permisos';
    const savedS = document.createElement('span'); savedS.className = 'tc-saved'; savedS.textContent = '✓ guardado'; plbl.appendChild(savedS);
    const permBlock = document.createElement('div'); permBlock.className = 'tc-perm tc-clickable';
    permBlock.title = 'Clic para editar los permisos';
    const renderPerm = () => {
      permBlock.innerHTML = '';
      const s = p.scope || {};
      const lee = (typeof s.lee === 'string' && s.lee) ? s.lee : (Array.isArray(s.lee) && s.lee.length ? s.lee.join(', ') : 'nada');
      const escribe = (s.escribe && s.escribe.length) ? s.escribe.join(', ') : 'no escribe';
      const herr = (p.herramientas && p.herramientas.length) ? p.herramientas.join(', ') : '—';
      for (const [k, v] of [['Lee', lee], ['Escribe', escribe], ['MCP', herr]]) {
        const line = document.createElement('div'); line.className = 'tc-perm-line';
        const kk = document.createElement('span'); kk.className = 'tc-perm-k'; kk.textContent = k + ': ';
        line.appendChild(kk); line.appendChild(document.createTextNode(v));
        permBlock.appendChild(line);
      }
    };
    renderPerm();
    permBlock.onclick = () => openPermisos(p, catalogo, () => { renderPerm(); flash(savedS); });
    permSec.appendChild(plbl); permSec.appendChild(permBlock);
    card.appendChild(permSec);

    // editar descripción: clic en el texto → un textarea GRANDE en su sitio, con
    // guardar/cancelar justo debajo. Modelo y permisos se ocultan mientras editas.
    desc.onclick = () => {
      const ta = document.createElement('textarea'); ta.className = 'tc-edit'; ta.value = p.descripcion || '';
      const eact = document.createElement('div'); eact.className = 'tc-row';
      const save = document.createElement('button'); save.className = 'team-btn primary'; save.textContent = 'Guardar';
      const cancel = document.createElement('button'); cancel.className = 'team-btn'; cancel.textContent = 'Cancelar';
      eact.appendChild(save); eact.appendChild(cancel);
      desc.replaceWith(ta); ta.after(eact);
      modelSec.style.display = 'none'; permSec.style.display = 'none';
      ta.focus();
      cancel.onclick = rebuild;
      save.onclick = async () => {
        save.classList.add('busy'); save.disabled = true;
        try {
          const r = await fetch('/api/people/' + encodeURIComponent(p.id), {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ descripcion: ta.value }),
