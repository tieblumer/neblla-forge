<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Forge</title>
<link rel="icon" type="image/svg+xml" href="/forge/favicon.svg" />
<style>
  :root {
    /* paleta de marca Neblla (tema oscuro de developers.neblla.com) */
    --bg: #08080c;
    --panel: #222228;
    --panel-2: #14151e;
    --border: #1a1b28;
    --text: #e8eaf0;
    --muted: #8089a0;
    --accent: #ff0066;        /* magenta de marca */
    --accent-ink: #ffffff;    /* texto sobre el magenta */
    --secondary: #5b33f6;     /* púrpura de marca */
    --tie: #2a2150;           /* burbuja de Tie: tinte púrpura */
    --other: #14151e;         /* burbuja de los demás: neutra */
    --gate: #c9912e;          /* color cálido de las dos PUERTAS con ajustes */
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  /* Layout: una BARRA DEL CICLO arriba (miga de pan + transporte) ocupando todo
     el ancho, y debajo las tres columnas (ideas · chat · tareas). */
  body {
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text);
    display: grid; grid-template-columns: 280px 1fr 300px; grid-template-rows: auto 1fr;
    height: 100vh; transition: grid-template-columns .18s ease;
  }
  body.left-collapsed                     { grid-template-columns: 44px 1fr 300px; }
  body.right-collapsed                    { grid-template-columns: 280px 1fr 44px; }
  body.left-collapsed.right-collapsed     { grid-template-columns: 44px 1fr 44px; }

  .col { min-height: 0; height: 100%; display: flex; flex-direction: column; }
  .col-left   { grid-column: 1; grid-row: 2; background: var(--panel); border-right: 1px solid var(--border); overflow-y: auto; overflow-x: hidden; }
  .col-center { grid-column: 2; grid-row: 2; background: var(--bg); }
  .col-right  { grid-column: 3; grid-row: 2; background: var(--panel); border-left: 1px solid var(--border); overflow-y: auto; overflow-x: hidden; }
  /* plegada: solo queda la cabecera con el botón; el resto se esconde */
  body.left-collapsed .col-left .col-head { padding: 14px 0; justify-content: center; }
  body.left-collapsed .col-left .col-head > span,
  body.left-collapsed .col-left .new-btn,
  body.left-collapsed .col-left .chat-list { display: none; }
  body.right-collapsed .col-right .col-head { padding: 14px 0; justify-content: center; }
  body.right-collapsed .col-right .col-head > span,
  body.right-collapsed .col-right .tarea-list { display: none; }

  /* ── BARRA DEL CICLO (F21): un SENDERO que se lee de izquierda a derecha ────
     IZQUIERDA: el objetivo (forge/producto), separado del viaje.
     CENTRO: el carril del viaje — Nuevo ciclo › [fases … Cierre], con
             ◀ Retroceder / Avanzar ▶ como únicos botones; debajo, el modelo.
             "Cierre" es la última fase del recorrido, NO una puerta de salida.
     DERECHA: los mandos que no son el viaje (Pausar). */
  .cycle-bar {
    grid-column: 1 / -1; grid-row: 1;
    display: flex; align-items: center; justify-content: space-between; gap: 14px;
    padding: 8px 16px; background: var(--panel); border-bottom: 1px solid var(--border);
    overflow: visible;
  }
  .bar-left, .bar-right { display: flex; align-items: center; flex: 0 0 auto; }
  .bar-left { flex-direction: column; align-items: flex-start; gap: 1px; }
  .bar-center { flex: 1 1 auto; display: flex; flex-direction: column; align-items: center; gap: 5px; min-width: 0; }

  /* IZQUIERDA — chip del objetivo + rama debajo */
  .target-chip {
    font: inherit; font-size: 12px; font-weight: 700; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--panel-2); border: 1px solid var(--secondary); color: var(--text);
    border-radius: 999px; padding: 4px 12px;
  }
  .target-chip.is-project { border-color: #2ec16a; }
  .target-chip.is-project .tc-name { color: #2ec16a; }
  .target-chip.is-forge   .tc-name { color: var(--secondary); }
  .target-chip:hover { filter: brightness(1.12); }
  /* BLOQUEADO: fuera de "Nuevo ciclo" (fase Spike) el objetivo no se puede cambiar. */
  .target-chip:disabled { cursor: not-allowed; opacity: .55; filter: none; }
  .target-chip:disabled:hover { filter: none; }
  .target-branch { font-size: 11px; color: var(--muted); padding-left: 4px; }

  /* CENTRO — el carril del viaje */
  .rail { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; min-width: 0; }
  .rail-sep { color: var(--border); font-size: 16px; user-select: none; }
  .breadcrumb { display: flex; align-items: center; gap: 2px; flex-wrap: wrap; min-width: 0; }
  .bc-phase {
    font-size: 13px; font-weight: 600; color: var(--muted);
    padding: 3px 10px; border-radius: 7px; border: 1px solid transparent; white-space: nowrap;
  }
  .bc-phase.active {
    color: var(--accent-ink); background: var(--accent); border-color: var(--accent);
    box-shadow: 0 0 14px rgba(255,0,102,.35);
  }
  .bc-sep { color: var(--border); font-size: 14px; padding: 0 2px; user-select: none; }

  /* la PUERTA-parada de entrada ("Nuevo ciclo"): NO es una fase ni un botón de
     acción; es una parada con ajustes dentro. Borde punteado cálido + engranaje. */
  .gate { position: relative; }
  .gate-stop {
    font: inherit; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap;
    background: rgba(201,145,46,.10); color: var(--gate);
    border: 1px dashed var(--gate); border-radius: 999px; padding: 4px 12px;
  }
  .gate-stop:hover { background: rgba(201,145,46,.20); }
  .gate-pop {
    display: none; position: absolute; top: calc(100% + 8px); z-index: 40;
    width: 260px; padding: 14px; background: var(--panel-2);
    border: 1px solid var(--gate); border-radius: 10px; box-shadow: 0 10px 34px rgba(0,0,0,.5);
  }
  .gate-pop.open { display: block; }
  #gateNew .gate-pop { left: 0; }
  .gate-pop h4 { margin: 0 0 4px; font-size: 13px; }
  .gate-pop p { margin: 0 0 10px; font-size: 12px; color: var(--muted); }
  .gate-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .gate-seg { display: inline-flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .gate-seg button {
    font: inherit; font-size: 12px; font-weight: 600; cursor: pointer;
    background: transparent; color: var(--muted); border: 0; border-right: 1px solid var(--border); padding: 4px 11px;
  }
  .gate-seg button:last-child { border-right: 0; }
  .gate-seg button.active { background: var(--secondary); color: #fff; }
  .gate-pop input.gate-branch {
    width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 7px; padding: 6px 9px; font: inherit; outline: none; margin-bottom: 10px;
  }
  .gate-pop input.gate-branch:focus { border-color: var(--secondary); }
  .gate-danger {
    width: 100%; font: inherit; font-size: 12px; font-weight: 700; cursor: pointer;
    background: #b3162a; color: #fff; border: 0; border-radius: 8px; padding: 8px 10px;
  }
  .gate-danger:hover { filter: brightness(1.1); }

  /* pie del carril: el combo de modelos, abajo-derecha pero DENTRO del carril */
  .rail-foot { display: flex; align-items: center; gap: 6px; align-self: flex-end; }
  .rf-lbl { font-size: 11px; color: var(--muted); font-weight: 600; }

  .cycle-bar.offline .rail,
  .cycle-bar.offline .target-chip { opacity: .45; }
  .cycle-paused {
    font-size: 11px; font-weight: 700; color: var(--secondary);
    border: 1px solid var(--secondary); border-radius: 999px; padding: 1px 9px; margin-left: 6px;
  }

  .tp-btn {
    font: inherit; font-size: 12px; font-weight: 700; cursor: pointer;
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    border-radius: 7px; padding: 5px 12px; white-space: nowrap;
  }
  .tp-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .tp-btn:active:not(:disabled) { transform: translateY(1px); }
  .tp-btn:disabled { opacity: .4; cursor: not-allowed; }
  .tp-btn.primary:not(:disabled) { border-color: var(--accent); color: var(--accent); }

  .col-head {
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    font-weight: 600; font-size: 13px; letter-spacing: .02em;
    display: flex; align-items: center; gap: 8px; justify-content: space-between;
    background: inherit; flex: 0 0 auto;
  }
  .cycle-btn {
    font: inherit; font-size: 12px; font-weight: 600; cursor: pointer;
    background: transparent; color: var(--muted); border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 9px;
  }
  .cycle-btn:hover { color: var(--text); border-color: var(--accent); }
  /* selector de modelo (global, junto a las acciones secundarias de la barra). */
  .model-picker {
    font: inherit; font-size: 12px; font-weight: 600; cursor: pointer;
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 6px;
  }
  .model-picker:hover { border-color: var(--accent); }
  .model-picker:focus { outline: none; border-color: var(--accent); }

  .collapse-btn {
    font: inherit; font-size: 14px; line-height: 1; cursor: pointer;
    background: transparent; color: var(--muted); border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 7px; flex: 0 0 auto;
  }
  .collapse-btn:hover { color: var(--text); border-color: var(--accent); }

  .new-btn {
    margin: 12px 16px; padding: 10px 12px; width: calc(100% - 32px);
    background: var(--accent); color: var(--accent-ink); border: 0; border-radius: 8px;
    font-weight: 600; font-size: 14px; cursor: pointer;
  }
  .new-btn:hover { filter: brightness(1.08); }
  .new-btn:active { transform: translateY(1px); }

  .chat-list { list-style: none; margin: 0; padding: 4px 8px 16px; }
  .chat-item {
    padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 2px;
    border: 1px solid transparent;
  }
  .chat-item:hover { background: var(--panel-2); }
  .chat-item.active { background: var(--panel-2); border-color: var(--border); }
  .chat-item .row { display: flex; align-items: flex-start; gap: 8px; }
  .chat-item .body { flex: 1 1 auto; min-width: 0; }
  .chat-item .title { font-weight: 500; }
  .chat-item .meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
  /* botón de borrar (tarea #001): oculto hasta que el ratón pasa por la fila */
  .chat-del {
    flex: 0 0 auto; font: inherit; font-size: 14px; line-height: 1; cursor: pointer;
    background: transparent; color: var(--muted); border: 1px solid transparent;
    border-radius: 6px; padding: 2px 7px; opacity: 0; transition: opacity .12s ease;
  }
  .chat-item:hover .chat-del, .chat-item.active .chat-del { opacity: 1; }
  .chat-del:hover { color: #ff6b6b; border-color: #ff6b6b; }
  .empty { color: var(--muted); padding: 24px 16px; text-align: center; font-size: 13px; }

  /* CENTRO: hilo arriba (scroll), compositor abajo */
  .thread { flex: 1 1 auto; overflow-y: auto; padding: 20px 24px; }
  .thread .placeholder { color: var(--muted); padding: 24px 0; }

  /* árbol de mensajes (estilo reddit) */
  .node { margin: 0 0 10px; }
  .who { font-size: 11px; color: var(--muted); margin: 0 2px 3px; }
  .bubble {
    padding: 9px 13px; border-radius: 12px; background: var(--other);
    white-space: pre-wrap; word-wrap: break-word; display: inline-block; max-width: 100%;
    cursor: pointer; border: 2px solid transparent;
  }
  .bubble.tie { background: var(--tie); }
  .bubble:hover { border-color: var(--border); }
  /* pantallazo pegado: thumbnail dentro del mensaje + lightbox al clicar */
  .thumb {
    display: block; max-width: 220px; max-height: 160px; margin: 4px 0;
    border-radius: 8px; border: 1px solid var(--border); cursor: zoom-in;
  }
  .lightbox {
    display: none; position: fixed; inset: 0; z-index: 1000; padding: 24px;
    background: rgba(0,0,0,.82); align-items: center; justify-content: center; cursor: zoom-out;
  }
  .lightbox img { max-width: 95vw; max-height: 95vh; border-radius: 8px; box-shadow: 0 8px 40px rgba(0,0,0,.6); }
  /* F9b: definición FIJA de la tarea, anclada arriba del hilo */
  .tarea-def {
    flex: 0 0 auto; border-bottom: 1px solid var(--border); background: var(--panel);
    padding: 14px 24px; max-height: 40vh; overflow-y: auto;
  }
  .tarea-def .td-eyebrow { font-size: 11px; color: var(--accent); font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
  .tarea-def h2 { margin: 4px 0 6px; font-size: 16px; }
  .tarea-def .td-body { white-space: pre-wrap; color: var(--text); font-size: 13px; }
  .tarea-def .td-acts { display: flex; gap: 8px; margin-top: 10px; }
  .tarea-def .td-btn {
    font: inherit; font-size: 12px; font-weight: 600; cursor: pointer;
    border: 1px solid var(--border); background: var(--panel-2); color: var(--text); border-radius: 7px; padding: 4px 12px;
  }
  .tarea-def .td-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .tarea-def .td-btn:disabled { opacity: .5; cursor: not-allowed; }
  .tarea-def input.td-edit, .tarea-def textarea.td-edit {
    width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px; font: inherit; outline: none; margin-bottom: 8px;
  }
  .tarea-def textarea.td-edit { min-height: 90px; resize: vertical; }
  /* F22 — el mensaje SELECCIONADO es el REY: se ve muy marcado (lo más
     importante de la pantalla). Define sobre qué actúan las herramientas. */
  .node.selected > .bubble {
    border-color: var(--accent);
    background: rgba(255,0,102,.10);
    box-shadow: 0 0 0 4px rgba(255,0,102,.18), 0 0 20px rgba(255,0,102,.28);
  }
  .node.selected > .who { color: var(--accent); font-weight: 700; }

  /* contenedor de hijos: por defecto SIN sangría (la respuesta única va justo
     debajo, misma columna). Si la madre tiene varias respuestas, .branch sangra
     +1 unidad a todo el grupo y los marca con la línea del hilo. */
  .children { }
  .children.branch { padding-left: 22px; margin-left: 4px; border-left: 2px solid var(--border); }

  .reply-banner { font-size: 12px; color: var(--muted); margin-bottom: 8px; display: none; }
  .reply-banner b { color: var(--accent); }
  .reply-banner a { color: var(--accent); cursor: pointer; margin-left: 10px; text-decoration: underline; }

  /* compositor fijo abajo */
  .composer { flex: 0 0 auto; border-top: 1px solid var(--border); padding: 12px 16px 14px; background: var(--panel); }

  /* F22 — barra de SELECCIÓN: qué mensaje es el rey + sus acciones propias +
     el selector de SCOPE universal (mensaje / hilo / conversación). */
  .selection { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
  .sel-info {
    font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px;
    min-width: 0; max-width: 100%;
  }
  .sel-info b { color: var(--text); }
  .sel-info .king { color: var(--accent); }
  .sel-info .preview {
    color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 220px;
  }
  .sel-acts { display: flex; gap: 6px; }
  .sel-act {
    font: inherit; font-size: 11px; font-weight: 600; border-radius: 6px; padding: 2px 9px;
    border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer;
  }
  .sel-act:hover { color: var(--text); border-color: var(--accent); }
  .sel-act.special { color: var(--accent); border-color: var(--accent); }

  .scope-pick { display: flex; align-items: center; gap: 6px; margin-left: auto; }
  .scope-lbl { font-size: 11px; color: var(--muted); font-weight: 600; }
  .scope-seg { display: inline-flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .scope-btn {
    font: inherit; font-size: 12px; font-weight: 600; cursor: pointer;
    background: transparent; color: var(--muted); border: 0; border-right: 1px solid var(--border);
    padding: 4px 11px;
  }
  .scope-btn:last-child { border-right: 0; }
  .scope-btn:hover { color: var(--text); }
  .scope-btn.active { background: var(--accent); color: var(--accent-ink); }

  /* el área crece sola con el texto hasta 10 líneas (~232px) y luego hace scroll. */
  .composer textarea {
    width: 100%; resize: none; min-height: 64px; max-height: 232px; overflow-y: auto;
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px; font: inherit; outline: none;
  }
  .composer textarea:focus { border-color: var(--accent); }
  .composer textarea:disabled { opacity: .5; }

  /* modo de envío: cómo se porta Enter (envía / salta línea). Persiste. */
  .send-mode { display: inline-flex; align-items: center; gap: 6px; margin-left: auto; }
  .send-mode .sm-lbl { font-size: 11px; color: var(--muted); font-weight: 600; }
  .sm-seg { display: inline-flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .sm-seg button {
    font: inherit; font-size: 11px; font-weight: 600; cursor: pointer;
    background: transparent; color: var(--muted); border: 0; border-right: 1px solid var(--border); padding: 4px 10px;
  }
  .sm-seg button:last-child { border-right: 0; }
  .sm-seg button.active { background: var(--accent); color: var(--accent-ink); }

  .tools { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .tool {
    padding: 7px 14px; border-radius: 8px; font: inherit; font-weight: 600; font-size: 13px;
    border: 1px solid var(--border); background: var(--panel-2); color: var(--text); cursor: pointer;
  }
  .tool.primary { border-color: var(--accent); color: var(--accent); }
  .tool.primary:hover { background: rgba(255,0,102,.12); }
  .tool:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .tool:active:not(:disabled) { transform: translateY(1px); }
  .tool:disabled { cursor: not-allowed; opacity: .5; }

  .placeholder-pad { color: var(--muted); padding: 24px 16px; font-size: 13px; }

  /* lista de tareas (columna derecha) — agrupada por estado, ordenada por el motor */
  .tarea-list { list-style: none; margin: 0; padding: 4px 8px 16px; }
  /* cabecera de cada cajón (Revisar / En curso / Por hacer / Terminadas) */
  .tarea-grupo { color: var(--muted); font-size: 11px; font-weight: 700; letter-spacing: .05em;
    text-transform: uppercase; padding: 12px 6px 4px; }
  .tarea-grupo:first-child { padding-top: 4px; }
  .tarea-item {
    padding: 8px 10px; border-radius: 8px; margin-bottom: 4px; cursor: pointer;
    border: 1px solid var(--border); background: var(--panel-2);
  }
  .tarea-item:hover { border-color: var(--accent); }
  .tarea-item.active { border-color: var(--accent); background: rgba(255,0,102,.10); }
  /* fila principal: icono de estado + título cortísimo */
  .tarea-row { display: flex; align-items: center; gap: 8px; }
  .tarea-ico { flex: 0 0 auto; font-size: 14px; width: 18px; text-align: center; }
  .tarea-ico.rojo { color: #ff5470; }
  .tarea-ico.verde { color: #2ecc71; }   /* ✓ en master = cierre feliz */
  .tarea-item .title { font-weight: 500; flex: 1 1 auto; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  /* barrita clicable que despliega el contenedor de subtareas */
  .tarea-bar { margin-top: 7px; height: 5px; border-radius: 3px; background: var(--border);
    cursor: pointer; position: relative; overflow: hidden; }
  .tarea-bar:hover { background: var(--secondary); }
  .tarea-bar .fill { position: absolute; inset: 0 auto 0 0; background: var(--accent); opacity: .55; }
  .tarea-subs { margin: 6px 0 1px; padding-left: 4px; border-left: 2px solid var(--border); }
  .tarea-subs.hidden { display: none; }
  .tarea-sub { display: flex; align-items: center; gap: 8px; padding: 2px 0;
    font-size: 12px; color: var(--text); }
  .tarea-sub .tarea-ico { font-size: 12px; width: 16px; }
  .tarea-sub .sname { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* bloque "pensando": fantasma con barrido (shimmer) mientras el headless piensa. */
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .node.thinking { margin: 0 0 12px; }
  .bubble.skeleton-wrap { width: 240px; max-width: 70%; padding: 11px 13px; cursor: default; }
  .skeleton {
    height: 11px; border-radius: 6px; margin: 0 0 8px;
    background: linear-gradient(90deg, #14151e 25%, #26223d 50%, #14151e 75%);
    background-size: 200% 100%; animation: shimmer 1.3s linear infinite;
  }
  .skeleton:last-child { margin-bottom: 0; }

  /* cabecera central: título editable + varita de nombre automático */
  .head-title-wrap { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .chat-title {
    cursor: text; border-radius: 6px; padding: 2px 6px; margin: -2px -6px;
    outline: none; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .chat-title:hover { background: var(--panel-2); }
  .chat-title[contenteditable="true"] {
    background: var(--bg); border: 1px solid var(--accent); white-space: normal; cursor: text;
  }
  .wand-btn {
    font: inherit; font-size: 13px; line-height: 1; cursor: pointer; flex: 0 0 auto;
    background: transparent; color: var(--secondary); border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 8px;
  }
  .wand-btn:hover:not(:disabled) { color: var(--accent); border-color: var(--accent); }
  .wand-btn:disabled { opacity: .4; cursor: not-allowed; }
  .wand-btn.busy { opacity: .6; cursor: progress; }
</style>
</head>
<body>
  <!-- BARRA DEL CICLO (F21): un SENDERO izquierda→derecha.
       IZQUIERDA: el objetivo · CENTRO: el carril del viaje · DERECHA: Pausar. -->
  <header class="cycle-bar" id="cycleBar">
    <!-- IZQUIERDA: el objetivo del ciclo, separado del viaje -->
    <div class="bar-left">
      <button class="target-chip" id="targetChip" disabled title="El objetivo (forge/producto) se fija al abrir un Nuevo ciclo. No se cambia a mitad de ciclo.">
        <span class="tc-icon">🎯</span><span class="tc-name" id="targetName">forge</span>
      </button>
      <div class="target-branch" id="targetBranch"></div>
    </div>

    <!-- CENTRO: el carril del viaje (Nuevo ciclo › fases … Cierre) -->
    <div class="bar-center">
      <div class="rail" id="rail">
        <!-- únicos botones del carril: Retroceder / Avanzar (SOFT, no destruyen).
             ◀ abre el carril; el orden del viaje es: ◀ ⚙ Nuevo ciclo › Spike › … › Cierre ▶ -->
        <button class="tp-btn" id="btnBack" title="Retroceder a la fase anterior (corregir el rumbo)">◀</button>
        <!-- puerta de ENTRADA: una parada con ajustes (NO un botón de acción).
             Va ENTRE la flecha izquierda y Spike (primera parada del carril). -->
        <div class="gate" id="gateNew">
          <button class="gate-stop" id="gateNewBtn" title="Abrir los ajustes del ciclo nuevo">⚙ Nuevo ciclo</button>
          <div class="gate-pop" id="popNew">
            <h4>Nuevo ciclo</h4>
            <p>Arranca un ciclo limpio. Define sobre qué trabajar y con qué rama.</p>
            <div class="gate-row">
              <span class="rf-lbl">Objetivo</span>
              <div class="gate-seg" id="newTargetSeg">
                <button data-target="forge">forge</button>
                <button data-target="project">producto</button>
              </div>
            </div>
            <input class="gate-branch" id="newBranch" placeholder="nombre de rama (ej. ciclo/qa-barra)" />
            <button class="gate-danger" id="newStart" title="Borra el taller (conversaciones) y exige el producto limpio">⚠ Empezar ciclo — borra el taller</button>
          </div>
        </div>
        <span class="rail-sep">›</span>
        <div class="breadcrumb" id="breadcrumb"></div>
        <button class="tp-btn" id="btnAdvance" title="Avanzar a la fase siguiente (comprueba que se puede y mueve)">▶</button>
        <!-- "Cierre" ya NO es una puerta de salida: es la última fase del recorrido
             (Spike › … › QA › Cierre), se navega con las flechas como las demás. -->
      </div>
      <!-- pie del carril: el combo de modelos, abajo-derecha pero dentro del carril -->
      <div class="rail-foot">
        <span class="rf-lbl">Modelo</span>
        <select class="model-picker" id="modelPicker" title="Modelo de Claude para TODOS los personajes (Iris, Stevens, Miyagi, la pareja, William, Aubé, Anselmo, la varita)"></select>
      </div>
    </div>

    <!-- DERECHA: los mandos que no son el viaje -->
    <div class="bar-right">
      <button class="tp-btn" id="btnPause" title="Pausar / reanudar el trabajo de la fase actual">⏸ Pausar</button>
    </div>
  </header>

  <!-- IZQUIERDA: ideas (conversaciones) -->
  <aside class="col col-left">
    <div class="col-head">
      <button class="collapse-btn" id="toggleLeft" title="Plegar / desplegar la columna">«</button>
      <span>Ideas</span>
    </div>
    <button class="new-btn" id="newChat">+ Nueva conversación</button>
    <ul class="chat-list" id="chatList"></ul>
  </aside>

  <!-- CENTRO: hilo + compositor -->
  <main class="col col-center">
    <div class="col-head" id="centerHead">
      <span class="head-title-wrap">
        <span id="chatTitle" class="chat-title" title="Clic para editar el nombre">Chat</span>
        <button class="wand-btn" id="btnWand" title="Generar un nombre automático" disabled>✦</button>
      </span>
    </div>
    <!-- F9b: bloque FIJO con la definición de la tarea (solo al abrir una tarea) -->
    <div class="tarea-def" id="tareaDef" style="display:none"></div>
    <div class="thread" id="thread">
      <div class="placeholder">Crea o elige una conversación a la izquierda.</div>
    </div>
    <div class="composer">
      <!-- F22: qué mensaje es el rey + sus acciones + el scope universal -->
      <div class="selection" id="selection">
        <span class="sel-info" id="selInfo"></span>
        <span class="sel-acts" id="selActs"></span>
        <div class="scope-pick">
          <span class="scope-lbl">Alcance</span>
          <div class="scope-seg" id="scopeSeg">
            <button class="scope-btn" data-scope="mensaje" title="Actuar sobre el mensaje seleccionado">Mensaje</button>
            <button class="scope-btn" data-scope="hilo" title="Actuar sobre toda la rama que nace en el mensaje">Hilo</button>
            <button class="scope-btn" data-scope="conversacion" title="Actuar sobre la conversación entera">Conversación</button>
          </div>
        </div>
      </div>
      <div class="reply-banner" id="replyBanner"></div>
      <textarea id="input" placeholder="Escribe aquí…" disabled></textarea>
      <div class="tools" id="tools">
        <button class="tool" id="btnResponder" disabled title="Envía tu texto sin que conteste nadie (punto final)">☝️ Enviar</button>
        <button class="tool" id="btnCharlar" disabled title="Iris mira HACIA DENTRO: cómo encaja la idea en el panorama actual y qué afecta a la empresa (qué rompe, qué acelera, qué descoloca)">💬 Opinión de Iris</button>
        <button class="tool" id="btnChallenge" disabled title="William mira HACIA FUERA: qué técnicas, herramientas o ideas del mercado aplicarían bien aquí (según el alcance elegido)">⚔️ Opinión de William</button>
        <button class="tool" id="btnInvestigar" disabled title="Stevens baja al código REAL: los hechos — qué está implementado de verdad, en qué estado, el nombre exacto de una variable. Cero interpretación, solo el mapa de lo que hay">🔍 Auditar código</button>
        <button class="tool" id="btnConsejo" disabled title="Mr. Miyagi da una opinión honesta">🌿 Consejo</button>
        <button class="tool" id="btnDiscutir" disabled title="Romina o Ariel salta con un lado (al azar); vuelve a pulsar y salta el otro con el lado contrario">🙎‍♂️🙎‍♀️ Discutir</button>
        <button class="tool" id="btnResumir" disabled title="Anselmo resume el hilo (su nota se puede compactar)">📝 Resumir</button>
        <button class="tool" id="btnTarea" disabled title="Aubé baja el hilo a una tarea">❎ Crear tarea</button>
        <!-- doble modo de envío: qué hace Enter (envía / salta línea). Persiste. -->
        <div class="send-mode">
          <span class="sm-lbl">Enter:</span>
          <div class="sm-seg" id="sendModeSeg">
            <button data-mode="send" title="Enter envía · Shift+Enter salta línea">envía</button>
            <button data-mode="newline" title="Enter salta línea · Ctrl/⌘+Enter envía">salta línea</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- DERECHA: tareas (las crea Aubé al aprobar; independientes) -->
  <aside class="col col-right">
    <div class="col-head">
      <span>Tareas</span>
      <button class="collapse-btn" id="toggleRight" title="Plegar / desplegar la columna">»</button>
    </div>
    <ul class="tarea-list" id="tareaList"></ul>
  </aside>

<script>
  const listEl = document.getElementById('chatList');
  const tareaListEl = document.getElementById('tareaList');
  const tareaDefEl = document.getElementById('tareaDef');
  let currentTarea = null;   // F9b: la tarea abierta en el centro (su definición fija), o null
  const threadEl = document.getElementById('thread');
  const titleEl = document.getElementById('chatTitle');
  const btnWand = document.getElementById('btnWand');
  const inputEl = document.getElementById('input');
  const banner = document.getElementById('replyBanner');
  const selInfo = document.getElementById('selInfo');
  const selActs = document.getElementById('selActs');
  const scopeSeg = document.getElementById('scopeSeg');
  const btnResponder = document.getElementById('btnResponder');
  const btnCharlar = document.getElementById('btnCharlar');
  const btnInvestigar = document.getElementById('btnInvestigar');
  const btnConsejo = document.getElementById('btnConsejo');
  const btnDiscutir = document.getElementById('btnDiscutir');
  const btnChallenge = document.getElementById('btnChallenge');
  const btnTarea = document.getElementById('btnTarea');
  const btnResumir = document.getElementById('btnResumir');
  const composerBtns = [btnResponder, btnCharlar, btnInvestigar, btnConsejo, btnDiscutir, btnChallenge, btnTarea, btnResumir];

  // ── barra del ciclo (F21) ────────────────────────────────────────────────────
  const bcEl = document.getElementById('breadcrumb');
  const cycleBarEl = document.getElementById('cycleBar');
  const btnAdvance = document.getElementById('btnAdvance');
  const btnBack = document.getElementById('btnBack');
  const btnPause = document.getElementById('btnPause');
  const targetChip = document.getElementById('targetChip');
  const targetName = document.getElementById('targetName');
  const targetBranch = document.getElementById('targetBranch');
  // si la forja aún no expone /api/cycle, pintamos la miga de pan en gris y
  // dejamos el transporte inerte (no inventamos estado): fases canónicas de §2.
  // Espejo de LINEAR_PHASES (forge-firme.js): Cierre es la última fase del recorrido,
  // no una puerta de salida. Debe verse aun con el endpoint /api/cycle caído.
  const FALLBACK_PHASES = [
    { key: 'spike', label: 'Spike' }, { key: 'grooming', label: 'Grooming' },
    { key: 'sprint', label: 'Sprint' }, { key: 'qa', label: 'QA' },
    { key: 'cierre', label: 'Cierre' },
  ];
  let cycle = null; // último estado del ciclo, o null si el endpoint no responde

  let currentTitle = '';
  let active = null;
  let lastCount = -1;
  let lastPending = false;
  let lastSig = '';
  let pollTimer = null;
  // "pending": acabamos de enviar y esperamos la respuesta de un headless.
  let pending = false;
  let pendingBaseline = 0;
  let otherCount = 0;
  let pendingParent = null;
  let pendingAuthor = 'iris';
  // F22: el mensaje SELECCIONADO (el rey) + el SCOPE universal. La selección
  // manda sobre qué actúan las herramientas; charlar/responder cuelgan de él.
  let selectedId = null;
  let scope = 'mensaje';
  let editTarget = null;  // id del mensaje en edición (null = no estamos editando)
  let selectAfterReply = false; // Discutir: al llegar la réplica, el rey salta a ella
  let lastChat = null;    // último chat renderizado

  const NAMES = {
    tie: 'Tie', iris: 'Iris', william: 'William', anselmo: 'Anselmo', aube: 'Aubé',
    stevens: 'Stevens', miyagi: 'Mr. Miyagi', romina: 'Romina', ariel: 'Ariel', miguel: 'Miguel', sistema: 'Sistema', revisor: 'Revisor',
  };
  function nameOf(a) { return NAMES[a] || (a ? a[0].toUpperCase() + a.slice(1) : '?'); }

  // ── el ciclo: cargar, pintar y mover (transporte) ───────────────────────────
  async function loadCycle() {
    try {
      const res = await fetch('/api/cycle');
      if (!res.ok) throw new Error('no cycle');
      cycle = await res.json();
    } catch { cycle = null; }
    renderCycle();
  }

  // El objetivo (forge/producto) NUNCA se cambia desde el chip: el chip está siempre
  // deshabilitado y el único sitio para fijar forge/producto es el selector dentro de
  // la puerta "Nuevo ciclo" (que lo manda atómico en POST /api/cycle/new). Esta función
  // queda como guardia por si algo intentara dispararla pese al chip deshabilitado.
  function toggleTarget() {
    if (!cycle) return;
    alert('El objetivo (forge/producto) se fija al abrir un Nuevo ciclo.\nNo se puede cambiar a mitad de un ciclo.');
  }

  function renderCycle() {
    const phases = (cycle && cycle.phases && cycle.phases.length) ? cycle.phases : FALLBACK_PHASES;
    let curIdx = -1;
    if (cycle) {
      curIdx = (cycle.cursor != null) ? cycle.cursor : phases.findIndex((p) => p.key === cycle.phase);
    }
    // CENTRO: solo las fases del medio (las dos puertas son markup fijo del carril).
    bcEl.innerHTML = '';
    phases.forEach((p, i) => {
      if (i) {
        const sep = document.createElement('span');
        sep.className = 'bc-sep'; sep.textContent = '›';
        bcEl.appendChild(sep);
      }
      const span = document.createElement('span');
      span.className = 'bc-phase' + (i === curIdx ? ' active' : '');
      span.textContent = p.label;
      bcEl.appendChild(span);
    });
    if (cycle && cycle.paused) {
      const tag = document.createElement('span');
      tag.className = 'cycle-paused'; tag.textContent = 'pausado';
      bcEl.appendChild(tag);
    }
    // IZQUIERDA: el chip del objetivo + la rama debajo.
    const target = (cycle && cycle.target) || 'forge';
    targetName.textContent = target === 'project' ? 'producto' : 'forge';
    targetChip.classList.toggle('is-project', target === 'project');
    targetChip.classList.toggle('is-forge', target !== 'project');
    targetBranch.textContent = '⌥ ' + getBranch();
    cycleBarEl.classList.toggle('offline', !cycle);

    const avail = !!cycle;
    // BLOQUEO del objetivo: el chip está SIEMPRE deshabilitado, en todas las fases
    // (incluido Spike). "Nuevo ciclo" no es una fase del ciclo, es la puerta de
    // entrada: el ÚNICO sitio donde se fija forge/producto es el selector dentro de
    // esa puerta, que manda el objetivo atómico en POST /api/cycle/new. Una vez
    // dentro de un ciclo (Spike incluido) el objetivo ya no se toca.
    targetChip.disabled = true;
    targetChip.title = 'El objetivo (forge/producto) se fija al abrir un Nuevo ciclo. No se cambia a mitad de ciclo.';

    const paused = !!(cycle && cycle.paused);
    btnAdvance.disabled = !avail || curIdx < 0 || curIdx >= phases.length - 1;
    btnBack.disabled = !avail || curIdx <= 0;
    btnPause.disabled = !avail;
    btnPause.textContent = paused ? '▶ Reanudar' : '⏸ Pausar';
    btnPause.title = paused ? 'Reanudar el trabajo de la fase actual' : 'Pausar el trabajo de la fase actual';
  }

  // El nombre de rama del ciclo es ajuste de la puerta "Nuevo ciclo"; aún no tiene
  // backend, así que vive en localStorage (andamio honesto del Spike).
  function getBranch() { return localStorage.getItem('forge.cycleBranch') || 'sin rama'; }
  function setBranch(v) { localStorage.setItem('forge.cycleBranch', v || 'sin rama'); }

  async function cycleDo(path) {
    try {
      const res = await fetch('/api/cycle/' + path, { method: 'POST' });
      if (!res.ok) throw new Error('cycle move failed');
      cycle = await res.json();
      renderCycle();
      return true;
    } catch {
      alert('No se pudo mover el ciclo.');
      return false;
    }
  }

  // ── Avanzar / Retroceder son SOFT: no son hard actions. Primero comprueban
  // que existe la situación que permite cambiar de fase (canChangePhase) y
  // entonces mueven. NO destruyen nada: el borrado del taller vive en su guardián
  // fuerte dentro de "Nuevo ciclo". Hoy la precondición es un gancho que siempre
  // dice que sí; falta cablear los chequeos reales (¿hay diana?, ¿build verde?).
  function canChangePhase(/* dir */) {
    if (!cycle) return { ok: false, reason: 'El ciclo aún no está disponible.' };
    return { ok: true };
  }
  btnAdvance.onclick = async () => {
    const gate = canChangePhase('advance');
    if (!gate.ok) { alert(gate.reason); return; }
    await cycleDo('advance');
  };
  btnBack.onclick = async () => {
    const gate = canChangePhase('back');
    if (!gate.ok) { alert(gate.reason); return; }
    await cycleDo('back');
  };
  btnPause.onclick = () => cycleDo(cycle && cycle.paused ? 'resume' : 'pause');
  targetChip.onclick = toggleTarget;

  // ── listas ───────────────────────────────────────────────────────────────────
  async function loadList() {
    const chats = await (await fetch('/api/chats')).json();
    listEl.innerHTML = '';
    if (!chats.length) {
      listEl.innerHTML = '<li class="empty">Todavía no hay conversaciones.<br>Crea la primera.</li>';
      return chats;
    }
    for (const c of chats.slice().reverse()) {
      const li = document.createElement('li');
      li.className = 'chat-item' + (c.id === active ? ' active' : '');
      li.innerHTML = '<div class="row"><div class="body"><div class="title"></div>'
        + '<div class="meta"></div></div>'
        + '<button class="chat-del" title="Borrar conversación (definitivo)">🗑</button></div>';
      li.querySelector('.title').textContent = c.title;
      li.querySelector('.meta').textContent = '#' + c.id + ' · ' + (c.type || '');
      li.querySelector('.body').onclick = () => openChat(c.id);
      li.querySelector('.chat-del').onclick = (e) => { e.stopPropagation(); deleteChat(c); };
      listEl.appendChild(li);
    }
    return chats;
  }

  // Borra una conversación (definitivo). Si era la abierta, limpia el centro y
  // corta el sondeo. (Tarea #001 de Miguel, adaptada al árbol vivo.)
  async function deleteChat(c) {
    if (!confirm('Borrar la conversación "' + c.title + '" (#' + c.id + ')?\n\nEs definitivo: no se puede deshacer.')) return;
    const res = await fetch('/api/chats/' + c.id, { method: 'DELETE' });
    if (!res.ok && res.status !== 404) { alert('No se pudo borrar la conversación.'); return; }
    if (active === c.id) {
      active = null; currentTarea = null;
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
      lastCount = -1; pending = false;
      cancelEdit();
      inputEl.disabled = true; inputEl.value = '';
      for (const b of composerBtns) b.disabled = true;
      btnWand.disabled = true;
      currentTitle = 'Chat'; titleEl.textContent = 'Chat';
      renderTareaDef();
      threadEl.innerHTML = '<div class="placeholder">Crea o elige una conversación a la izquierda.</div>';
      updateSelectionUI();
    }
    loadList();
  }

  // qué tareas dejó el usuario desplegadas a mano (sobrevive a los refrescos del sondeo).
  const tareaAbierta = {};

  async function loadTareas() {
    let data;
    try { data = await (await fetch('/api/tareas')).json(); } catch { return; }
    // el motor ya devuelve {tareas: [decoradas+ordenadas], grupos: [...]}.
    const ts = (data && data.tareas) || [];
    const grupos = (data && data.grupos) || [];
    tareaListEl.innerHTML = '';
    if (!ts.length) {
      tareaListEl.innerHTML = '<li class="empty">Aún no hay tareas.<br>Nacen al aprobar a Aubé.</li>';
      return;
    }
    // pinta cajón a cajón en el orden del motor; salta los cajones vacíos.
    for (const g of grupos) {
      const enCajon = ts.filter((t) => t.grupo === g.key);
      if (!enCajon.length) continue;
      const head = document.createElement('li');
      head.className = 'tarea-grupo'; head.textContent = g.label;
      tareaListEl.appendChild(head);
      for (const t of enCajon) tareaListEl.appendChild(renderTareaItem(t));
    }
  }

  function renderTareaItem(t) {
    const subs = t.subtareas || [];
    const li = document.createElement('li');
    li.className = 'tarea-item';
    li.classList.toggle('active', !!(currentTarea && currentTarea.id === t.id));

    // fila: icono de estado + título cortísimo (descripción en rollover).
    const row = document.createElement('div'); row.className = 'tarea-row';
    const ico = document.createElement('span'); ico.className = 'tarea-ico' + (t.estado === 'error' ? ' rojo' : t.estado === 'enMaster' ? ' verde' : '');
    ico.textContent = t.icon;
    const title = document.createElement('div'); title.className = 'title'; title.textContent = t.title;
    row.append(ico, title);
    row.onclick = () => openTarea(t.id);   // F9b: abre la tarea en el centro
    li.appendChild(row);
    li.title = t.body || '';

    // contenedor de subtareas + barrita clicable. Despliegue AUTOMÁTICO si los
    // iconos divergen (t.diverge); si no, manual (lo recuerda tareaAbierta).
    const abierto = t.diverge || !!tareaAbierta[t.id];
    const bar = document.createElement('div'); bar.className = 'tarea-bar';
    const fill = document.createElement('div'); fill.className = 'fill';
    // la barrita rellena según el avance de la subtarea menos avanzada (0..1).
    const RANK = { error: 0, pendiente: 0, cogida: 0.4, terminada: 0.75, enMaster: 1 };
    fill.style.width = Math.round((RANK[t.estado] ?? 0) * 100) + '%';
    bar.appendChild(fill);
    bar.title = abierto ? 'Plegar subtareas' : 'Desplegar subtareas';
    bar.onclick = (e) => {
      e.stopPropagation();
      tareaAbierta[t.id] = !abierto;
      subsEl.classList.toggle('hidden');
    };
    li.appendChild(bar);

    const subsEl = document.createElement('div');
    subsEl.className = 'tarea-subs' + (abierto ? '' : ' hidden');
    for (const s of subs) {
      const se = document.createElement('div'); se.className = 'tarea-sub';
      const si = document.createElement('span'); si.className = 'tarea-ico' + (s.estado === 'error' ? ' rojo' : s.estado === 'enMaster' ? ' verde' : '');
      si.textContent = s.icon;
      const sn = document.createElement('span'); sn.className = 'sname'; sn.textContent = s.name;
      // el CARRIL de la subtarea, en el rollover: qué le toca, hasta dónde, qué no.
      const al = s.alcance;
      if (al && (al.archivos?.length || al.frontera || al.noTocar?.length)) {
        const parts = [];
        if (al.archivos?.length) parts.push('toca: ' + al.archivos.join(', '));
        if (al.frontera) parts.push('hasta: ' + al.frontera);
        if (al.noTocar?.length) parts.push('NO toca: ' + al.noTocar.join(', '));
        se.title = parts.join('\n');
      }
      se.append(si, sn);
      subsEl.appendChild(se);
    }
    li.appendChild(subsEl);
    return li;
  }

  // ── pantallazos en el mensaje: thumbnail + lightbox ──────────────────────────
  // Rellena la burbuja troceando el texto: los trozos normales van como nodos de
  // texto (a prueba de inyección, sin innerHTML) y cada ruta de pantallazo se pinta
  // como un <img> miniatura que al clicar abre el lightbox con la imagen completa.
  const IMG_RE = /pantallazos\/pantallazo-\d+\.(?:png|jpe?g|gif|webp)/g;
  function fillBubble(el, text) {
    el.textContent = '';
    const t = String(text == null ? '' : text);
    let last = 0; let m; IMG_RE.lastIndex = 0;
    while ((m = IMG_RE.exec(t)) !== null) {
      if (m.index > last) el.appendChild(document.createTextNode(t.slice(last, m.index)));
      const src = m[0];
      const img = document.createElement('img');
      img.className = 'thumb'; img.src = src; img.alt = src; img.loading = 'lazy';
      img.title = 'Clic para ver completo';
      img.onclick = (ev) => { ev.stopPropagation(); openLightbox(src); };
      el.appendChild(img);
      last = m.index + m[0].length;
    }
    if (last < t.length) el.appendChild(document.createTextNode(t.slice(last)));
  }
  function openLightbox(src) {
    let lb = document.getElementById('lightbox');
    if (!lb) {
      lb = document.createElement('div');
      lb.id = 'lightbox'; lb.className = 'lightbox';
      lb.appendChild(document.createElement('img'));
      lb.onclick = () => { lb.style.display = 'none'; };
      document.body.appendChild(lb);
    }
    lb.querySelector('img').src = src;
    lb.style.display = 'flex';
  }
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Escape') return;
    const lb = document.getElementById('lightbox');
    if (lb && lb.style.display !== 'none') lb.style.display = 'none';
  });

  // ── árbol de mensajes ─────────────────────────────────────────────────────────
  // F22: ya NO hay barra de acciones por mensaje. El nodo se SELECCIONA al hacer
  // clic en su burbuja (se vuelve el rey); las herramientas viven en la barra común.
  function renderNode(m, byParent, isProng) {
    const node = document.createElement('div');
    node.className = 'node' + (m.thinking ? ' thinking' : '') + (m.id === selectedId ? ' selected' : '');

    const who = document.createElement('div');
    who.className = 'who';
    who.textContent = m.thinking
      ? nameOf(m.author) + ' · pensando…'
      : nameOf(m.author) + ' · ' + m.type + (m.replyTo ? ' · ↳ #' + m.replyTo : '') + (m.edited ? ' · editado' : '') + '  (#' + m.id + ')'
        + (m.id === selectedId ? '  · 👑 rey' : '');
    node.appendChild(who);

    if (m.thinking) {
      node.appendChild(makeSkeletonBubble());
      return node;
    }

    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + (m.author === 'tie' ? 'tie' : 'other');
    fillBubble(bubble, m.text);
    bubble.title = 'Clic para seleccionar este mensaje (el rey)';
    bubble.onclick = () => selectMsg(m.id);
    node.appendChild(bubble);

    const kids = byParent.get(m.id) || [];
    if (kids.length) {
      const c = document.createElement('div');
      const isFork = kids.length > 1;
      // reddit: TODAS las respuestas expuestas a la vez (sin navegador ‹n/m›). Si
      // hay bifurcación (o este nodo ya es un diente de una de arriba), el grupo
      // se sangra y se marca con la línea del hilo; cada hermana es a su vez un
      // diente, así su propia continuación también se sangra.
      c.className = 'children' + (isFork || isProng ? ' branch' : '');
      for (const k of kids) c.appendChild(renderNode(k, byParent, isFork));
      node.appendChild(c);
    }
    return node;
  }

  function makeSkeletonBubble() {
    const bubble = document.createElement('div');
    bubble.className = 'bubble other skeleton-wrap';
    for (const w of [72, 92, 54]) {
      const line = document.createElement('div');
      line.className = 'skeleton';
      line.style.width = w + '%';
      bubble.appendChild(line);
    }
    return bubble;
  }

  const THINKING_ID = '__thinking__';

  function renderThread(chat) {
    lastChat = chat;
    const real = (chat.messages || []).filter((m) => !m.collapsed);
    // F22: SIEMPRE hay un rey. Si no había selección (o el rey desapareció tras
    // compactar/borrar), cae al último mensaje real — el que naturalmente
    // responderías/discutirías.
    if (real.length && (selectedId == null || !real.some((m) => m.id === selectedId))) {
      selectedId = real[real.length - 1].id;
    }
    if (titleEl.getAttribute('contenteditable') !== 'true') {
      currentTitle = chat.title;
      titleEl.textContent = chat.title;
    }

    const present = new Set(real.map((m) => m.id));
    const msgs = real.slice();
    if (pending) {
      const parent = (pendingParent != null && present.has(pendingParent)) ? pendingParent : null;
      msgs.push({ id: THINKING_ID, author: pendingAuthor, type: 'pensando', replyTo: parent, thinking: true, text: '' });
    }

    if (!msgs.length) {
      threadEl.innerHTML = '<div class="placeholder">Hilo vacío. Escribe abajo y pulsa Enviar u Opinión de Iris.</div>';
      updateSelectionUI();
      return;
    }
    const byParent = new Map();
    for (const m of msgs) {
      const k = (m.replyTo != null && present.has(m.replyTo)) ? m.replyTo : 'root';
      if (!byParent.has(k)) byParent.set(k, []);
      byParent.get(k).push(m);
    }
    const roots = byParent.get('root') || [];
    threadEl.innerHTML = '';
    const frag = document.createDocumentFragment();
    const rootsAreProngs = roots.length > 1;
    for (const r of roots) frag.appendChild(renderNode(r, byParent, rootsAreProngs));
    threadEl.appendChild(frag);
    threadEl.scrollTop = threadEl.scrollHeight;
    updateSelectionUI();
  }

  // ── F22: selección (el rey) + scope universal ───────────────────────────────
  function findMsg(id) {
    if (id == null || !lastChat) return null;
    return (lastChat.messages || []).find((m) => m.id === id) || null;
  }

  function selectMsg(id) {
    if (selectedId === id) return; // siempre hay un rey: no se deselecciona
    selectedId = id;
    if (lastChat) renderThread(lastChat); else updateSelectionUI();
  }

  // Pinta la barra de selección: qué es el rey, sus acciones propias (editar /
  // compactar / aprobar según el autor) y resalta el scope activo.
  function updateSelectionUI() {
    const m = findMsg(selectedId);
    selInfo.innerHTML = '';
    selActs.innerHTML = '';
    if (m) {
      const lbl = document.createElement('span');
      lbl.innerHTML = 'Sobre <span class="king">👑 #' + m.id + ' · ' + nameOf(m.author) + '</span>';
      selInfo.appendChild(lbl);
      const prev = document.createElement('span');
      prev.className = 'preview';
      prev.textContent = '“' + (m.text || '').replace(/\s+/g, ' ').slice(0, 60) + '”';
      selInfo.appendChild(prev);

      // acciones propias del mensaje rey
      selActs.appendChild(selActBtn('Editar', () => startEdit(m)));
      if (m.author === 'anselmo') selActs.appendChild(selActBtn('Compactar', () => compactar(m.id), true));
      if (m.author === 'aube') selActs.appendChild(selActBtn('Aprobar', () => aprobarTarea(), true));
      // el informe de Miguel es de QUIEN construyó → de ahí cuelga "Traer el código".
      // Solo en mensajes de Miguel; habilitado si hay algo que traer, si no, gris.
      if (m.author === 'miguel' && currentTarea) {
        // El cierre es AUTOMÁTICO al terminar Miguel (auto-merge a master). Este botón
        // es el reintento MANUAL (p.ej. si el auto-merge petó y quieres reintentar).
        const b = selActBtn('⬇ Subir a master', () => traerTarea(currentTarea.id), true);
        b.disabled = true; b.title = 'Comprobando…';
        selActs.appendChild(b);
        // habilita el reintento salvo que ya esté en master (cierre feliz).
        fetch('/api/tareas/' + currentTarea.id + '/traible').then((r) => r.json()).then((s) => {
          b.disabled = !s.traible;
          b.title = s.traible ? 'Trae todo el arbolito y lo sube a master (commit)'
            : (s.reason === 'ya en master' ? 'Ya está en master ✓' : 'Nada que subir');
        }).catch(() => {});
      }
    } else {
      const lbl = document.createElement('span');
      lbl.innerHTML = active ? 'Escribe abajo para empezar el hilo'
                             : 'Elige una conversación a la izquierda';
      selInfo.appendChild(lbl);
    }

    for (const b of scopeSeg.querySelectorAll('.scope-btn')) {
      b.classList.toggle('active', b.dataset.scope === scope);
    }
  }

  function selActBtn(label, fn, special) {
    const b = document.createElement('button');
    b.className = 'sel-act' + (special ? ' special' : '');
    b.textContent = label;
    b.onclick = fn;
    return b;
  }

  for (const b of scopeSeg.querySelectorAll('.scope-btn')) {
    b.onclick = () => {
      scope = b.dataset.scope;
      // si pide mensaje/hilo sin rey, el scope se aplicará al último mensaje.
      updateSelectionUI();
    };
  }

  // El objetivo (targetId) de las acciones de agente: el rey si lo hay, si no el
  // último mensaje del hilo (los endpoints siempre necesitan un mensaje válido).
  function actionTarget() {
    if (selectedId != null && findMsg(selectedId)) return selectedId;
    return lastMsgId();
  }
  function lastMsgId() {
    const ms = ((lastChat && lastChat.messages) || []).filter((m) => !m.collapsed);
    return ms.length ? ms[ms.length - 1].id : null;
  }

  // ── editar ───────────────────────────────────────────────────────────────────
  function startEdit(m) {
    editTarget = m.id;
    inputEl.value = m.text;
    banner.style.display = 'block';
    banner.innerHTML = 'Editando <b>#' + m.id + '</b><a id="confEdit">confirmar</a><a id="cancEdit">cancelar</a>';
    banner.querySelector('#confEdit').onclick = confirmEdit;
    banner.querySelector('#cancEdit').onclick = cancelEdit;
    inputEl.focus();
  }
  function cancelEdit() {
    editTarget = null;
    inputEl.value = '';
    banner.style.display = 'none';
    banner.innerHTML = '';
  }
  async function confirmEdit() {
    if (editTarget == null || !active) return;
    const text = inputEl.value.trim();
    if (!text) return;
    const msgId = editTarget;
    const res = await fetch('/api/chats/' + active + '/edit', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ msgId, text }),
    });
    if (!res.ok) { alert('No se pudo editar.'); return; }
    cancelEdit();
    lastSig = ''; refreshThread();
  }

  // ── enviar (Tie escribe) ──────────────────────────────────────────────────────
  // charlar/responder cuelgan del REY si hay uno seleccionado (replyTo), si no, raíz.
  async function responder() {
    if (editTarget != null) return confirmEdit();
    const text = inputEl.value.trim();
    if (!text || !active) return;
    const res = await fetch('/api/chats/' + active + '/responder', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, replyTo: selectedId }),
    });
    if (!res.ok) { alert('No se pudo enviar.'); return; }
    inputEl.value = '';
    lastSig = ''; refreshThread();  // punto final: nadie contesta
  }

  async function charlar() {
    if (editTarget != null) return confirmEdit();
    const text = inputEl.value.trim();
    if (!active) return;
    // input vacío SÍ vale si hay un bloque seleccionado: Iris arranca la charla
    // sobre él por iniciativa propia. Sin texto y sin rey no hay nada que hacer.
    if (!text && selectedId == null) return;
    btnCharlar.disabled = true;
    const res = await fetch('/api/chats/' + active + '/charla', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, replyTo: selectedId, scope }),
    });
    btnCharlar.disabled = false;
    if (!res.ok) { alert('No se pudo enviar.'); return; }
    const j = await res.json().catch(() => ({}));
    inputEl.value = '';
    pending = true; pendingBaseline = otherCount; pendingAuthor = 'iris';
    pendingParent = j.pendingParent != null ? j.pendingParent
      : (j.message && j.message.id != null ? j.message.id : null);
    lastSig = ''; refreshThread();
  }

  // ── acciones de agente sobre (target, scope) ────────────────────────────────
  // Convención común del contrato: body { scope, targetId, steer } → 202 { pendingParent }.
  // `steer` (opción C) = lo que tengas escrito en la caja: un SUSURRO al agente
  // que NO se publica en el chat; el personaje decide si lo menciona o no. Se
  // consume (se vacía la caja) al enviarse.
  async function spikeAction(path, author) {
    if (!active) return;
    const targetId = actionTarget();
    if (targetId == null && !currentTarea) { alert('No hay ningún mensaje sobre el que actuar. Escribe algo primero.'); return; }
    const steer = inputEl.value.trim();
    const res = await fetch('/api/chats/' + active + '/' + path, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ scope, targetId, steer }),
    });
    if (!res.ok) { alert('No se pudo lanzar.'); return; }
    const j = await res.json().catch(() => ({}));
    if (steer) inputEl.value = '';
    pending = true; pendingBaseline = otherCount; pendingAuthor = author;
    pendingParent = j.pendingParent != null ? j.pendingParent : targetId;
    lastSig = ''; refreshThread();
  }

  // Challenge usa el mismo (target, scope, steer). El motor cuelga la respuesta del objetivo.
  async function challengeAction() {
    if (!active) return;
    const targetId = actionTarget();
    if (targetId == null && !currentTarea) { alert('No hay ningún mensaje que cuestionar.'); return; }
    const steer = inputEl.value.trim();
    const res = await fetch('/api/chats/' + active + '/challenge', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ targetId, scope, steer }),
    });
    if (!res.ok) { alert('No se pudo lanzar el challenge.'); return; }
    const j = await res.json().catch(() => ({}));
    if (steer) inputEl.value = '';
    pending = true; pendingBaseline = otherCount; pendingAuthor = 'william';
    pendingParent = j.pendingParent != null ? j.pendingParent : targetId;
    lastSig = ''; refreshThread();
  }

  // ── Discutir: Romina y Ariel, turno a turno ──────────────────────────────────
  // Genera UN solo mensaje. Si el rey NO es de la pareja, se elige autor y lado
  // al AZAR. Si el rey YA es de la pareja, salta EL OTRO con el lado CONTRARIO.
  // La réplica cuelga del rey (cadena) y la selección salta a ella, así el
  // siguiente Discutir lo coge el otro y la pelea sigue mientras pulses.
  async function discutir() {
    if (!active) return;
    const targetId = actionTarget();
    if (targetId == null && !currentTarea) { alert('No hay nada sobre lo que discutir.'); return; }
    const king = findMsg(targetId);
    let author, stance;
    const flip = (s) => (s === 'defiende' ? 'rechaza' : s === 'rechaza' ? 'defiende' : null);
    if (king && (king.author === 'romina' || king.author === 'ariel')) {
      author = king.author === 'romina' ? 'ariel' : 'romina';        // el otro de la pareja
      stance = flip(king.stance) || (Math.random() < 0.5 ? 'defiende' : 'rechaza'); // el lado contrario
    } else {
      author = Math.random() < 0.5 ? 'romina' : 'ariel';             // azar
      stance = Math.random() < 0.5 ? 'defiende' : 'rechaza';         // azar
    }
    const steer = inputEl.value.trim();
    const res = await fetch('/api/chats/' + active + '/discutir', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ scope, targetId, author, stance, steer }),
    });
    if (!res.ok) { alert('No se pudo lanzar la discusión.'); return; }
    const j = await res.json().catch(() => ({}));
    if (steer) inputEl.value = '';
    pending = true; pendingBaseline = otherCount; pendingAuthor = author;
    pendingParent = j.pendingParent != null ? j.pendingParent : targetId;
    selectAfterReply = true;   // al llegar la réplica, el rey salta a ella
    lastSig = ''; refreshThread();
  }

  // ── Anselmo (resumir) + compactar ────────────────────────────────────────────
  async function anselmo() {
    if (!active) return;
    const steer = inputEl.value.trim();   // lo escrito (o el pantallazo): susurro, no se pierde
    const res = await fetch('/api/chats/' + active + '/anselmo', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ steer }),
    });
    if (!res.ok) { alert('No se pudo resumir.'); return; }
    const j = await res.json().catch(() => ({}));
    if (steer) inputEl.value = '';
    pending = true; pendingBaseline = otherCount; pendingAuthor = 'anselmo';
    pendingParent = j.pendingParent != null ? j.pendingParent : lastMsgId();
    lastSig = ''; refreshThread();
  }
  async function compactar(noteId) {
    if (!active) return;
    const res = await fetch('/api/chats/' + active + '/compactar', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ noteId }),
    });
    if (!res.ok) { alert('No se pudo compactar.'); return; }
    lastSig = ''; refreshThread();
  }

  // ── Aubé (crear tarea) + aprobar ─────────────────────────────────────────────
  async function aube() {
    if (!active) return;
    const steer = inputEl.value.trim();   // lo escrito (o el pantallazo): susurro a Aubé, no se pierde
    const res = await fetch('/api/chats/' + active + '/aube', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ steer }),
    });
    if (!res.ok) { alert('No se pudo crear la tarea.'); return; }
    const j = await res.json().catch(() => ({}));
    if (steer) inputEl.value = '';
    if (!j.replacing) {
      pending = true; pendingBaseline = otherCount; pendingAuthor = 'aube';
      pendingParent = j.pendingParent;
    }
    lastSig = ''; refreshThread();
  }
  async function aprobarTarea() {
    if (!active) return;
    const res = await fetch('/api/tareas', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fromChat: active }),
    });
    if (!res.ok) { alert('No se pudo aprobar la tarea.'); return; }
    loadTareas();
  }

  async function refreshThread() {
    if (!active) return;
    const res = await fetch('/api/chats/' + active);
    if (!res.ok) return;
    const chat = await res.json();
    const msgs = chat.messages || [];
    otherCount = msgs.filter((m) => m.author !== 'tie').length;
    let justArrived = false;
    if (pending && otherCount > pendingBaseline) { pending = false; justArrived = true; }
    // Discutir: al llegar la réplica de Romina/Ariel el rey salta a ella, para
    // que el siguiente Discutir lo coja el otro de la pareja.
    if (justArrived && selectAfterReply) {
      const mine = msgs.filter((m) => !m.collapsed && m.author === pendingAuthor);
      const real = msgs.filter((m) => !m.collapsed);
      if (mine.length) selectedId = mine[mine.length - 1].id;
      else if (real.length) selectedId = real[real.length - 1].id;
      selectAfterReply = false;
    }
    const n = msgs.length;
    const sig = msgs.map((m) =>
      m.id + ':' + (m.text || '').length + ':' + (m.collapsed ? 1 : 0) + ':' + m.replyTo + ':' + (m.editedAt || '')).join('|');
    if (n !== lastCount || pending !== lastPending || sig !== lastSig) {
      lastCount = n; lastPending = pending; lastSig = sig; renderThread(chat);
    }
  }

  // Abre un chat en el centro. `tarea` (F9b) = la tarea cuya pizarra es este hilo:
  // si viene, se pinta su definición FIJA arriba; si no, es una conversación normal.
  function openChat(id, tarea = null) {
    active = id;
    currentTarea = tarea || null;
    lastCount = -1; lastPending = false; lastSig = '';
    pending = false; otherCount = 0; pendingParent = null; pendingAuthor = 'iris';
    selectedId = null; scope = 'mensaje'; editTarget = null; selectAfterReply = false;
    cancelEdit();
    inputEl.disabled = false;
    for (const b of composerBtns) b.disabled = false;
    btnWand.disabled = false;
    updateSelectionUI();
    renderTareaDef();
    refreshThread();
    loadList();
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(refreshThread, 1500); // ve llegar las respuestas de los headless
  }

  // ── F9b: abrir una tarea (clic en la columna derecha) ────────────────────────
  // Pide su hilo propio (lo crea perezoso la 1ª vez) y abre ese hilo con la
  // definición fija arriba. El hilo es un chat normal: charlar/challenge/… valen.
  async function openTarea(id) {
    let t;
    try { t = await (await fetch('/api/tareas/' + id + '/open', { method: 'POST' })).json(); }
    catch { alert('No se pudo abrir la tarea.'); return; }
    if (!t || !t.threadId) { alert('No se pudo abrir la tarea.'); return; }
    openChat(t.threadId, t);
    loadTareas();
  }

  // Pinta (o esconde) el bloque fijo con la definición de la tarea actual.
  function renderTareaDef() {
    if (!currentTarea) { tareaDefEl.style.display = 'none'; tareaDefEl.innerHTML = ''; return; }
    const t = currentTarea;
    tareaDefEl.style.display = 'block';
    tareaDefEl.innerHTML = '';
    const eye = document.createElement('div'); eye.className = 'td-eyebrow';
    eye.textContent = 'Tarea #' + t.id;
    const h = document.createElement('h2'); h.textContent = t.title || ('Tarea ' + t.id);
    const body = document.createElement('div'); body.className = 'td-body'; body.textContent = t.body || '(sin definición todavía)';
    const acts = document.createElement('div'); acts.className = 'td-acts';
    const edit = document.createElement('button'); edit.className = 'td-btn'; edit.textContent = '✎ Editar definición';
    edit.onclick = startEditTareaDef;
    const rev = document.createElement('button'); rev.className = 'td-btn'; rev.textContent = '✦ Revisar (Aubé)';
    rev.disabled = true; rev.title = 'Próximamente: Aubé reescribe la definición desde el hilo';
    const ejec = document.createElement('button'); ejec.className = 'td-btn'; ejec.textContent = '🔨 Ejecutar';
    ejec.title = 'Miguel construye la tarea en un worktree aislado y reporta en el hilo';
    ejec.onclick = () => ejecutarTarea(t.id);
    acts.append(edit, ejec, rev);
    // "Traer el código" YA NO vive aquí: cuelga del informe de Miguel en el hilo
    // (es de quien construyó), igual que Aprobar cuelga de Aubé.
    tareaDefEl.append(eye, h, body, acts);
  }

  // Subir a master: trae TODO el arbolito (commits de la rama + cambios sueltos) al
  // árbol vivo y lo COMMITEA a master. Si choca, el revisor lo resuelve y reintenta
  // (tope 3); si no entra, la tarea queda en error (✕). El cierre normal es
  // AUTOMÁTICO al terminar Miguel; esto es el reintento manual.
  async function traerTarea(id) {
    if (!confirm('¿Subir a master el trabajo de esta tarea?\n\nSe trae todo el arbolito y se commitea a master. Si choca, el revisor resuelve el merge (reintenta hasta 3 veces).')) return;
    let j;
    try { j = await (await fetch('/api/tareas/' + id + '/traer', { method: 'POST' })).json(); }
    catch { alert('No se pudo subir a master.'); return; }
    if (j.applied && j.enMaster) alert('✅ En master.\nCommiteado. Si tocó el back, reinicia el forge; refresca para ver los cambios del front.');
    else if (j.empty) alert('El build no dejó ningún cambio.');
    else if (j.incompatible) alert('⚠️ ' + (j.error || 'El build no encaja con tu árbol actual.') + '\n\n(Este build es viejo: vuelve a pulsar 🔨 Ejecutar.)');
    else alert('No entró en master: ' + (j.error || 'error') + '\n\nLa tarea queda en revisar (✕).');
    lastSig = ''; refreshThread(); loadTareas();
  }

  // Ejecutar: lanza a Miguel a construir la tarea (worktree aislado). Reporta en el hilo.
  async function ejecutarTarea(id) {
    if (!confirm('¿Ejecutar la tarea?\n\nMiguel la construye en una copia aislada (worktree), sin tocar el árbol vivo, y reporta aquí cuando termine (tarda un rato).')) return;
    let j;
    try {
      j = await (await fetch('/api/tareas/' + id + '/ejecutar', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ steer: inputEl.value.trim() }),
      })).json();
    } catch { alert('No se pudo ejecutar.'); return; }
    if (!j || !j.spawned) { alert('No se pudo ejecutar: ' + ((j && j.error) || 'error')); return; }
    inputEl.value = '';
    // ya NO ponemos fantasma "pensando": Miguel tiene un mensaje VIVO que se va
    // reescribiendo con el resumen en vivo (Haiku). El sondeo lo muestra y actualiza.
    lastSig = ''; refreshThread();
  }

  // Edición a mano de la definición: cambia título/cuerpo por campos editables.
  function startEditTareaDef() {
    if (!currentTarea) return;
    const t = currentTarea;
    tareaDefEl.innerHTML = '';
    const eye = document.createElement('div'); eye.className = 'td-eyebrow'; eye.textContent = 'Editando tarea #' + t.id;
    const ti = document.createElement('input'); ti.className = 'td-edit'; ti.value = t.title || ''; ti.placeholder = 'Título';
    const bo = document.createElement('textarea'); bo.className = 'td-edit'; bo.value = t.body || ''; bo.placeholder = 'Definición de la tarea';
    const acts = document.createElement('div'); acts.className = 'td-acts';
    const save = document.createElement('button'); save.className = 'td-btn'; save.textContent = 'Guardar';
    const cancel = document.createElement('button'); cancel.className = 'td-btn'; cancel.textContent = 'Cancelar';
    save.onclick = async () => {
      try {
        const upd = await (await fetch('/api/tareas/' + t.id + '/definicion', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: ti.value, body: bo.value }),
        })).json();
        currentTarea = { ...t, ...upd };
      } catch { alert('No se pudo guardar la definición.'); }
      renderTareaDef(); loadTareas();
    };
    cancel.onclick = renderTareaDef;
    acts.append(save, cancel);
    tareaDefEl.append(eye, ti, bo, acts);
    ti.focus();
  }

  // ── enlaces de los botones del compositor ───────────────────────────────────
  // El botón que pulses se vuelve el DEFECTO (resaltado) y es lo que dispara
  // Enter. Se recuerda entre recargas (localStorage).
  const ACTIONS = {
    responder:  { btn: btnResponder,  run: responder },
    charlar:    { btn: btnCharlar,    run: charlar },
    investigar: { btn: btnInvestigar, run: () => spikeAction('investigar', 'stevens') },
    consejo:    { btn: btnConsejo,    run: () => spikeAction('consejo', 'miyagi') },
    discutir:   { btn: btnDiscutir,   run: discutir },
    challenge:  { btn: btnChallenge,  run: challengeAction },
    tarea:      { btn: btnTarea,      run: aube },
    resumir:    { btn: btnResumir,    run: anselmo },
  };
  let defaultAction = localStorage.getItem('forge.defaultAction') || 'charlar';
  if (!ACTIONS[defaultAction]) defaultAction = 'charlar';

  function setDefaultAction(key) {
    defaultAction = key;
    localStorage.setItem('forge.defaultAction', key);
    for (const [k, a] of Object.entries(ACTIONS)) a.btn.classList.toggle('primary', k === defaultAction);
  }
  for (const [k, a] of Object.entries(ACTIONS)) {
    a.btn.onclick = () => { setDefaultAction(k); a.run(); };
  }
  setDefaultAction(defaultAction); // pinta el defecto al cargar

  // ── doble modo de envío + autocrecer ────────────────────────────────────────
  // El área crece sola con el texto hasta 10 líneas y luego hace scroll. El modo
  // de envío decide qué hace Enter, y persiste entre recargas:
  //   · 'send'    → Enter envía, Shift+Enter salta línea (el clásico de chat).
  //   · 'newline' → Enter salta línea, Ctrl/⌘+Enter envía (cómodo para textos largos).
  const sendModeSeg = document.getElementById('sendModeSeg');
  let sendMode = localStorage.getItem('forge.sendMode') || 'send';
  if (sendMode !== 'send' && sendMode !== 'newline') sendMode = 'send';
  function setSendMode(m) {
    sendMode = m;
    localStorage.setItem('forge.sendMode', m);
    for (const b of sendModeSeg.querySelectorAll('button')) b.classList.toggle('active', b.dataset.mode === m);
  }
  for (const b of sendModeSeg.querySelectorAll('button')) b.onclick = () => setSendMode(b.dataset.mode);
  setSendMode(sendMode);

  function fireSend() {
    if (editTarget != null) confirmEdit(); else ACTIONS[defaultAction].run();
  }
  inputEl.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    const withMod = e.ctrlKey || e.metaKey;
    if (sendMode === 'send') {
      if (!e.shiftKey && !withMod) { e.preventDefault(); fireSend(); }   // Enter envía
    } else {
      if (withMod) { e.preventDefault(); fireSend(); }                   // Ctrl/⌘+Enter envía
    }
  });

  // Autocrecer: ajusta la altura al contenido (máx. 10 líneas vía max-height CSS).
  function autoGrow() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 232) + 'px';
  }
  inputEl.addEventListener('input', autoGrow);
  // tras un envío el código vacía .value sin disparar 'input'; al volver a la caja
  // recolocamos la altura para que no se quede estirada en falso.
  inputEl.addEventListener('focus', autoGrow);

  // Pegar un pantallazo: si el portapapeles trae imagen, la subimos a
  // pantallazos/ y metemos su ruta en el mensaje (en el cursor). Sin dar vueltas.
  function insertAtCursor(el, text) {
    const s = (el.selectionStart != null) ? el.selectionStart : el.value.length;
    const e2 = (el.selectionEnd != null) ? el.selectionEnd : el.value.length;
    el.value = el.value.slice(0, s) + text + el.value.slice(e2);
    el.selectionStart = el.selectionEnd = s + text.length;
  }
  inputEl.addEventListener('paste', async (e) => {
    const items = (e.clipboardData && e.clipboardData.items) || [];
    const imgs = [...items].filter((it) => it.kind === 'file' && it.type.startsWith('image/'));
    if (!imgs.length) return;            // pegado de texto normal: que siga su curso
    e.preventDefault();
    for (const it of imgs) {
      const blob = it.getAsFile();
      if (!blob) continue;
      try {
        const res = await fetch('/api/pantallazo', {
          method: 'POST', headers: { 'Content-Type': blob.type || 'image/png' }, body: blob,
        });
        const j = await res.json().catch(() => ({}));
        if (res.ok && j.path) insertAtCursor(inputEl, j.path + ' ');
        else alert('No se pudo guardar el pantallazo.');
      } catch { alert('No se pudo subir el pantallazo.'); }
    }
    inputEl.focus();
  });

  // ── título: editable al clic + varita de nombre automático ──────────────────
  async function saveTitle(title) {
    if (!active) return;
    const res = await fetch('/api/chats/' + active + '/title', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title }),
    });
    if (!res.ok) { titleEl.textContent = currentTitle; return; }
    const j = await res.json();
    currentTitle = j.chat.title;
    titleEl.textContent = currentTitle;
    loadList();
  }

  titleEl.addEventListener('click', () => {
    if (!active || titleEl.getAttribute('contenteditable') === 'true') return;
    titleEl.setAttribute('contenteditable', 'true');
    titleEl.focus();
    const sel = window.getSelection();
    if (sel) { sel.selectAllChildren(titleEl); }
  });
  titleEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); titleEl.blur(); }
    else if (e.key === 'Escape') { titleEl.textContent = currentTitle; titleEl.blur(); }
  });
  titleEl.addEventListener('blur', () => {
    titleEl.setAttribute('contenteditable', 'false');
    const t = titleEl.textContent.replace(/\s+/g, ' ').trim();
    if (!t || t === currentTitle) { titleEl.textContent = currentTitle; return; }
    saveTitle(t);
  });

  btnWand.onclick = async () => {
    if (!active || btnWand.disabled) return;
    btnWand.disabled = true; btnWand.classList.add('busy');
    try {
      const res = await fetch('/api/chats/' + active + '/autoname', { method: 'POST' });
      if (res.ok) {
        const j = await res.json();
        currentTitle = j.chat.title;
        titleEl.textContent = currentTitle;
        loadList();
      } else {
        alert('No se pudo generar el nombre.');
      }
    } catch {
      alert('No se pudo generar el nombre.');
    }
    btnWand.classList.remove('busy');
    btnWand.disabled = false;
  };

  // ── la PUERTA-parada de entrada del carril: abre un popover de ajustes ──────
  // Clic fuera la cierra. NO es un botón de acción. (La salida "Cierre" ya no es
  // una puerta: es la última fase del recorrido, se navega con las flechas.)
  const popNew = document.getElementById('popNew');
  function closeGates() { popNew.classList.remove('open'); }
  function toggleGate(pop) {
    const willOpen = !pop.classList.contains('open');
    closeGates();
    if (willOpen) pop.classList.add('open');
  }
  document.getElementById('gateNewBtn').onclick = (e) => { e.stopPropagation(); syncNewGate(); toggleGate(popNew); };
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.gate')) closeGates();
  });

  // Ajustes dentro de "Nuevo ciclo": objetivo (forge/producto) + nombre de rama.
  const newTargetSeg = document.getElementById('newTargetSeg');
  const newBranch = document.getElementById('newBranch');
  let newTargetChoice = (cycle && cycle.target) || 'forge';
  function syncNewGate() {
    newTargetChoice = (cycle && cycle.target) || newTargetChoice || 'forge';
    for (const b of newTargetSeg.querySelectorAll('button')) {
      b.classList.toggle('active', b.dataset.target === newTargetChoice);
    }
    if (!newBranch.value) newBranch.value = (getBranch() === 'sin rama' ? '' : getBranch());
  }
  for (const b of newTargetSeg.querySelectorAll('button')) {
    b.onclick = () => {
      newTargetChoice = b.dataset.target;
      for (const x of newTargetSeg.querySelectorAll('button')) x.classList.toggle('active', x === b);
    };
  }

  // El GUARDIÁN fuerte del borrado vive AQUÍ (ya no en Avanzar): el botón rojo de
  // la puerta de entrada. Confirma, fija objetivo + rama, y barre el taller.
  document.getElementById('newStart').onclick = async () => {
    if (!confirm('Empezar un ciclo nuevo borra TODAS las conversaciones del taller y abre el backlog.\nSolo funciona si el producto (project/) está limpio.\n\n¿Seguir?')) return;
    setBranch(newBranch.value.trim());
    // El objetivo elegido en la puerta viaja DENTRO de /api/cycle/new: ahí el cambio
    // es atómico con el reinicio a Spike (el endpoint suelto /api/cycle/target está
    // bloqueado fuera de Spike). Así "Nuevo ciclo" es el único sitio que lo fija.
    const res = await fetch('/api/cycle/new', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ target: newTargetChoice }),
    });
    if (res.status === 409) {
      const j = await res.json();
      let msg = j.error || 'No se pudo.';
      if (j.pending && j.pending.length) msg += '\n\nPendiente:\n' + j.pending.slice(0, 20).join('\n');
      alert(msg);
      return;
    }
    if (!res.ok) { alert('No se pudo empezar el ciclo.'); return; }
    const j = await res.json();
    closeGates();
    loadCycle();           // el ciclo vuelve a Spike: refresca el carril
    await loadList();
    openChat(j.chat.id);
    pending = true; pendingBaseline = 0; pendingParent = null; pendingAuthor = 'iris';
    lastSig = ''; refreshThread();
  };

  document.getElementById('newChat').onclick = async () => {
    const res = await fetch('/api/chats', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'charla' }),
    });
    if (!res.ok) { alert('No se pudo crear la conversación.'); return; }
    const c = await res.json();
    await loadList();
    openChat(c.id);
  };

  // ── plegado de columnas (recuerda el estado entre recargas) ─────────────────
  const toggleLeft = document.getElementById('toggleLeft');
  function applyLeftState() {
    const collapsed = localStorage.getItem('forge.leftCollapsed') === '1';
    document.body.classList.toggle('left-collapsed', collapsed);
    toggleLeft.textContent = collapsed ? '»' : '«';
    toggleLeft.title = collapsed ? 'Desplegar la columna' : 'Plegar la columna';
  }
  toggleLeft.onclick = () => {
    const collapsed = !document.body.classList.contains('left-collapsed');
    localStorage.setItem('forge.leftCollapsed', collapsed ? '1' : '0');
    applyLeftState();
  };
  applyLeftState();

  const toggleRight = document.getElementById('toggleRight');
  function applyRightState() {
    const collapsed = localStorage.getItem('forge.rightCollapsed') === '1';
    document.body.classList.toggle('right-collapsed', collapsed);
    toggleRight.textContent = collapsed ? '«' : '»';
    toggleRight.title = collapsed ? 'Desplegar la columna' : 'Plegar la columna';
  }
  toggleRight.onclick = () => {
    const collapsed = !document.body.classList.contains('right-collapsed');
    localStorage.setItem('forge.rightCollapsed', collapsed ? '1' : '0');
    applyRightState();
  };
  applyRightState();

  // ── selector de modelo (global: aplica a TODOS los headless) ────────────────
  const modelPickerEl = document.getElementById('modelPicker');
  async function loadModel() {
    try {
      const res = await fetch('/api/model');
      if (!res.ok) throw new Error('no model');
      const { model, choices } = await res.json();
      modelPickerEl.innerHTML = '';
      (choices || []).forEach((c) => {
        const opt = document.createElement('option');
        opt.value = c.value; opt.textContent = c.label;
        if (c.value === (model || '')) opt.selected = true;
        modelPickerEl.appendChild(opt);
      });
      modelPickerEl.disabled = false;
    } catch {
      // si la forja aún no expone /api/model, apaga el selector (sin sorpresas).
      modelPickerEl.innerHTML = '<option>—</option>';
      modelPickerEl.disabled = true;
    }
  }
  modelPickerEl.onchange = async () => {
    try {
      const res = await fetch('/api/model', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: modelPickerEl.value }),
      });
      if (!res.ok) throw new Error('save failed');
    } catch { alert('No se pudo guardar el modelo.'); }
  };

  // ── arranque ─────────────────────────────────────────────────────────────────
  async function init() {
    loadCycle();
    loadModel();
    loadTareas();
    updateSelectionUI();
    const chats = await loadList();
    if (!chats || !chats.length) {
      try {
        const res = await fetch('/api/chats/bootstrap', { method: 'POST' });
        if (res.ok) {
          const j = await res.json();
          await loadList();
          openChat(j.chat.id);
          if (j.spawned) {
            pending = true; pendingBaseline = 0; pendingParent = null; pendingAuthor = 'iris';
            lastSig = ''; refreshThread();
          }
        }
      } catch {}
      return;
    }
    openChat(chats[chats.length - 1].id); // la más reciente
  }
  init();
</script>
</body>
