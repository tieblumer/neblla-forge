  // ── Aubé (crear tarea) + aprobar ─────────────────────────────────────────────
  async function aube() {
    if (!active) return;
    const steer = inputEl.value.trim();   // lo escrito (o el pantallazo): susurro a Aubé, no se pierde
    const res = await fetch('/api/chats/' + active + '/aube', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ steer }),
    });
    if (!res.ok) { alert('No se pudo crear la tarea.'); return; }
    const j = await res.json().catch(() => ({}));
    if (steer) inputEl.value = '';
    // Aubé NO usa fantasma de front: su mensaje VIVO real (✦ Aubé está replanteando…)
    // ya está en el hilo desde el servidor y el sondeo lo pinta.
    lastSig = ''; refreshThread();
  }
  async function aprobarTarea(msgId) {
    if (!active) return;
    // el mensaje rey (el de Aubé sobre el que se pulsa "Aprobar") es el que se lleva
    // la tarea: viaja como fromMsg → el back lo colapsa en su stub. "Siguiente paso"
    // pasa el id del plan directamente; a mano, se usa el seleccionado.
    const fromMsg = (msgId != null) ? msgId : selectedId;
    const res = await fetch('/api/tareas', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fromChat: active, fromMsg }),
    });
    if (!res.ok) { alert('No se pudo aprobar la tarea.'); return; }
    // el plan ha salido del hilo (dejó su stub): refresca el hilo y las tareas.
    lastSig = ''; refreshThread(); loadTareas();
  }

  // Borrar una tarea (definitivo): el plan VUELVE a su conversación origen (el stub
  // se restaura al plan de Aubé). Si la tarea borrada era la abierta, cierra el
  // centro. Refresca el hilo abierto (por si era el origen → ver el plan de vuelta).
  async function borrarTarea(t) {
    if (!confirm('Borrar la tarea "' + t.title + '" (#' + t.id + ')?\n\nEl plan vuelve a su conversación origen. Es definitivo.')) return;
    const res = await fetch('/api/tareas/' + t.id, { method: 'DELETE' });
    if (!res.ok && res.status !== 404) { alert('No se pudo borrar la tarea.'); return; }
    if (currentTarea && currentTarea.id === t.id) {
      // estaba abierta: su hilo se ha borrado con ella → vacía el centro.
      active = null; currentTarea = null;
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
      lastCount = -1; pendings = []; cancelEdit();
      inputEl.disabled = true; inputEl.value = '';
      for (const b of composerBtns) b.disabled = true;
      btnWand.disabled = true;
      currentTitle = 'Chat'; titleEl.textContent = 'Chat';
      renderTareaDef();
      threadEl.innerHTML = '<div class="placeholder">Crea o elige una conversación a la izquierda.</div>';
      updateSelectionUI();
      loadList();
    } else if (active) {
      lastSig = ''; refreshThread();   // si el origen está abierto, ve volver su plan
    }
    loadTareas();
  }

  // Aprobar el PLAN de una tarea (la puerta). Si el plan no es aprobable, el back
  // devuelve 422 con los motivos: los enseñamos para que se arreglen.
  async function aprobarPlan(id) {
    let res, j;
    try { res = await fetch('/api/tareas/' + id + '/plan/aprobar', { method: 'POST' }); j = await res.json(); }
    catch { console.warn('[forge] aprobar plan: fallo de red'); return; }
    if (!res.ok) {
      const motivo = res.status === 422 ? 'plan no aprobable: ' + ((j.motivos || []).join(' · ') || '(sin detalle)') : (j.error || 'error');
      console.warn('[forge] aprobar plan ' + id + ':', motivo); return;
    }
    currentTarea = j; renderTareaDef(); loadTareas();
  }

  // (Ya no hay "Paralelizar" a mano: el reparto lo decide Aubé en el plan y las
  //  subtareas se materializan solas. La reorganización tras editar el plan a mano
  //  será trabajo de "Mamá".)

  // Definir tests (Ana Liz, ciega al código): redacta los tests en papel y los
  // entrega por su herramienta MCP. Recibe el contexto escrito en la caja (steer).
  async function definirTests(id) {
    const t = currentTarea || {};
    const tid = id || t.id;
    if (!tid) return;
    let res, j;
    try {
      res = await fetch('/api/tareas/' + tid + '/tests/definir', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ steer: inputEl.value.trim() }),
      });
      j = await res.json();
    } catch { console.warn('[forge] definir tests: fallo de red'); return; }
    if (!j || !j.spawned) { console.warn('[forge] definir tests ' + tid + ':', (j && j.busy) ? 'Ana Liz ocupada' : ((j && j.error) || 'error')); return; }
    inputEl.value = ''; lastSig = ''; loadTareas(); refreshThread();
  }
  const planificarTests = definirTests;   // alias del nombre viejo

  // Escribir tests (Ana Liz, con código): convierte las definiciones en tests reales.
  async function escribirTests(id) {
    const tid = id || (currentTarea && currentTarea.id);
    if (!tid) return;
    let res, j;
    try {
      res = await fetch('/api/tareas/' + tid + '/tests/escribir', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ steer: inputEl.value.trim() }),
      });
      j = await res.json();
    } catch { console.warn('[forge] escribir tests: fallo de red'); return; }
    if (!j || !j.spawned) { console.warn('[forge] escribir tests ' + tid + ':', (j && j.error) || 'error'); return; }
    inputEl.value = ''; lastSig = ''; loadTareas(); refreshThread();
  }

  // Probar tests: corre la batería del fichero de la tarea y refleja pasa/falla.
  async function probarTests(id) {
    const tid = id || (currentTarea && currentTarea.id);
    if (!tid) return;
    loadTareas();   // pinta el ⏳ que el back acaba de poner
    let j;
    try { j = await (await fetch('/api/tareas/' + tid + '/tests/probar', { method: 'POST' })).json(); }
    catch { console.warn('[forge] probar tests: fallo de red'); loadTareas(); return; }
    if (!(j && j.ok)) console.warn('[forge] probar tests ' + tid + ':', (j && j.reason) || 'error');
    loadTareas();   // el resultado (✓/✗) se ve en la columna, no en un popup
  }

  // Completar tarea (el gate): sube a master, corre los tests, borra los temporales.
  async function completarTarea(id) {
    const tid = id || (currentTarea && currentTarea.id);
    if (!tid) return;
    // sin confirm ni alert: la tarea se completa y el resultado se ve solo (la columna
    // y el hilo se repintan). Si algo falla, queda en la consola, no en un popup.
    let j;
    try { j = await (await fetch('/api/tareas/' + tid + '/completar', { method: 'POST' })).json(); }
    catch { j = { ok: false, error: 'no se pudo completar' }; }
    if (!(j && j.ok)) console.warn('[forge] completar tarea ' + tid + ':', (j && j.error) || 'error');
    lastSig = ''; loadTareas(); refreshThread();
  }

  btnDefinirTests.onclick = () => definirTests();
  btnEscribirTests.onclick = () => escribirTests();

  // Revisar (Aubé): Aubé reescribe el plan EN EL HILO de la tarea desde la
  // conversación. Es asíncrono (tarda); cuando TERMINA, el servidor adopta su plan
  // en la tarea solo (onDone), y el sondeo lo refleja aquí sin que toques nada.
  async function revisarAube(id) {
    const t = currentTarea;
    if (!t || !t.threadId) return;
    let j;
    try {
      j = await (await fetch('/api/chats/' + t.threadId + '/aube', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ steer: inputEl.value.trim() }),
      })).json();
    } catch { console.warn('[forge] revisar (Aubé): fallo de red'); return; }
    if (!j || !j.spawned) { console.warn('[forge] revisar (Aubé):', (j && j.error) || 'error'); return; }
    inputEl.value = '';
    lastSig = ''; refreshThread();
  }

  async function refreshThread() {
    if (!active) return;
    const res = await fetch('/api/chats/' + active);
    if (!res.ok) return;
    const chat = await res.json();
    chatNext = chat.next || null;   // el paso siguiente de la conversación (lo decide la forja)
    // ¿hay algún agente trabajando AHORA en este hilo? (mensaje vivo: Aubé/Miguel/Ana Liz)
    liveEnHilo = (chat.messages || []).some((m) => m.live);
    renderNextStep();
    const msgs = chat.messages || [];
    otherCount = msgs.filter((m) => m.author !== 'tie').length;
    // retira CADA fantasma solo cuando crece el contador de SU propio autor (llegó
    // su mensaje oficial). Que hable otro personaje NO toca los demás fantasmas.
    const llegaron = [];
    pendings = pendings.filter((p) => {
      const now = msgs.filter((m) => !m.collapsed && m.author === p.author).length;
      if (now > p.base) { llegaron.push(p); return false; }
      return true;
    });
    // Discutir: al llegar la réplica de Romina/Ariel el rey salta a ella, para
    // que el siguiente Discutir lo coja el otro de la pareja.
    if (selectAfterReplyAuthor && llegaron.some((p) => p.author === selectAfterReplyAuthor)) {
      const mine = msgs.filter((m) => !m.collapsed && m.author === selectAfterReplyAuthor);
      const real = msgs.filter((m) => !m.collapsed);
      if (mine.length) selectedId = mine[mine.length - 1].id;
      else if (real.length) selectedId = real[real.length - 1].id;
      selectAfterReplyAuthor = null;
    }
    const n = msgs.length;
    const psig = pendingSig();
    // La firma incluye el COSTE: la chapa $ se estampa al SALIR el agente, sin tocar
    // el texto, así que sin esto el poll no detectaba el cambio y la chapa solo
    // aparecía al recargar a mano. Con cost+costPrimary en la firma, re-pinta sola.
    const sig = msgs.map((m) =>
      m.id + ':' + (m.text || '').length + ':' + (m.collapsed ? 1 : 0) + ':' + m.replyTo + ':' + (m.editedAt || '')
      + ':' + (m.costPrimary ? 1 : 0) + ':' + (m.cost ? (m.cost.usd == null ? 'n' : m.cost.usd) : '-')).join('|');
    if (n !== lastCount || psig !== lastPendingSig || sig !== lastSig) {
      lastCount = n; lastPendingSig = psig; lastSig = sig; renderThread(chat);
    }
  }

  // Abre un chat en el centro. `tarea` (F9b) = la tarea cuya pizarra es este hilo:
  // si viene, se pinta su definición FIJA arriba; si no, es una conversación normal.
  function openChat(id, tarea = null) {
    active = id;
    currentTarea = tarea || null;
    lastCount = -1; lastPendingSig = ''; lastSig = '';
    pendings = []; otherCount = 0;
    selectedId = null; scope = 'mensaje'; editTarget = null; selectAfterReplyAuthor = null;
    cancelEdit();
    inputEl.disabled = false;
    for (const b of composerBtns) b.disabled = false;
    btnWand.disabled = false;
    syncTareaBtns();
    updateSelectionUI();
    renderTareaDef();
    refreshThread();
    loadList();
    if (pollTimer) clearInterval(pollTimer);
    // sondeo: ve llegar las respuestas de los headless; y si hay una tarea abierta,
    // refresca también su ficha (p.ej. el plan que Aubé acaba de adoptar al terminar).
    pollTimer = setInterval(() => { refreshThread(); if (currentTarea) loadTareas(); }, 1500);
  }

  // ── F9b: abrir una tarea (clic en la columna derecha) ────────────────────────
  // Pide su hilo propio (lo crea perezoso la 1ª vez) y abre ese hilo con la
  // definición fija arriba. El hilo es un chat normal: charlar/challenge/… valen.
  async function openTarea(id) {
    let t;
    try { t = await (await fetch('/api/tareas/' + id + '/open', { method: 'POST' })).json(); }
    catch { alert('No se pudo abrir la tarea.'); return; }
    if (!t || !t.threadId) { alert('No se pudo abrir la tarea.'); return; }
    openChat(t.threadId, t);
    loadTareas();
  }

  // Pinta (o esconde) el bloque fijo con la definición de la tarea actual.
  function renderTareaDef() {
    editingTareaDef = false;   // pintar la ficha = ya no estamos en modo edición
    syncTareaBtns();           // el botón "Escribir tests" se habilita si ya hay definidos
    if (!currentTarea) {
      tareaDefEl.style.display = 'none'; tareaDefEl.innerHTML = '';
      tareaActsBarEl.style.display = 'none'; tareaActsBarEl.innerHTML = '';
      renderNextStep();   // es una conversación (o nada): el botón usa chatNext
      return;
    }
    const t = currentTarea;
    tareaDefEl.style.display = 'block';
    tareaDefEl.innerHTML = '';
    // Modo tarea: si la def es el rey (selectedId==null), resáltala como rey y deja el
    // bloque clicable para volver a coronarla (salir de cualquier sub-hilo a la raíz).
    tareaDefEl.classList.toggle('rey', selectedId == null);
    tareaDefEl.onclick = (e) => {
      if (e.target.closest('button') || e.target.closest('a')) return;
      if (selectedId != null) { selectedId = null; if (lastChat) renderThread(lastChat); else updateSelectionUI(); }
    };
    const eye = document.createElement('div'); eye.className = 'td-eyebrow';
    eye.textContent = 'Tarea #' + t.id;
    const h = document.createElement('h2'); h.textContent = t.title || ('Tarea ' + t.id);
    const body = document.createElement('div'); body.className = 'td-body';
    if (t.body) fillBubble(body, t.body); else body.textContent = '(sin definición todavía)';
    // El PASO RECOMENDADO lo decide LA FORJA (forge-estado.pasoRecomendado) y viaja en
    // `t.next` — así una IA orquestadora lo lee por API igual que el front. Aquí solo
    // lo pintamos en rosa (y lo callamos si Ana Liz está trabajando).
    const tests = (t.testsPlan && t.testsPlan.tests) || [];
    const analizEnCurso = (t.headlessEnCurso || []).includes('analiz');
    const tieneEscritos = tests.some((x) => x.id && x.estado && x.estado !== 'definido');
    const seCorrieron = !!(t.testsPlan && t.testsPlan.ultimaCorrida);
    let next = (t.next && t.next.key) || null;
    if (analizEnCurso) next = null;                        // si Ana Liz trabaja, no empujes nada
    const mark = (btn, key) => { if (next === key) btn.classList.add('td-next'); return btn; };
    const acts = document.createElement('div'); acts.className = 'td-acts';
    const edit = document.createElement('button'); edit.className = 'td-btn'; edit.textContent = '✎ Editar definición';
    edit.onclick = startEditTareaDef;
    const rev = document.createElement('button'); rev.className = 'td-btn';
    // sin plan todavía → es el PRIMER paso ("Crear plan"), no un "Revisar" (re-hacer).
    rev.textContent = t.plan ? '✦ Revisar (Aubé)' : '✦ Crear plan (Aubé)';
    rev.title = t.plan ? 'Aubé reescribe el plan en el hilo de la tarea desde la conversación'
                       : 'Aubé redacta el plan de esta tarea (resumen + partes + contrato)';
    rev.onclick = () => revisarAube(t.id);
    mark(rev, 'rev');
    const ejec = document.createElement('button'); ejec.className = 'td-btn'; ejec.textContent = '🔨 Ejecutar';
    ejec.title = 'Miguel construye la tarea en un worktree aislado y reporta en el hilo';
    ejec.onclick = () => ejecutarTarea(t.id);
    mark(ejec, 'ejecutar');
    acts.append(edit, rev);
    // aprobar el plan: solo si hay plan y NO está aprobado
    if (t.plan && !t.plan.aprobado) {
      const apr = document.createElement('button'); apr.className = 'td-btn'; apr.textContent = '✓ Aprobar plan';
      apr.title = 'Da el plan por bueno (la puerta antes de paralelizar/construir)';
      apr.onclick = () => aprobarPlan(t.id);
      acts.append(mark(apr, 'aprobar'));
    }
    // con el plan aprobado: definir tests. (El reparto en paralelo ya lo hizo Aubé en
    // el plan → las subtareas salen solas, sin botón "Paralelizar".)
    if (t.plan && t.plan.aprobado) {
      const complejidad = complejidadDe(t);
      const hayPendientesEscribir = tests.some((x) => (x.estado || 'definido') === 'definido');
      const pt = document.createElement('button'); pt.className = 'td-btn';
      if (complejidad === 'facil') {
        // FÁCIL: Ana Liz no define. El botón se queda bloqueado; se añaden a mano.
        pt.textContent = '🎯 Definir tests'; pt.disabled = true;
        pt.title = 'Tarea fácil: Ana Liz no define tests. Usa "+ Añadir test" para ponerlos a mano.';
      } else if (analizEnCurso) {
        pt.textContent = '⏳ Ana Liz trabajando…'; pt.disabled = true;
        pt.title = 'Ana Liz está trabajando; espera a que termine';
      } else {
        pt.textContent = tests.length ? '🎯 Redefinir tests' : '🎯 Definir tests (Ana Liz)';
        pt.title = complejidad === 'mediana'
          ? 'Ana Liz define una batería mínima (camino feliz + bordes críticos)'
          : 'Ana Liz define los tests en papel: generales y por subtarea';
        pt.onclick = () => definirTests(t.id);
        mark(pt, 'definir');
      }
      acts.append(pt);
      // escribir tests reales: SOLO si hay definiciones PENDIENTES de escribir (sea cual
      // sea el nivel, incl. los añadidos a mano en una tarea fácil) y nadie trabajando.
      if (hayPendientesEscribir && !analizEnCurso) {
        const wr = document.createElement('button'); wr.className = 'td-btn'; wr.textContent = '⌨️ Escribir tests';
        wr.title = 'Ana Liz convierte las definiciones pendientes en tests de código (con su ID)';
        wr.onclick = () => escribirTests(t.id);
        acts.append(mark(wr, 'escribir'));
      }
      // añadir un test A MANO (funciona en cualquier nivel; la única vía en "fácil").
      const add = document.createElement('button'); add.className = 'td-btn'; add.textContent = '+ Añadir test';
      add.title = 'Añade un test a mano (a dónde va y si es temporal o permanente)';
      add.onclick = () => openTestModal(null);
      acts.append(add);
    }
    acts.append(ejec);
    // probar la batería: SOLO cuando ya hay tests escritos (estado más allá de "definido").
    if (tieneEscritos) {
      const pr = document.createElement('button'); pr.className = 'td-btn'; pr.textContent = '▶ Probar tests';
      pr.title = 'Corre la batería de esta tarea y refleja pasa/falla';
      pr.onclick = () => probarTests(t.id);
      acts.append(mark(pr, 'probar'));
    }
    // COMPLETAR (el gate): aparece SOLO tras EJECUTAR los tests (haya pasado o fallado),
    // señal = testsPlan.ultimaCorrida. Si la tarea no tiene tests con código, no hay nada
    // que correr → se permite completar directamente. Sube a master + borra temporales.
    if (t.builtAt && !t.enMaster && (seCorrieron || !tieneEscritos)) {
      const cp = document.createElement('button'); cp.className = 'td-btn'; cp.textContent = '✅ Completar tarea';
      cp.title = 'Sube a master, corre los tests y borra los temporales. La tarea queda cerrada.';
      cp.onclick = () => completarTarea(t.id);
      mark(cp, 'completar');
      acts.append(cp);
    }
    // SUBIR A MASTER (el reintento manual del auto-merge): antes solo colgaba del
    // informe de Miguel en el hilo y se perdía con el scroll. Ahora vive en la barra
    // fija, siempre a la vista. Su estado (habilitado / por qué no) lo dice el back.
    if (t.builtAt && !t.enMaster) {
      const sm = document.createElement('button'); sm.className = 'td-btn'; sm.textContent = '⬇ Subir a master';
      sm.disabled = true; sm.title = 'Comprobando…';
      sm.onclick = () => traerTarea(t.id);
      acts.append(sm);
      fetch('/api/tareas/' + t.id + '/traible').then((r) => r.json()).then((s) => {
        sm.disabled = !s.traible;
        sm.title = s.traible ? 'Trae todo el arbolito del worktree y lo sube a master (commit)'
          : s.reason === 'ya en master' ? 'Ya está en master ✓'
          : s.reason === 'construyendo' ? 'Miguel sigue construyendo — espera a que termine'
          : s.reason === 'build interrumpido' ? 'El build se interrumpió — vuelve a lanzar a Miguel'
          : 'Nada que subir';
      }).catch(() => {});
    }
    // "Traer el código" YA NO cuelga del informe de Miguel en el hilo: vive arriba,
    // en la barra fija (botón "Subir a master"), igual que el resto de acciones.
    // El LINK ORIGEN abre la cabecera: de qué conversación —o de qué tarea— nació.
    // Se resuelve en vivo en el back (renombrar la fuente lo renombra; borrarla lo
    // hace null → no se pinta).
    if (t.origen) {
      const orig = document.createElement('div'); orig.className = 'td-origen';
      const a = document.createElement('a');
      a.textContent = '↰ ' + (t.origen.kind === 'tarea' ? 'Tarea: ' : 'Conversación: ') + t.origen.title;
      a.title = 'Abrir el origen de esta tarea';
      a.onclick = () => { if (t.origen.kind === 'tarea') openTarea(t.origen.id); else openChat(t.origen.id); };
      orig.appendChild(a);
      tareaDefEl.append(orig);
    }
    tareaDefEl.append(eye, h, body);
    if (t.plan) {
      tareaDefEl.append(renderPlanBlock(t.plan, { hidePartes: (t.subtareas || []).length > 0 }));
      // la complejidad y la estructura SOLO tienen sentido con un plan: enseñarlas en
      // una tarea vacía (complejidad "compleja por defecto") finge contenido que no hay.
      tareaDefEl.append(renderComplejidadRow(t));
      const struct = renderStructureBlock(t);
      if (struct) tareaDefEl.append(struct);
    } else {
      // sin plan todavía: un cartel claro de qué falta, en vez de mobiliario que confunde.
      const vacio = document.createElement('div'); vacio.className = 'td-sinplan';
      vacio.textContent = '✦ Esta tarea aún no tiene plan. Pulsa “Crear plan (Aubé)” para que Aubé lo redacte.';
      tareaDefEl.append(vacio);
    }
    // las acciones NO van en el bloque que scrollea: viven en la barra fija del
    // composer, siempre a la vista encima del input.
    tareaActsBarEl.innerHTML = '';
    tareaActsBarEl.append(acts);
    tareaActsBarEl.style.display = 'block';
    renderNextStep();   // tarea abierta: el botón usa currentTarea.next
  }

  // ── EL botón "Siguiente paso" ────────────────────────────────────────────────
  // Un clic = un paso. La forja decide CUÁL (determinista): si hay tarea abierta,
  // los pasos de la tarea (currentTarea.next); si es una conversación, los de la
  // conversación (chatNext, que viaja en GET /api/chats/:id). Aquí solo se DISPARA.
  // ¿hay un paso EN CURSO ahora mismo? (un agente trabajando en el hilo abierto).
  // Mientras lo haya, el "Siguiente paso" se bloquea: no se encadena nada encima.
  function pasoEnCurso() {
    if (currentTarea && (currentTarea.headlessEnCurso || []).length) return true;
    if (liveEnHilo) return true;                          // mensaje vivo (Aubé/Miguel/Ana Liz)
    if (!currentTarea && pendings.length) return true;    // fantasmas de William/Iris lanzados
    return false;
  }

  function renderNextStep() {
    if (!nextStepBarEl) return;
    nextStepBarEl.innerHTML = '';
    if (!active) { nextStepBarEl.style.display = 'none'; return; }
    const b = document.createElement('button');
    b.className = 'nextstep-btn';
    // EN CURSO: el botón se deshabilita; si lo intentas, responde "inténtalo en un minuto".
    if (pasoEnCurso()) {
      b.classList.add('waiting');
      b.textContent = '⏳ Un paso está en curso…';
      b.title = 'Hay un agente trabajando. Espera a que termine.';
      b.onclick = () => {
        b.textContent = '⏳ Aún trabajando — inténtalo en un minuto';
        setTimeout(() => { if (pasoEnCurso()) b.textContent = '⏳ Un paso está en curso…'; }, 2500);
      };
      nextStepBarEl.appendChild(b);
      nextStepBarEl.style.display = 'block';
      return;
    }
    const next = currentTarea ? (currentTarea.next || null) : chatNext;
    if (!next || !next.key) { nextStepBarEl.style.display = 'none'; return; }
    b.textContent = '▸ Siguiente paso: ' + next.label;
    b.title = 'Lo decide la forja, determinista. Un clic lo dispara y espera.';
    b.onclick = () => dispatchNextStep(next);
    nextStepBarEl.appendChild(b);
    nextStepBarEl.style.display = 'block';
  }

  function dispatchNextStep(next) {
    if (!next || !next.key) return;
    if (pasoEnCurso()) { renderNextStep(); return; }   // guarda dura: nada se encadena en curso
    if (currentTarea) {
      const id = currentTarea.id;
      switch (next.key) {
        case 'rev':       return revisarAube(id);
        case 'aprobar':   return aprobarPlan(id);
        case 'definir':   return definirTests(id);
        case 'escribir':  return escribirTests(id);
        case 'ejecutar':  return ejecutarTarea(id);
        case 'probar':    return probarTests(id);
        case 'completar': return completarTarea(id);
      }
      return;
    }
    // conversación
    switch (next.key) {
      case 'william':   return challengeAction();
      case 'iris':      return charlar();
      case 'aube':      return aube();
      case 'aprobar':   return aprobarTarea(next.msgId);   // crea la tarea desde el plan de Aubé
      case 'responder': return focusPregunta();            // no se puede auto-responder: te lleva a ella
      case 'irtarea':   return openTarea(next.tareaId);    // la tarea ya nació → ir a ella
    }
  }

  // Lleva el foco a la primera pregunta pendiente del hilo (no se puede contestar solo).
  function focusPregunta() {
    const q = document.querySelector('.bubble.pregunta-pendiente');
    if (!q) return;
    q.scrollIntoView({ behavior: 'smooth', block: 'center' });
    const ta = q.querySelector('textarea');
    if (ta) ta.focus();
  }

  // La complejidad EFECTIVA de una tarea: el override de Tie (t.complejidad) manda
  // sobre la de Aubé (t.plan.complejidad). Sin ninguna → compleja (default seguro).
  const COMPLEJ = [['facil', 'fácil'], ['mediana', 'mediana'], ['compleja', 'compleja']];
  function complejidadDe(t) {
    if (t && t.complejidad) return t.complejidad;
    if (t && t.plan && t.plan.complejidad) return t.plan.complejidad;
    return 'compleja';
  }
  // Fila de complejidad: segmentado fácil/mediana/compleja. Clic = override de Tie
  // (manda sobre la de Aubé). Gobierna los tests: fácil bloquea a Ana Liz.
  function renderComplejidadRow(t) {
    const row = document.createElement('div'); row.className = 'td-complej';
    const lbl = document.createElement('span'); lbl.className = 'tc-lbl'; lbl.textContent = 'Complejidad';
    const seg = document.createElement('div'); seg.className = 'tc-seg';
    const efectiva = complejidadDe(t);
    for (const [val, txt] of COMPLEJ) {
      const b = document.createElement('button'); b.textContent = txt;
      if (val === efectiva) b.classList.add('active');
      b.title = val === 'facil' ? 'Ana Liz no define tests (los pones a mano)'
        : val === 'mediana' ? 'Ana Liz genera una batería mínima'
        : 'Ana Liz a fondo (cobertura completa)';
      b.onclick = async () => {
        try {
          const r = await fetch('/api/tareas/' + t.id + '/complejidad', {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ nivel: val }),
          });
          if (!r.ok) throw new Error('error');
          loadTareas();
        } catch { alert('No se pudo cambiar la complejidad.'); }
      };
      seg.append(b);
    }
    row.append(lbl, seg);
    // de dónde viene la etiqueta vigente (Aubé / tú)
    const org = document.createElement('span'); org.className = 'tc-origen';
    org.textContent = (t.complejidad) ? '(la fijaste tú)' : (t.plan && t.plan.complejidad) ? '(la puso Aubé)' : '(por defecto)';
    row.append(org);
    return row;
  }

  // El dibujo de Tie: la estructura de la tarea = tests generales + cada subtarea
  // con su alcance y sus tests colgando. `t.subtareas` (de Paralelizar) y
  // `t.testsPlan.tests` (de Ana Liz, cada uno con su `ref`: 'general' o el name).
  function renderStructureBlock(t) {
    const tests = (t.testsPlan && Array.isArray(t.testsPlan.tests)) ? t.testsPlan.tests : [];
    const subs = (t.subtareas || []);
    // GRUPOS donde colgar los tests: las subtareas materializadas o, si aún no hay
    // (plan de una sola parte), las PARTES del plan — porque Ana Liz etiqueta cada
    // test con el nombre de su parte, no con "subtarea". Sin esto, los tests de una
    // tarea de una sola parte caían en un grupo que nadie pintaba (invisibles).
    const grupos = subs.length
      ? subs.map((s) => ({ name: s.name, alcance: s.alcance }))
      : ((t.plan && t.plan.partes) || []).map((p) => ({ name: p.name, alcance: { archivos: p.ficheros, frontera: p.hace } }));
    if (!grupos.length && !tests.length) return null;   // todavía no hay nada que mostrar
    // cada test recuerda su índice GLOBAL (para patch/borrar) y la tarea a la que va.
    const byRef = {};
    tests.forEach((x, i) => { const e = { ...x, _i: i }; (byRef[x.ref] = byRef[x.ref] || []).push(e); });
    const usados = new Set(['general']);
    const box = document.createElement('div'); box.className = 'td-struct';

    // tests generales (de la tarea entera)
    const genH = document.createElement('div'); genH.className = 'st-h'; genH.textContent = 'Tests generales';
    box.append(genH);
    appendTests(box, byRef['general'] || []);

    // cada grupo (subtarea o parte del plan): nombre + alcance + sus tests
    for (const g of grupos) {
      usados.add(g.name);
      const sd = document.createElement('div'); sd.className = 'st-sub';
      const nm = document.createElement('div'); nm.className = 'st-name'; nm.textContent = '▸ ' + g.name;
      const al = document.createElement('div'); al.className = 'st-alcance';
      const arch = (g.alcance && g.alcance.archivos || []).join(', ');
      al.textContent = arch + (g.alcance && g.alcance.frontera ? ' — ' + g.alcance.frontera : '');
      sd.append(nm, al); box.append(sd);
      appendTests(box, byRef[g.name] || []);
    }

    // CATCH-ALL: tests con un ref que no encajó en ningún grupo conocido → se pintan
    // igual bajo su propio nombre, para que NUNCA queden invisibles.
    for (const ref of Object.keys(byRef)) {
      if (usados.has(ref)) continue;
      const sd = document.createElement('div'); sd.className = 'st-sub';
      const nm = document.createElement('div'); nm.className = 'st-name'; nm.textContent = '▸ ' + ref;
      sd.append(nm); box.append(sd);
      appendTests(box, byRef[ref]);
    }

    if (!tests.length) {
      const e = document.createElement('div'); e.className = 'st-empty';
      e.textContent = (t.headlessEnCurso || []).includes('analiz')
        ? '🎯 Ana Liz está redactando los tests…'
        : 'Aún no hay tests — pulsa "🎯 Definir tests".';
      box.append(e);
    }
    return box;
  }

  // Quita de una burbuja los bloques que lee SOLO la máquina (```plan```, ```tests```,
  // ```subtareas```): su versión humanizada ya vive en la ficha de la tarea. Así el
  // chat no vuelca JSON crudo. El texto guardado NO se toca (esto es solo al pintar).
  function stripMachineBlocks(text) {
    let s = String(text == null ? '' : text);
    s = s.replace(/```(?:plan|tests|subtareas)\s*[\s\S]*?```/gi, '');
    return s.replace(/\n{3,}/g, '\n\n').trim();
  }

  // El icono del ESTADO de un test (su ciclo de vida).
  const TEST_ESTADO_ICON = { definido: '📝', escrito: '☐', ejecutando: '⏳', pasa: '✓', falla: '✗' };
  const TEST_ESTADO_TXT = {
    definido: 'Definido (en papel)', escrito: 'Escrito en código',
    ejecutando: 'Ejecutando…', pasa: 'Pasa ✓', falla: 'Falla ✗',
  };

  // Pinta una lista de tests: icono de ESTADO + nivel + título. Clic → modal de edición.
  function appendTests(box, tests) {
    const wrap = document.createElement('div'); wrap.className = 'st-tests';
    if (!tests.length) {
      const e = document.createElement('div'); e.className = 'st-empty'; e.textContent = '(sin tests)';
      wrap.append(e); box.append(wrap); return;
    }
    for (const t of tests) {
      const d = document.createElement('div'); d.className = 'st-test st-clickable';
      // icono de ESTADO (📝 definido → ☐ escrito → ⏳ → ✓/✗)
      const est = t.estado || 'definido';
      const ico = document.createElement('span'); ico.className = 'st-estado st-est-' + est;
      ico.textContent = TEST_ESTADO_ICON[est] || '📝'; ico.title = TEST_ESTADO_TXT[est] || est;
      // marca de nivel: persistente (se queda) vs temporal (efímero)
      const perm = t.nivel === 'persistente';
      const niv = document.createElement('span'); niv.className = 'st-nivel ' + (perm ? 'st-perm' : 'st-impl');
      niv.textContent = perm ? '♾' : '✎';
      niv.title = perm ? 'Persistente: se queda como regresión' : 'Temporal: se borra al completar la tarea';
      const tit = document.createElement('span'); tit.className = 'st-tit'; tit.textContent = t.titulo;
      d.append(ico, niv, document.createTextNode(' '), tit);
      const det = [t.dado && ('Dado ' + t.dado), t.cuando && ('cuando ' + t.cuando), t.entonces && ('entonces ' + t.entonces)].filter(Boolean).join(' · ');
      if (det) d.title = det;
      d.onclick = () => openTestModal(t);
      wrap.append(d);
    }
    box.append(wrap);
  }

  // Modal de edición de UN test (clic en su fila). Edita textos, promueve (general ↔
  // subtarea), cambia el tipo (temporal/persistente) y borra. `t._i` = índice global.
  function openTestModal(t) {
    const tarea = currentTarea; if (!tarea) return;
    const isNew = (t == null);          // null = AÑADIR un test nuevo a mano
    if (isNew) t = { titulo: '', dado: '', cuando: '', entonces: '', ref: 'general', nivel: 'temporal' };
    const i = t._i;
    let modal = document.getElementById('test-modal');
    if (!modal) {
      modal = document.createElement('div'); modal.id = 'test-modal'; modal.className = 'perm-modal';
      const box = document.createElement('div'); box.className = 'perm-box'; box.onclick = (e) => e.stopPropagation();
      modal.appendChild(box); modal.onclick = () => modal.remove();
      document.body.appendChild(modal);
    } else { modal.querySelector('.perm-box').innerHTML = ''; }
    const box = modal.querySelector('.perm-box');
    const h = document.createElement('h3'); h.textContent = isNew ? 'Añadir test' : ('Editar test' + (t.id ? ' · ' + t.id : ''));
    box.appendChild(h);
    const field = (label, val, ta) => {
      const w = document.createElement('div'); w.className = 'tm-field';
      const l = document.createElement('label'); l.textContent = label; w.appendChild(l);
      const el = document.createElement(ta ? 'textarea' : 'input'); el.className = 'tm-in'; el.value = val || '';
      w.appendChild(el); box.appendChild(w); return el;
    };
    const titIn = field('Título', t.titulo);
    const dadoIn = field('Dado', t.dado, true);
    const cuandoIn = field('Cuando', t.cuando, true);
    const entoIn = field('Entonces', t.entonces, true);
    // ref (general o subtarea) + nivel
    const row = document.createElement('div'); row.className = 'tm-row';
    const refSel = document.createElement('select'); refSel.className = 'tm-sel';
    const refs = ['general', ...((tarea.subtareas || []).map((s) => s.name).filter(Boolean))];
    for (const r of refs) { const o = document.createElement('option'); o.value = r; o.textContent = r === 'general' ? 'General' : r; refSel.appendChild(o); }
    refSel.value = refs.includes(t.ref) ? t.ref : 'general';
    const nivSel = document.createElement('select'); nivSel.className = 'tm-sel';
    for (const [v, lab] of [['temporal', 'Temporal (se borra al completar)'], ['persistente', 'Persistente (regresión)']]) {
      const o = document.createElement('option'); o.value = v; o.textContent = lab; nivSel.appendChild(o);
    }
    nivSel.value = t.nivel === 'persistente' ? 'persistente' : 'temporal';
    const rl = document.createElement('span'); rl.className = 'tm-lbl'; rl.textContent = 'Cuelga de';
    const nl = document.createElement('span'); nl.className = 'tm-lbl'; nl.textContent = 'Tipo';
    row.append(rl, refSel, nl, nivSel); box.appendChild(row);
    // acciones
    const acts = document.createElement('div'); acts.className = 'perm-acts';
    const save = document.createElement('button'); save.className = 'team-btn primary'; save.textContent = isNew ? 'Añadir' : 'Guardar';
    const cancel = document.createElement('button'); cancel.className = 'team-btn'; cancel.textContent = 'Cancelar';
    acts.append(save);
    // borrar: solo al EDITAR uno existente (no al añadir).
    if (!isNew) {
      const del = document.createElement('button'); del.className = 'team-btn tm-del'; del.textContent = '🗑 Borrar';
      del.onclick = async () => {
        if (!confirm('¿Borrar este test?')) return;
        try {
          const r = await fetch('/api/tareas/' + tarea.id + '/tests/delete', {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ index: i }),
          });
          if (!r.ok) throw new Error('error');
          modal.remove(); loadTareas();
        } catch { alert('No se pudo borrar.'); }
      };
      acts.append(del);
    }
    acts.append(cancel); box.appendChild(acts);
    cancel.onclick = () => modal.remove();
    save.onclick = async () => {
      if (isNew && !titIn.value.trim()) { alert('El test necesita al menos un título.'); return; }
      save.classList.add('busy'); save.disabled = true;
      const fields = { titulo: titIn.value, dado: dadoIn.value, cuando: cuandoIn.value, entonces: entoIn.value, ref: refSel.value, nivel: nivSel.value };
      try {
        const url = isNew ? '/api/tareas/' + tarea.id + '/tests/add' : '/api/tareas/' + tarea.id + '/tests/patch';
        const body = isNew ? { fields } : { index: i, fields };
        const r = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        if (!r.ok) throw new Error('error');
        modal.remove(); loadTareas();
      } catch (e) { alert('No se pudo guardar.'); save.classList.remove('busy'); save.disabled = false; }
    };
    modal.style.display = 'flex';
  }

  // Pinta el PLAN estructurado de Aubé: resumen + partes (qué hace / qué ficheros)
  // + contrato (la interfaz entre partes) + si está aprobado o no.
  function renderPlanBlock(plan, opts = {}) {
    const box = document.createElement('div'); box.className = 'td-plan';
    if (plan.resumen) {
      const r = document.createElement('div'); r.className = 'tp-resumen'; fillBubble(r, plan.resumen);
      box.append(r);
    }
    // Una vez paralelizado, las partes ya salen abajo (subtareas con alcance + tests):
    // no las repitas aquí. Antes de paralelizar SÍ se muestran (son la propuesta).
    if (!opts.hidePartes && (plan.partes || []).length) {
      const hh = document.createElement('div'); hh.className = 'tp-h'; hh.textContent = 'Partes'; box.append(hh);
      for (const p of plan.partes) {
        const d = document.createElement('div'); d.className = 'tp-parte md-rendered';
        const b = document.createElement('b'); b.textContent = p.name; d.append(b);
        d.append(document.createTextNode(' — '));
        const hace = document.createElement('span'); inlineBlock(hace, p.hace || ''); d.append(hace);
        if (p.ficheros && p.ficheros.length) {
          const f = document.createElement('span'); f.className = 'tp-files';
          f.textContent = ' (' + p.ficheros.join(', ') + ')'; d.append(f);
        }
        box.append(d);
      }
    }
    if ((plan.contrato || []).length) {
      const hh = document.createElement('div'); hh.className = 'tp-h'; hh.textContent = 'Contrato entre partes'; box.append(hh);
      for (const c of plan.contrato) {
        const d = document.createElement('div'); d.className = 'tp-contrato md-rendered';
        const b = document.createElement('b'); b.textContent = (c.entre || []).join(' ↔ '); d.append(b);
        d.append(document.createTextNode(': '));
        const iface = document.createElement('span'); iface.className = 'tp-iface'; inlineBlock(iface, c.interfaz || ''); d.append(iface);
        if (c.acuerdo) { d.append(document.createElement('br')); const ac = document.createElement('span'); inlineBlock(ac, c.acuerdo); d.append(ac); }
        box.append(d);
      }
    }
    const est = document.createElement('div'); est.className = 'tp-estado';
    if (plan.aprobado) { est.classList.add('tp-aprobado'); est.textContent = '✓ Plan aprobado'; }
    else { est.classList.add('tp-pendiente'); est.textContent = '○ Plan sin aprobar'; }
    box.append(est);
    return box;
  }

  // Subir a master: trae TODO el arbolito (commits de la rama + cambios sueltos) al
  // árbol vivo y lo COMMITEA a master. Si choca, el revisor lo resuelve y reintenta
  // (tope 3); si no entra, la tarea queda en error (✕). El cierre normal es
  // AUTOMÁTICO al terminar Miguel; esto es el reintento manual.
  async function traerTarea(id) {
    let j;
    try { j = await (await fetch('/api/tareas/' + id + '/traer', { method: 'POST' })).json(); }
    catch { console.warn('[forge] subir a master: fallo de red'); return; }
    if (!(j.applied && j.enMaster)) {
      console.warn('[forge] subir a master ' + id + ':', j.empty ? 'el build no dejó cambios' : j.incompatible ? ('build viejo/incompatible — ' + (j.error || '')) : (j.error || 'no entró en master'));
    }
    lastSig = ''; refreshThread(); loadTareas();
  }

  // Ejecutar: lanza a Miguel a construir la tarea (worktree aislado). Reporta en el hilo.
  async function ejecutarTarea(id) {
    let res, j;
    try {
      res = await fetch('/api/tareas/' + id + '/ejecutar', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ steer: inputEl.value.trim() }),
      });
      if (await apagadoEnCurso(res, () => ejecutarTarea(id))) return;
      j = await res.json();
    } catch { console.warn('[forge] ejecutar: fallo de red'); return; }
    if (!j || !j.spawned) { console.warn('[forge] ejecutar ' + id + ':', (j && j.error) || 'error'); return; }
    inputEl.value = '';
    // ya NO ponemos fantasma "pensando": Miguel tiene un mensaje VIVO que se va
    // reescribiendo con el resumen en vivo (Haiku). El sondeo lo muestra y actualiza.
    lastSig = ''; refreshThread();
  }

  // Edición a mano de la definición: cambia título/cuerpo por campos editables.
  function startEditTareaDef() {
    if (!currentTarea) return;
    editingTareaDef = true;    // no dejes que el sondeo re-pinte y borre lo que escribes
    const t = currentTarea;
    tareaDefEl.innerHTML = '';
    const eye = document.createElement('div'); eye.className = 'td-eyebrow'; eye.textContent = 'Editando tarea #' + t.id;
    const ti = document.createElement('input'); ti.className = 'td-edit'; ti.value = t.title || ''; ti.placeholder = 'Título';
    const bo = document.createElement('textarea'); bo.className = 'td-edit'; bo.value = t.body || ''; bo.placeholder = 'Definición de la tarea';
    const acts = document.createElement('div'); acts.className = 'td-acts';
    const save = document.createElement('button'); save.className = 'td-btn'; save.textContent = 'Guardar';
    const cancel = document.createElement('button'); cancel.className = 'td-btn'; cancel.textContent = 'Cancelar';
    save.onclick = async () => {
      try {
        const upd = await (await fetch('/api/tareas/' + t.id + '/definicion', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: ti.value, body: bo.value }),
        })).json();
        currentTarea = { ...t, ...upd };
      } catch { console.warn('[forge] guardar definición: fallo de red'); }
      renderTareaDef(); loadTareas();
    };
    cancel.onclick = renderTareaDef;
    acts.append(save, cancel);
    tareaDefEl.append(eye, ti, bo, acts);
    ti.focus();
  }

  // ── enlaces de los botones del compositor ───────────────────────────────────
  // El botón que pulses se vuelve el DEFECTO (resaltado) y es lo que dispara
  // Enter. Se recuerda entre recargas (localStorage).
  const ACTIONS = {
    responder:  { btn: btnResponder,  run: responder },
    charlar:    { btn: btnCharlar,    run: charlar },
    investigar: { btn: btnInvestigar, run: () => spikeAction('investigar', 'stevens') },
    consejo:    { btn: btnConsejo,    run: () => spikeAction('consejo', 'miyagi') },
    discutir:   { btn: btnDiscutir,   run: discutir },
    challenge:  { btn: btnChallenge,  run: challengeAction },
    tarea:      { btn: btnTarea,      run: aube },
    resumir:    { btn: btnResumir,    run: anselmo },
  };
  let defaultAction = localStorage.getItem('forge.defaultAction') || 'charlar';
  if (!ACTIONS[defaultAction]) defaultAction = 'charlar';

  function setDefaultAction(key) {
    defaultAction = key;
    localStorage.setItem('forge.defaultAction', key);
    for (const [k, a] of Object.entries(ACTIONS)) a.btn.classList.toggle('primary', k === defaultAction);
  }
  for (const [k, a] of Object.entries(ACTIONS)) {
    a.btn.onclick = () => { setDefaultAction(k); a.run(); };
  }
  setDefaultAction(defaultAction); // pinta el defecto al cargar

  // Debug: NO es una acción por defecto (no se la queda Enter). Vuelca en la consola
  // el texto ensamblado para el alcance elegido — el hilo + el foco, que es la parte
  // que cambia con el scope — sin lanzar a ningún personaje.
  btnDebug.onclick = debugFoco;
  async function debugFoco() {
    if (!active) return;
    const targetId = actionTarget();
    let res, j;
    try {
      res = await fetch('/api/chats/' + active + '/debug-foco', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ targetId, scope }),
      });
      j = await res.json();
    } catch (e) { console.error('[forge debug] no se pudo pedir el foco:', e); return; }
    if (!res.ok) { console.warn('[forge debug] error:', (j && j.error) || res.status); return; }
    console.log('%c═══ DEBUG forge · alcance "' + j.scope + '" · target #' + j.targetId + ' ═══',
      'color:#ff0066;font-weight:bold');
    console.log('── HILO (threadText, igual en todos los alcances) ──\n' + j.threadText);
    console.log('── FOCO (focoText, CAMBIA con el alcance) ──\n' + j.focoText);
  }

  // ── doble modo de envío + autocrecer ────────────────────────────────────────
  // El área crece sola con el texto hasta 10 líneas y luego hace scroll. El modo
  // de envío decide qué hace Enter, y persiste entre recargas:
  //   · 'send'    → Enter envía, Shift+Enter salta línea (el clásico de chat).
  //   · 'newline' → Enter salta línea, Ctrl/⌘+Enter envía (cómodo para textos largos).
  const sendModeSeg = document.getElementById('sendModeSeg');
  let sendMode = localStorage.getItem('forge.sendMode') || 'send';
  if (sendMode !== 'send' && sendMode !== 'newline') sendMode = 'send';
  function setSendMode(m) {
    sendMode = m;
    localStorage.setItem('forge.sendMode', m);
    for (const b of sendModeSeg.querySelectorAll('button')) b.classList.toggle('active', b.dataset.mode === m);
  }
  for (const b of sendModeSeg.querySelectorAll('button')) b.onclick = () => setSendMode(b.dataset.mode);
  setSendMode(sendMode);

  function fireSend() {
    if (editTarget != null) confirmEdit(); else ACTIONS[defaultAction].run();
  }
  inputEl.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    const withMod = e.ctrlKey || e.metaKey;
    if (sendMode === 'send') {
      if (!e.shiftKey && !withMod) { e.preventDefault(); fireSend(); }   // Enter envía
    } else {
      if (withMod) { e.preventDefault(); fireSend(); }                   // Ctrl/⌘+Enter envía
    }
  });

  // Autocrecer: ajusta la altura al contenido (máx. 10 líneas vía max-height CSS).
  function autoGrow() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 232) + 'px';
  }
  inputEl.addEventListener('input', autoGrow);
  // tras un envío el código vacía .value sin disparar 'input'; al volver a la caja
  // recolocamos la altura para que no se quede estirada en falso.
  inputEl.addEventListener('focus', autoGrow);

  // Pegar un pantallazo: si el portapapeles trae imagen, la subimos a
  // pantallazos/ y metemos su ruta en el mensaje (en el cursor). Sin dar vueltas.
  function insertAtCursor(el, text) {
    const s = (el.selectionStart != null) ? el.selectionStart : el.value.length;
    const e2 = (el.selectionEnd != null) ? el.selectionEnd : el.value.length;
    el.value = el.value.slice(0, s) + text + el.value.slice(e2);
    el.selectionStart = el.selectionEnd = s + text.length;
  }
  inputEl.addEventListener('paste', async (e) => {
    const items = (e.clipboardData && e.clipboardData.items) || [];
    const imgs = [...items].filter((it) => it.kind === 'file' && it.type.startsWith('image/'));
    if (!imgs.length) return;            // pegado de texto normal: que siga su curso
    e.preventDefault();
    for (const it of imgs) {
      const blob = it.getAsFile();
      if (!blob) continue;
      try {
        const res = await fetch('/api/pantallazo', {
          method: 'POST', headers: { 'Content-Type': blob.type || 'image/png' }, body: blob,
        });
        const j = await res.json().catch(() => ({}));
        if (res.ok && j.path) insertAtCursor(inputEl, j.path + ' ');
        else alert('No se pudo guardar el pantallazo.');
      } catch { alert('No se pudo subir el pantallazo.'); }
    }
    inputEl.focus();
  });

  // ── título: editable al clic + varita de nombre automático ──────────────────
  async function saveTitle(title) {
    if (!active) return;
    const res = await fetch('/api/chats/' + active + '/title', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title }),
    });
    if (!res.ok) { titleEl.textContent = currentTitle; return; }
    const j = await res.json();
    currentTitle = j.chat.title;
    titleEl.textContent = currentTitle;
    loadList();
    // Si estamos DENTRO de una tarea, el título de arriba ES, para Tie, el de la
    // tarea: renómbrala también para que la lista de la derecha lo refleje (antes
    // solo cambiaba la conversación y la tarea se quedaba con el nombre viejo).
    if (currentTarea) {
      try {
        const upd = await (await fetch('/api/tareas/' + currentTarea.id + '/definicion', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title }),
        })).json();
        currentTarea = { ...currentTarea, ...upd };
        renderTareaDef(); loadTareas();
      } catch { /* el título de la conversación ya cambió; la tarea es best-effort */ }
    }
  }

  titleEl.addEventListener('click', () => {
    if (!active || titleEl.getAttribute('contenteditable') === 'true') return;
    titleEl.setAttribute('contenteditable', 'true');
    titleEl.focus();
    const sel = window.getSelection();
    if (sel) { sel.selectAllChildren(titleEl); }
  });
  titleEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); titleEl.blur(); }
    else if (e.key === 'Escape') { titleEl.textContent = currentTitle; titleEl.blur(); }
  });
  titleEl.addEventListener('blur', () => {
    titleEl.setAttribute('contenteditable', 'false');
    const t = titleEl.textContent.replace(/\s+/g, ' ').trim();
    if (!t || t === currentTitle) { titleEl.textContent = currentTitle; return; }
    saveTitle(t);
  });

  btnWand.onclick = async () => {
    if (!active || btnWand.disabled) return;
    btnWand.disabled = true; btnWand.classList.add('busy');
    try {
      const res = await fetch('/api/chats/' + active + '/autoname', { method: 'POST' });
      if (res.ok) {
        const j = await res.json();
        currentTitle = j.chat.title;
        titleEl.textContent = currentTitle;
        loadList();
      } else {
        alert('No se pudo generar el nombre.');
      }
    } catch {
      alert('No se pudo generar el nombre.');
    }
    btnWand.classList.remove('busy');
    btnWand.disabled = false;
  };

  // ── "Nuevo ciclo": la PRIMERA parada del carril (no un panel/modal) ─────────
  // Se llega SOLO con la flecha ◀ desde Spike. No hay modal en el centro: el objetivo
  // y la rama se editan arriba a la izquierda; la única conversación es la de Iris
  // (una por objetivo); la flecha ▶ = "empezar" (borra el taller y arranca en Spike).
  const gateNewBtn = document.getElementById('gateNewBtn');

  // Abre (o crea + lanza a Iris en) la conversación de backlog del objetivo dado.
  // Una por objetivo: si ya existe la reutiliza; si no, Iris la abre.
  async function abrirBacklog(target) {
    try {
      const res = await fetch('/api/cycle/backlog', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ target }),
      });
      if (!res.ok) return;
      const j = await res.json();
      await loadList();
      openChat(j.chat.id);
      if (j.spawned) { addPending('iris', null); lastSig = ''; refreshThread(); }
    } catch {}
  }

  function showNuevoCiclo(on) {
    nuevoActive = on;            // estás parado en la parada "Nuevo ciclo"
    renderCycle();               // carril + flechas + chip del objetivo editable
    loadList();                  // la lista de la izquierda: solo backlog en Nuevo ciclo
    loadTareas();                // las tareas: vacías en Nuevo ciclo
    if (on) abrirBacklog((cycle && cycle.target) || 'forge');
  }

  // El botón "🚀 Empezar ciclo" (y la flecha ▶) desde "Nuevo ciclo": confirma, exige
  // el repo del objetivo limpio, borra el taller (salvo la conversación de Iris del
  // objetivo) y arranca en Spike. Luego, en segundo plano, el servidor analiza la
  // charla y abre los frentes (Iris) + las tecnologías (William) y crea la rama.
  let empezandoCiclo = false;
  async function empezarCiclo() {
    if (empezandoCiclo) return;   // anti doble-clic: crea rama + muchas conversaciones
    if (!confirm('Empezar el ciclo:\n\n• BORRA el taller (todas las tareas y conversaciones, salvo la charla de Iris del objetivo).\n• Analiza la conversación, CREA la rama del ciclo (1-3 palabras) y pasa a Spike.\n• Iris abre los frentes por donde atacar y William sugiere tecnologías externas.\n\n¿Seguir?')) return;
    empezandoCiclo = true;
    if (btnEmpezarCiclo) btnEmpezarCiclo.disabled = true;
    try {
    const res = await fetch('/api/cycle/empezar', { method: 'POST' });
    if (res.status === 409) {
      const j = await res.json();
      let msg = j.error || 'No se pudo.';
      if (j.pending && j.pending.length) msg += '\n\nPendiente:\n' + j.pending.slice(0, 20).join('\n');
      alert(msg);
      return;
    }
    if (!res.ok) { alert('No se pudo empezar el ciclo.'); return; }
    const j = await res.json();
    nuevoActive = false;
    if (j.cycle) { cycle = j.cycle; renderCycle(); } else { loadCycle(); }
    await loadList();
    loadTareas();
    if (j.chat) openChat(j.chat.id);
    // los frentes/tecnologías y la rama llegan ASÍNCRONOS (los analistas tardan):
    // refresca el ciclo y la lista durante unos minutos para verlos aparecer.
    arrancarPollCiclo();
    } finally {
      empezandoCiclo = false;
      syncCicloBtn();   // re-evalúa visibilidad/disabled del botón
    }
  }

  // Poller acotado tras "Empezar ciclo": cada 3s refresca /api/cycle (para ver la
  // rama cuando Iris la decide) y la lista (para ver entrar frentes/tecnologías).
  // Se apaga solo a los ~5 min. No es permanente: solo cubre el arranque del ciclo.
  let cicloPollTimer = null;
  function arrancarPollCiclo(durMs) {
    if (cicloPollTimer) clearInterval(cicloPollTimer);
    const stopAt = Date.now() + (durMs || 5 * 60 * 1000);
    cicloPollTimer = setInterval(async () => {
      try { await loadCycle(); if (!nuevoActive) await loadList(); } catch {}
      if (Date.now() > stopAt) { clearInterval(cicloPollTimer); cicloPollTimer = null; }
    }, 3000);
  }
  if (btnEmpezarCiclo) btnEmpezarCiclo.onclick = () => empezarCiclo();

  document.getElementById('newChat').onclick = async () => {
    const res = await fetch('/api/chats', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'charla' }),
    });
    if (!res.ok) { alert('No se pudo crear la conversación.'); return; }
    const c = await res.json();
    await loadList();
    openChat(c.id);
  };

  // ── plegado de columnas (recuerda el estado entre recargas) ─────────────────
  const toggleLeft = document.getElementById('toggleLeft');
  function applyLeftState() {
    const collapsed = localStorage.getItem('forge.leftCollapsed') === '1';
    document.body.classList.toggle('left-collapsed', collapsed);
    toggleLeft.textContent = collapsed ? '»' : '«';
    toggleLeft.title = collapsed ? 'Desplegar la columna' : 'Plegar la columna';
  }
  toggleLeft.onclick = () => {
    const collapsed = !document.body.classList.contains('left-collapsed');
    localStorage.setItem('forge.leftCollapsed', collapsed ? '1' : '0');
    applyLeftState();
  };
  applyLeftState();

  const toggleRight = document.getElementById('toggleRight');
  function applyRightState() {
    const collapsed = localStorage.getItem('forge.rightCollapsed') === '1';
    document.body.classList.toggle('right-collapsed', collapsed);
    toggleRight.textContent = collapsed ? '«' : '»';
    toggleRight.title = collapsed ? 'Desplegar la columna' : 'Plegar la columna';
  }
  toggleRight.onclick = () => {
    const collapsed = !document.body.classList.contains('right-collapsed');
    localStorage.setItem('forge.rightCollapsed', collapsed ? '1' : '0');
    applyRightState();
  };
  applyRightState();

  // (El selector de modelo GLOBAL se retiró: cada empleado lleva su propio modelo en
  // su perfil — 👥 Equipo. Lo que quede sin fijar hereda el default del CLI.)

  // ── uso de la suscripción (ventana de 5h) ───────────────────────────────────
  // El servidor cachea 5 min; aquí sondeamos cada 4 min (cualquier pestaña pega al
  // caché del servidor, nunca al endpoint real más de una vez por ventana).
  const usageChipEl = document.getElementById('usageChip');
  let lastUsage = null;
  usageChipEl.onclick = () => { if (lastUsage && lastUsage.available) openUsageModal(); };

  // "2h 14m" / "14m" / "—" desde un ISO de reset.
  function timeLeft(iso) {
    if (!iso) return '—';
    let ms; try { ms = new Date(iso).getTime() - Date.now(); } catch { return '—'; }
    if (!(ms > 0)) return '0m';
    const h = Math.floor(ms / 3600000), m = Math.floor((ms % 3600000) / 60000);
    return h ? (h + 'h ' + m + 'm') : (m + 'm');
  }
  function sev(pct) { return pct >= 95 ? 'danger' : (pct >= 80 ? 'warn' : ''); }

  async function loadUsage() {
    let u;
    try { u = await (await fetch('/api/usage')).json(); } catch { u = null; }
    lastUsage = u;
    const off = () => {
      usageChipEl.className = 'usage-chip off';
      usageChipEl.innerHTML = '<span class="uc-lbl">5h</span><span class="uc-meta">—</span>';
      usageChipEl.title = (u && u.reason) ? ('Uso 5h: ' + u.reason) : 'Uso de la ventana de 5h (sin datos)';
    };
    if (!u || !u.available || !u.primary || u.primary.usedPercent == null) { off(); return; }
    const pct = Math.round(Number(u.primary.usedPercent));
    const tl = timeLeft(u.primary.resetsAt);
    usageChipEl.className = 'usage-chip ' + sev(pct);
    usageChipEl.innerHTML = '<span class="uc-lbl">5h</span>'
      + '<span class="uc-bar"><span class="uc-fill"></span></span>'
      + '<span class="uc-meta">' + pct + '% · ' + tl + (u.stale ? ' ~' : '') + '</span>';
    usageChipEl.querySelector('.uc-fill').style.width = Math.min(100, pct) + '%';
    usageChipEl.title = 'Uso de la ventana de 5h' + (u.stale ? ' (dato cacheado)' : '') + ' — clic para el desglose';
  }

  function umWindow(name, w) {
    if (!w) return null;
    const pct = (w.utilization != null) ? Math.round(Number(w.utilization)) : (w.usedPercent != null ? Math.round(Number(w.usedPercent)) : null);
    if (pct == null) return null;
    const reset = w.resets_at || w.resetsAt || null;
    const el = document.createElement('div'); el.className = 'um-win';
    const head = document.createElement('div'); head.className = 'um-win-head';
    const nm = document.createElement('span'); nm.className = 'um-win-name'; nm.textContent = name;
    const p = document.createElement('span'); p.className = 'um-win-pct'; p.textContent = pct + '%';
    head.appendChild(nm); head.appendChild(p);
    const bar = document.createElement('div'); bar.className = 'um-win-bar';
    const fill = document.createElement('span'); fill.className = 'um-win-fill ' + sev(pct); fill.style.width = Math.min(100, pct) + '%';
    bar.appendChild(fill);
    const sub = document.createElement('div'); sub.className = 'um-win-sub';
    let resetTxt = '';
    if (reset) { try { resetTxt = new Date(reset).toLocaleString('es-ES', { weekday: 'short', hour: '2-digit', minute: '2-digit' }); } catch {} }
    sub.textContent = 'quedan ' + timeLeft(reset) + (resetTxt ? ' · reset ' + resetTxt : '');
    el.appendChild(head); el.appendChild(bar); el.appendChild(sub);
    return el;
  }

  function openUsageModal() {
    const raw = (lastUsage && lastUsage.raw) || {};
    let modal = document.getElementById('usage-modal');
    if (!modal) {
      modal = document.createElement('div'); modal.id = 'usage-modal'; modal.className = 'usage-modal';
      const box = document.createElement('div'); box.className = 'usage-box'; box.onclick = (e) => e.stopPropagation();
      modal.appendChild(box); modal.onclick = () => { modal.style.display = 'none'; };
      document.body.appendChild(modal);
    }
    const box = modal.querySelector('.usage-box');
    box.innerHTML = '';
    const h = document.createElement('h3'); h.textContent = 'Uso de tu suscripción';
    const x = document.createElement('button'); x.className = 'um-x'; x.textContent = '✕';
    x.onclick = () => { modal.style.display = 'none'; };
    h.appendChild(x); box.appendChild(h);
    const wins = [
      ['Ventana de 5 horas', raw.five_hour],
      ['Semana (7 días)', raw.seven_day],
      ['Semana · Opus', raw.seven_day_opus],
      ['Semana · Sonnet', raw.seven_day_sonnet],
    ];
    let any = false;
    for (const [name, w] of wins) { const el = umWindow(name, w); if (el) { box.appendChild(el); any = true; } }
    const ex = raw.extra_usage;
    if (ex && ex.is_enabled) {
      const d = document.createElement('div'); d.className = 'um-win-sub';
      d.textContent = 'Uso extra: ' + (ex.utilization != null ? Math.round(ex.utilization) + '%' : 'activado') + (ex.monthly_limit ? ' de ' + ex.monthly_limit : '');
      box.appendChild(d); any = true;
    }
    if (!any) { const d = document.createElement('div'); d.className = 'um-win-sub'; d.textContent = '(sin datos de ventanas)'; box.appendChild(d); }
    if (lastUsage && lastUsage.stale) { const s = document.createElement('div'); s.className = 'um-stale'; s.textContent = '⚠️ dato cacheado (el endpoint estaba rate-limited)'; box.appendChild(s); }
    // SUBVENCIÓN: cuánto vale en $ equivalentes-API el 100 % de la ventana + el gasto
    // real, calibrado de forma recurrente. Se llena async (un fetch a /api/subsidy).
    const subEl = document.createElement('div'); subEl.className = 'um-subsidy';
    subEl.innerHTML = '<h4>Subvención (equivalente-API)</h4><div class="um-win-sub">calculando…</div>';
    box.appendChild(subEl);
    fetch('/api/subsidy').then((r) => r.json()).then((s) => renderSubsidy(subEl, s)).catch(() => {});
    modal.style.display = 'flex';
  }

  // Dinero "humano": 2 decimales a partir de 1 $, 4 por debajo (para céntimos).
  function fmtMoney(v) {
    if (v == null) return '—';
    const n = Number(v);
    return '$' + (Math.abs(n) >= 1 ? n.toFixed(2) : n.toFixed(4));
  }

  // Pinta la sección de subvención: el valor API del 100 % de la ventana (calibrado),
  // el gasto API-equivalente (7d/30d/total), la proyección del ciclo en curso, y —si
  // hay cuota configurada— el múltiplo de subvención (consumes / pagas).
  function renderSubsidy(el, s) {
    el.innerHTML = '';
    const h = document.createElement('h4'); h.textContent = 'Subvención (equivalente-API)'; el.appendChild(h);

    const big = document.createElement('div'); big.className = 'um-sub-big';
    if (s.valuePer100 != null) {
      big.textContent = fmtMoney(s.valuePer100) + ' / ventana 5h';
    } else {
      big.textContent = 'calibrando…'; big.style.fontSize = '15px';
    }
    el.appendChild(big);
    const calib = document.createElement('div'); calib.className = 'um-sub-row';
    if (s.valuePer100 != null) {
      calib.innerHTML = 'Valor API del <b>100 %</b> de la ventana · cota inferior · '
        + s.sampleCount + ' muestras, ' + Math.round(s.observedPct || 0) + ' % de ventana observado';
    } else {
      calib.textContent = 'Aún sin suficientes muestras (necesita ver moverse la ventana). Vuelve dentro de un rato.';
    }
    el.appendChild(calib);

    // ciclo actual: proyección instantánea (más ruidosa que la calibrada)
    if (s.cycle && s.cycle.projectedFull != null) {
      const c = document.createElement('div'); c.className = 'um-sub-row';
      c.innerHTML = 'Ciclo actual: <b>' + Math.round(s.cycle.util) + ' %</b> → '
        + fmtMoney(s.cycle.spent) + ' gastados · proyección 100 % ≈ <b>' + fmtMoney(s.cycle.projectedFull) + '</b>';
      el.appendChild(c);
    }

    // gasto API-equivalente real (esto SÍ es exacto: lo reporta el CLI por trabajo)
    const g = document.createElement('div'); g.className = 'um-sub-row';
    g.innerHTML = 'Gasto API-equivalente: 7d <b>' + fmtMoney(s.last7d) + '</b> · 30d <b>'
      + fmtMoney(s.last30d) + '</b> · total <b>' + fmtMoney(s.totalCost) + '</b>';
    el.appendChild(g);

    // desglose por PERSONAJE: cuánto % de la ventana se come cada mensaje (para optimizar)
    if (Array.isArray(s.personas) && s.personas.length) {
      const pt = document.createElement('div'); pt.className = 'um-personas';
      const cap = document.createElement('div'); cap.className = 'um-personas-cap';
      cap.innerHTML = '% de ventana por mensaje <span>(últimos ' + (s.personasDias || 30) + ' días — el más caro arriba)</span>';
      pt.appendChild(cap);
      // escala la barrita al personaje más caro POR MENSAJE
      const maxAvg = s.personas.reduce((m, p) => Math.max(m, p.avgPctWindow || 0), 0) || 1;
      for (const p of s.personas) {
        const row = document.createElement('div'); row.className = 'um-persona';
        const name = document.createElement('span'); name.className = 'up-name'; name.textContent = nameOf(p.agente);
        const bar = document.createElement('span'); bar.className = 'up-bar';
        const fill = document.createElement('span'); fill.className = 'up-fill';
        fill.style.width = Math.min(100, ((p.avgPctWindow || 0) / maxAvg) * 100) + '%';
        bar.appendChild(fill);
        const meta = document.createElement('span'); meta.className = 'up-meta';
        const perMsg = p.avgPctWindow != null ? '<b>' + p.avgPctWindow.toFixed(2) + '%</b>/msg' : fmtMoney(p.avgCostUsd) + '/msg';
        const total = p.totalPctWindow != null ? p.totalPctWindow.toFixed(1) + '% total' : fmtMoney(p.totalCostUsd) + ' total';
        meta.innerHTML = perMsg + ' · ' + p.count + ' msgs · ' + total;
        row.appendChild(name); row.appendChild(bar); row.appendChild(meta);
        pt.appendChild(row);
      }
      el.appendChild(pt);
    }

    // cuota mensual editable → múltiplo de subvención (30d consumido / cuota)
    const fee = document.createElement('div'); fee.className = 'um-fee';
    const lbl = document.createElement('span'); lbl.textContent = 'Tu cuota mensual: $';
    const inp = document.createElement('input'); inp.type = 'number'; inp.min = '0'; inp.step = '1';
    inp.placeholder = '0'; if (s.feeMonthlyUsd != null) inp.value = s.feeMonthlyUsd;
    const unit = document.createElement('span'); unit.textContent = '/mes';
    fee.appendChild(lbl); fee.appendChild(inp); fee.appendChild(unit);
    el.appendChild(fee);

    const mult = document.createElement('div'); mult.className = 'um-sub-row';
    const pintarMult = (data) => {
      if (data.subsidyMultiple != null) {
        mult.innerHTML = 'Subvención (30d): consumes <b>' + fmtMoney(data.last30d) + '</b> en API, pagas <b>$'
          + Number(data.feeMonthlyUsd).toFixed(0) + '</b> → <span class="um-sub-mult">×' + data.subsidyMultiple.toFixed(1) + '</span>';
      } else {
        mult.textContent = 'Pon tu cuota para ver el múltiplo de subvención.';
      }
    };
    pintarMult(s);
    el.appendChild(mult);

    // guardar la cuota al cambiarla → re-pinta el múltiplo con datos frescos
    inp.onchange = async () => {
      const v = inp.value.trim();
      try {
        const res = await fetch('/api/subsidy/fee', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fee: v === '' ? 0 : Number(v) }),
        });
        if (!res.ok) return;
        const fresh = await (await fetch('/api/subsidy')).json();
        pintarMult(fresh);
      } catch {}
    };

    const note = document.createElement('div'); note.className = 'um-sub-note';
    note.textContent = 'El valor del 100 % se calibra contra TU uso real: la ventana la mueve todo lo que '
      + 'corra a la vez (forge + tus sesiones en paralelo), así que el número refleja tu manera de '
      + 'trabajar, no un ideal de un solo hilo. El % por personaje usa ese valor para traducir el coste '
      + 'de cada mensaje a cuánta ventana se come — cuanto más rueda el calibrador, más preciso.';
    el.appendChild(note);
  }

  // ── estado de la forja: lucecita + contador de claudes + apagado ordenado ────
  const forgeStatusEl = document.getElementById('forgeStatus');
  const btnRestart = document.getElementById('btnRestart');
  let esperandoReinicio = false;   // la UI ya pidió el reinicio y espera el drenaje
  let avisoReinicio = null;        // el aviso flotante "la forja se está reiniciando…"

  function plural(n) { return n === 1 ? '' : 's'; }

  // Aviso flotante de reinicio en curso (un solo elemento; se reutiliza/actualiza).
  function mostrarAvisoReinicio(msg) {
    if (!avisoReinicio) {
      avisoReinicio = document.createElement('div');
      avisoReinicio.className = 'forge-reinicio-aviso';
      avisoReinicio.style.cssText = 'position:fixed;bottom:18px;left:50%;transform:translateX(-50%);'
        + 'z-index:1300;background:#2a2118;color:#e0a23a;border:1px solid rgba(224,162,58,.5);'
        + 'border-radius:10px;padding:10px 16px;font-size:13px;box-shadow:0 4px 18px rgba(0,0,0,.4);';
      document.body.appendChild(avisoReinicio);
    }
    avisoReinicio.textContent = '⟳ ' + msg;
  }
  function ocultarAvisoReinicio() {
    if (avisoReinicio) { avisoReinicio.remove(); avisoReinicio = null; }
  }

  // Pinta la lucecita y el contador 🤖 N desde el status en vivo. st===null => el
  // servidor no respondió => desconectada (no nos quedamos en el último estado bueno).
  function pintarForgeStatus(st) {
    if (!st) {
      forgeStatusEl.className = 'forge-status down';
      forgeStatusEl.textContent = '🔴 desconectada — reinicio manual';
      return;
    }
    const n = Number(st.agentes) || 0;
    const bots = '🤖 ' + n;
    if (st.reiniciada) {
      forgeStatusEl.className = 'forge-status down';
      forgeStatusEl.textContent = '🔴 desconectada — reinicio manual';
    } else if (st.apagandose) {
      forgeStatusEl.className = 'forge-status draining';
      forgeStatusEl.textContent = '🟡 apagándose · ' + bots + ' claude' + plural(n);
    } else {
      forgeStatusEl.className = 'forge-status on';
      forgeStatusEl.textContent = '🟢 encendida · ' + bots;
    }
  }

  // ── arranque automático: el interruptor de la cabecera ───────────────────────
  const autostartCheck = document.getElementById('autostartCheck');
  const autostartHint = document.getElementById('autostartHint');

  // resetsAt (ISO) → "HH:MM" local, para el texto de espera de la ventana de 5h.
  function horaMinuto(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d)) return '';
    return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
  }

  // Pinta el toggle en su posición real (on/off) + la línea de hint según el estado
  // que devuelve el back. data = {on, estado, proximaVentana, pendientes}.
  function pintarAutostart(data) {
    if (!data) return;
    autostartCheck.checked = !!data.on;
    let hint = '';
    switch (data.estado) {
      case 'off':
        hint = 'apagado';
        break;
      case 'esperando': {
        const hm = horaMinuto(data.proximaVentana);
        hint = 'esperando a que se recupere la ventana de 5h' + (hm ? ' (se recupera ~' + hm + ')' : '');
        break;
      }
      case 'lanzando':
        hint = 'construyendo las tareas pendientes…';
        break;
      case 'sin-pendientes':
        hint = 'sin tareas pendientes que lanzar';
        break;
      default:
        hint = data.on ? '' : 'apagado';
    }
    autostartHint.textContent = hint;
  }

  // Lee el estado del arranque automático (forma fija del contrato). Se cuelga del
  // poll de la forja (NO abre una sonda propia).
  async function refreshAutostart() {
    try {
      const r = await fetch('/api/forge/autostart');
      if (r.ok) pintarAutostart(await r.json());
    } catch { /* el poll lo reintenta */ }
  }

  // Al pulsar el interruptor: persiste el flip y refresca el estado pintado.
  autostartCheck.onchange = async () => {
    const on = autostartCheck.checked;
    try {
      const r = await fetch('/api/forge/autostart', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ on }),
      });
      if (r.ok) pintarAutostart(await r.json());
    } catch { /* deja el poll reconciliar */ }
    refreshAutostart();
  };

  // Sonda propia (independiente del pollTimer del chat): pega a /api/forge/status
  // cada ~3s en marcha normal y baja a ~1/min cuando esperamos el reinicio.
  let forgePollTick = 0;
  async function pollForgeStatus() {
    forgePollTick++;
    if (esperandoReinicio && (forgePollTick % 20 !== 0)) return;   // ~1/min en espera
    let st;
    try {
      const r = await fetch('/api/forge/status');
      if (r.ok) st = await r.json(); else st = null;
    } catch { st = null; }
    pintarForgeStatus(st);
    // el arranque automático se sondea AQUÍ, colgado del mismo poll (sin sonda nueva).
    refreshAutostart();
    // la forja volvió a marcha normal (reinicio manual hecho): salimos de la espera.
    if (st && !st.apagandose && esperandoReinicio) {
      esperandoReinicio = false;
      ocultarAvisoReinicio();
    }
  }

  // Guardián del 503 'shutting down': si una acción que lanza trabajo cae mientras
  // la forja drena, NO es un fallo normal — avisamos y reprogramamos esa MISMA
  // acción cada 60s hasta que la forja vuelva. Devuelve true si lo gestionó.
  async function apagadoEnCurso(res, reintentar) {
    if (!res || res.status !== 503) return false;
    let body = {};
    try { body = await res.clone().json(); } catch {}
    if (body.error === 'shutting down') {
      esperandoReinicio = true;
      mostrarAvisoReinicio('La forja se está reiniciando… reintento esta acción en 1 min.');
      if (typeof reintentar === 'function') setTimeout(reintentar, 60000);
      return true;
    }
    return false;
  }

  // El botón "⟳ Schedule restart": con confirmación, dispara el apagado ordenado.
  btnRestart.onclick = async () => {
    if (!confirm('¿Programar el reinicio de la forja?\n\nDejará de aceptar trabajo nuevo, esperará a que los claudes activos terminen, y al quedar en cero quedará desconectada para que la reinicies a mano.')) return;
    esperandoReinicio = true;
    mostrarAvisoReinicio('Reinicio programado: la forja está drenando. Espera a que terminen los claudes activos…');
    try { await fetch('/api/forge/schedule-restart', { method: 'POST' }); } catch {}
    pollForgeStatus();
  };

  // ── arranque ─────────────────────────────────────────────────────────────────
  async function init() {
    loadCycle();
    loadUsage();
    setInterval(loadUsage, 4 * 60 * 1000);
    refreshAutostart();
    pollForgeStatus();
    setInterval(pollForgeStatus, 3000);
    loadTareas();
    updateSelectionUI();
    const chats = await loadList();
    if (!chats || !chats.length) {
      try {
        const res = await fetch('/api/chats/bootstrap', { method: 'POST' });
        if (res.ok) {
          const j = await res.json();
          await loadList();
          openChat(j.chat.id);
          if (j.spawned) {
            addPending('iris', null);
            lastSig = ''; refreshThread();
          }
        }
      } catch {}
      return;
    }
    openChat(chats[chats.length - 1].id); // la más reciente
  }
  init();
</script>
</body>
</html>
