          });
          if (!r.ok) throw new Error(((await r.json()) || {}).error || 'error');
          p.descripcion = ta.value; rebuild();
        } catch (e) { alert('No se pudo guardar: ' + e.message); save.classList.remove('busy'); save.disabled = false; }
      };
    };
    return card;
  }

  function flash(el) { el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 1400); }

  // Modal de permisos: TODO lo posible en casillas (leer = una; escribir y
  // herramientas MCP = varias). Guarda al endpoint por id; cierra y refresca el resumen.
  function permSection(title, hint) {
    const el = document.createElement('div'); el.className = 'perm-sec';
    const h = document.createElement('div'); h.className = 'perm-sec-h'; h.textContent = title;
    if (hint) { const s = document.createElement('span'); s.className = 'perm-sec-hint'; s.textContent = ' — ' + hint; h.appendChild(s); }
    const body = document.createElement('div'); body.className = 'perm-sec-body';
    el.appendChild(h); el.appendChild(body);
    return { el, body };
  }
  function openPermisos(p, catalogo, onSaved) {
    const modal = document.createElement('div'); modal.className = 'perm-modal';
    const box = document.createElement('div'); box.className = 'perm-box'; box.onclick = (e) => e.stopPropagation();
    const close = () => modal.remove();
    modal.onclick = close;
    const h = document.createElement('h3'); h.textContent = 'Permisos de ' + p.nombre + '  ';
    const idtag = document.createElement('span'); idtag.className = 'tc-slug'; idtag.textContent = p.id; h.appendChild(idtag);
    box.appendChild(h);

    const leeSec = permSection('Puede leer', 'qué parte del repo ve (una opción)');
    const leeName = 'lee-' + p.id;
    (catalogo.lee || []).forEach((o) => {
      const lab = document.createElement('label'); lab.className = 'perm-opt';
      const r = document.createElement('input'); r.type = 'radio'; r.name = leeName; r.value = o.value;
      r.checked = (p.scope.lee || '') === o.value;
      lab.appendChild(r); lab.appendChild(document.createTextNode(' ' + o.label)); leeSec.body.appendChild(lab);
    });
    box.appendChild(leeSec.el);

    const escSec = permSection('Puede escribir', 'qué puede modificar (vacío = no escribe)');
    const escBoxes = [];
    (catalogo.escribe || []).forEach((o) => {
      const lab = document.createElement('label'); lab.className = 'perm-opt';
      const c = document.createElement('input'); c.type = 'checkbox'; c.value = o.value;
      c.checked = (p.scope.escribe || []).includes(o.value);
      escBoxes.push(c); lab.appendChild(c); lab.appendChild(document.createTextNode(' ' + o.label)); escSec.body.appendChild(lab);
    });
    box.appendChild(escSec.el);

    const herrSec = permSection('Herramientas MCP', 'qué herramientas puede llamar — cítalas por su nombre en la descripción');
    const herrBoxes = [];
    (catalogo.herramientas || []).forEach((o) => {
      const lab = document.createElement('label'); lab.className = 'perm-opt';
      const c = document.createElement('input'); c.type = 'checkbox'; c.value = o.value;
      c.checked = (p.herramientas || []).includes(o.value);
      herrBoxes.push(c); lab.appendChild(c);
      lab.appendChild(document.createTextNode(' '));
      const code = document.createElement('code'); code.textContent = o.value; lab.appendChild(code);
      if (o.desc) { const d = document.createElement('span'); d.className = 'perm-desc'; d.textContent = ' — ' + o.desc; lab.appendChild(d); }
      herrSec.body.appendChild(lab);
    });
    box.appendChild(herrSec.el);

    const askLab = document.createElement('label'); askLab.className = 'perm-opt perm-ask';
    const ask = document.createElement('input'); ask.type = 'checkbox'; ask.checked = p.scope.preguntar !== false;
    askLab.appendChild(ask); askLab.appendChild(document.createTextNode(' Pregunta antes de actuar'));
    box.appendChild(askLab);

    const acts = document.createElement('div'); acts.className = 'perm-acts';
    const save = document.createElement('button'); save.className = 'team-btn primary'; save.textContent = 'Guardar';
    const cancel = document.createElement('button'); cancel.className = 'team-btn'; cancel.textContent = 'Cancelar';
    cancel.onclick = close; acts.appendChild(save); acts.appendChild(cancel); box.appendChild(acts);

    save.onclick = async () => {
      save.classList.add('busy'); save.disabled = true;
      const leeSel = box.querySelector('input[name="' + leeName + '"]:checked');
      const lee = leeSel ? leeSel.value : '';
      const escribe = escBoxes.filter((c) => c.checked).map((c) => c.value);
      const herramientas = herrBoxes.filter((c) => c.checked).map((c) => c.value);
      try {
        const r = await fetch('/api/people/' + encodeURIComponent(p.id), {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ scope: { lee, escribe, preguntar: ask.checked }, herramientas }),
        });
        if (!r.ok) throw new Error(((await r.json()) || {}).error || 'error');
        const updated = (await r.json()).person; p.scope = updated.scope; p.herramientas = updated.herramientas;
        close(); if (onSaved) onSaved();
      } catch (e) { alert('No se pudo guardar: ' + e.message); save.classList.remove('busy'); save.disabled = false; }
    };

    modal.appendChild(box); document.body.appendChild(modal);
  }

  // ── listas ───────────────────────────────────────────────────────────────────
  async function loadList() {
    const all = await (await fetch('/api/chats')).json();
    // En "Nuevo ciclo" la única conversación es la de Iris: la lista muestra SOLO los
    // backlog. Fuera de esa parada, todas.
    const chats = nuevoActive ? all.filter((c) => c.type === 'backlog') : all;
    listEl.innerHTML = '';
    if (!chats.length) {
      listEl.innerHTML = '<li class="empty">Todavía no hay conversaciones.<br>Crea la primera.</li>';
      return chats;
    }
    for (const c of chats.slice().reverse()) {
      const li = document.createElement('li');
      li.className = 'chat-item' + (c.id === active ? ' active' : '');
      li.innerHTML = '<div class="row"><div class="body"><div class="title"></div></div>'
        + '<button class="chat-del" title="Borrar conversación (definitivo)">🗑</button></div>';
      li.dataset.chatId = c.id;
      li.querySelector('.title').textContent = c.title;
      li.querySelector('.title').title = c.title + '  (#' + c.id + ' · ' + (c.type || '') + ')';
      pintarIconosTareas(li.querySelector('.title'), c.id);
      li.querySelector('.body').onclick = () => openChat(c.id);
      li.querySelector('.chat-del').onclick = (e) => { e.stopPropagation(); deleteChat(c); };
      listEl.appendChild(li);
    }
    return chats;
  }

  // Borra una conversación (definitivo). Si era la abierta, limpia el centro y
  // corta el sondeo. (Tarea #001 de Miguel, adaptada al árbol vivo.)
  async function deleteChat(c) {
    if (!confirm('Borrar la conversación "' + c.title + '" (#' + c.id + ')?\n\nEs definitivo: no se puede deshacer.')) return;
    const res = await fetch('/api/chats/' + c.id, { method: 'DELETE' });
    if (!res.ok && res.status !== 404) { alert('No se pudo borrar la conversación.'); return; }
    if (active === c.id) {
      active = null; currentTarea = null;
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
      lastCount = -1; pendings = [];
      cancelEdit();
      inputEl.disabled = true; inputEl.value = '';
      for (const b of composerBtns) b.disabled = true;
      btnWand.disabled = true;
      currentTitle = 'Chat'; titleEl.textContent = 'Chat';
      renderTareaDef();
      threadEl.innerHTML = '<div class="placeholder">Crea o elige una conversación a la izquierda.</div>';
      updateSelectionUI();
    }
    loadList();
  }

  // qué tareas dejó el usuario desplegadas a mano (sobrevive a los refrescos del sondeo).
  const tareaAbierta = {};

  // Índice compartido chatId → tareas decoradas que nacieron de ese chat (tarea #020).
  // loadTareas() lo RECONSTRUYE en cada refresco (sin caché propia): siempre lee la lista
  // viva, así una tarea borrada —que pierde su fromChat vía restoreStubbedMessage— se cae
  // sola del cruce. loadList() y el re-pintado lo leen para pintar iconos en cada fila.
  let tareasPorChat = {};
  // Orden canónico de gravedad de los GRUPOS (revisar→encurso→porhacer→terminadas): un
  // ✕ (revisar) va primero y nunca queda escondido tras los verdes cuando hay tope/+N.
  const GRUPOS_ORDEN = ['revisar', 'encurso', 'porhacer', 'terminadas'];

  // Pinta, dentro del .title de una fila .chat-item, un contenedor inline con los iconos
  // de estado de las tareas de ese chat: ordenados por gravedad, tope de 3 + '+N' gris.
  function pintarIconosTareas(titleEl, chatId) {
    if (!titleEl) return;
    const prev = titleEl.querySelector('.chat-tareas');
    if (prev) prev.remove();                       // sin estado obsoleto: siempre re-pinta de cero
    const tareas = (tareasPorChat[chatId] || []).slice();
    if (!tareas.length) return;                    // chat sin tareas → ni contenedor
    tareas.sort((a, b) => {
      const ra = GRUPOS_ORDEN.indexOf(a.grupo), rb = GRUPOS_ORDEN.indexOf(b.grupo);
      return (ra === -1 ? 99 : ra) - (rb === -1 ? 99 : rb);
    });
    const cont = document.createElement('span');
    cont.className = 'chat-tareas';
    for (const t of tareas.slice(0, 3)) {
      const ic = document.createElement('span');
      ic.className = 'ct-ico'; ic.textContent = t.icon; ic.title = t.title || '';
      cont.appendChild(ic);
    }
    if (tareas.length > 3) {
      const mas = document.createElement('span');
      mas.className = 'ct-mas'; mas.textContent = '+' + (tareas.length - 3);
      cont.appendChild(mas);
    }
    titleEl.appendChild(cont);
  }

  // Re-pinta los iconos en TODAS las filas de chat ya montadas, leyendo el índice vivo.
  // Lo dispara loadTareas() tras reconstruir el cruce, sin rehacer toda la lista.
  function repintarIconosChats() {
    if (!listEl) return;
    for (const li of listEl.querySelectorAll('.chat-item')) {
      pintarIconosTareas(li.querySelector('.title'), li.dataset.chatId);
    }
  }

  async function loadTareas() {
    // En "Nuevo ciclo" las tareas están vacías (se borran al empezar): no las pintamos.
    if (nuevoActive) {
      tareasPorChat = {};
      tareaListEl.innerHTML = '<li class="empty">Las tareas están vacías en Nuevo ciclo.</li>';
      return;
    }
    let data;
    try { data = await (await fetch('/api/tareas')).json(); } catch { return; }
    // el motor ya devuelve {tareas: [decoradas+ordenadas], grupos: [...]}.
    const ts = (data && data.tareas) || [];
    const grupos = (data && data.grupos) || [];
    // reconstruye el índice chat→tareas (reset + relleno por fromChat) y re-pinta los
    // iconos en la lista de chats. Sin caché: lo de antes se tira entero cada refresco.
    tareasPorChat = {};
    for (const t of ts) {
      if (!t.fromChat) continue;
      (tareasPorChat[t.fromChat] = tareasPorChat[t.fromChat] || []).push(t);
    }
    repintarIconosChats();
    // sincroniza la tarea abierta con lo último del servidor (p.ej. el plan que
    // Aubé acaba de adoptar) y re-pinta su ficha si cambió — salvo que la estés
    // editando a mano (no pisar tu edición a medias).
    if (currentTarea && !editingTareaDef) {
      const ut = ts.find((x) => x.id === currentTarea.id);
      if (ut && JSON.stringify(ut) !== JSON.stringify(currentTarea)) { currentTarea = ut; renderTareaDef(); }
    }
    tareaListEl.innerHTML = '';
    if (!ts.length) {
      tareaListEl.innerHTML = '<li class="empty">Aún no hay tareas.<br>Nacen al aprobar a Aubé.</li>';
      return;
    }
    // pinta cajón a cajón en el orden del motor; salta los cajones vacíos. La
    // cabecera de cada grupo PLIEGA/DESPLIEGA sus tareas (clic en el título); el
    // grupo "Terminadas" arranca PLEGADO para no meter ruido. Estado persistido.
    for (const g of grupos) {
      const enCajon = ts.filter((t) => t.grupo === g.key);
      if (!enCajon.length) continue;
      const collapsed = grupoColapsado(g.key);
      const head = document.createElement('li');
      head.className = 'tarea-grupo' + (collapsed ? ' colapsado' : '');
      head.innerHTML = '<span class="tg-arrow">' + (collapsed ? '▸' : '▾') + '</span>'
        + '<span class="tg-label"></span><span class="tg-count">' + enCajon.length + '</span>';
      head.querySelector('.tg-label').textContent = g.label;
      head.onclick = () => { toggleGrupo(g.key); loadTareas(); };
      tareaListEl.appendChild(head);
      if (!collapsed) for (const t of enCajon) tareaListEl.appendChild(renderTareaItem(t));
    }
  }
  // estado plegado de los grupos de tareas (persistido). "Terminadas" plegado por defecto.
  function grupoColapsado(key) {
    const s = readGruposColapsados();
    return key in s ? s[key] : (key === 'terminadas');
  }
  function toggleGrupo(key) {
    const s = readGruposColapsados();
    s[key] = !grupoColapsado(key);
    try { localStorage.setItem('forge_grupos_colapsados', JSON.stringify(s)); } catch {}
  }
  function readGruposColapsados() {
    try { return JSON.parse(localStorage.getItem('forge_grupos_colapsados') || '{}') || {}; }
    catch { return {}; }
  }

  function renderTareaItem(t) {
    const subs = t.subtareas || [];
    const li = document.createElement('li');
    li.className = 'tarea-item';
    li.classList.toggle('active', !!(currentTarea && currentTarea.id === t.id));

    // fila: icono de estado + título cortísimo (descripción en rollover).
    const row = document.createElement('div'); row.className = 'tarea-row';
    const ico = document.createElement('span'); ico.className = 'tarea-ico' + (t.estado === 'error' ? ' rojo' : t.estado === 'enMaster' ? ' verde' : '');
    ico.textContent = t.icon;
    const title = document.createElement('div'); title.className = 'title'; title.textContent = t.title;
    const del = document.createElement('button'); del.className = 'tarea-del';
    del.textContent = '🗑'; del.title = 'Borrar tarea (devuelve el plan a su conversación origen)';
    del.onclick = (e) => { e.stopPropagation(); borrarTarea(t); };
    row.append(ico, title, del);
    row.onclick = () => openTarea(t.id);   // F9b: abre la tarea en el centro
    li.appendChild(row);
    li.title = t.body || '';

    // contenedor de subtareas + barrita clicable. Despliegue AUTOMÁTICO si los
    // iconos divergen (t.diverge); si no, manual (lo recuerda tareaAbierta).
    const abierto = t.diverge || !!tareaAbierta[t.id];
    const bar = document.createElement('div'); bar.className = 'tarea-bar';
    const fill = document.createElement('div'); fill.className = 'fill';
    // la barrita rellena según el avance de la subtarea menos avanzada (0..1).
    const RANK = { error: 0, pendiente: 0, cogida: 0.4, terminada: 0.75, enMaster: 1 };
    fill.style.width = Math.round((RANK[t.estado] ?? 0) * 100) + '%';
    bar.appendChild(fill);
    bar.title = abierto ? 'Plegar subtareas' : 'Desplegar subtareas';
    bar.onclick = (e) => {
      e.stopPropagation();
      tareaAbierta[t.id] = !abierto;
      subsEl.classList.toggle('hidden');
    };
    li.appendChild(bar);

    const subsEl = document.createElement('div');
    subsEl.className = 'tarea-subs' + (abierto ? '' : ' hidden');
    for (const s of subs) {
      const se = document.createElement('div'); se.className = 'tarea-sub';
      const si = document.createElement('span'); si.className = 'tarea-ico' + (s.estado === 'error' ? ' rojo' : s.estado === 'enMaster' ? ' verde' : '');
      si.textContent = s.icon;
      const sn = document.createElement('span'); sn.className = 'sname'; sn.textContent = s.name;
      // el CARRIL de la subtarea, en el rollover: qué le toca, hasta dónde, qué no.
      const al = s.alcance;
      if (al && (al.archivos?.length || al.frontera || al.noTocar?.length)) {
        const parts = [];
        if (al.archivos?.length) parts.push('toca: ' + al.archivos.join(', '));
        if (al.frontera) parts.push('hasta: ' + al.frontera);
        if (al.noTocar?.length) parts.push('NO toca: ' + al.noTocar.join(', '));
        se.title = parts.join('\n');
      }
      se.append(si, sn);
      subsEl.appendChild(se);
    }
    li.appendChild(subsEl);
    return li;
  }

  // ── motor markdown → DOM ─────────────────────────────────────────────────────
  // Vive en /forge/forge-md.js (cargado por <script> arriba): cuelga de window
  // `fillBubble`, `mdToFragment`, `inlineBlock` e `IMG_RE`. Lo usan el pintor de
  // mensajes y las fichas de tarea/plan. `makeThumb` llama a `openLightbox` (↓).
  function openLightbox(src) {
    let lb = document.getElementById('lightbox');
    if (!lb) {
      lb = document.createElement('div');
      lb.id = 'lightbox'; lb.className = 'lightbox';
      lb.appendChild(document.createElement('img'));
      lb.onclick = () => { lb.style.display = 'none'; };
      document.body.appendChild(lb);
    }
    lb.querySelector('img').src = src;
    lb.style.display = 'flex';
  }
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Escape') return;
    const lb = document.getElementById('lightbox');
    if (lb && lb.style.display !== 'none') lb.style.display = 'none';
    const cm = document.getElementById('cost-modal');
    if (cm && cm.style.display !== 'none') cm.style.display = 'none';
    const pm = document.querySelector('.perm-modal');
    if (pm) { pm.remove(); return; }   // el de permisos primero (va por encima)
    const tm = document.getElementById('team-modal');
    if (tm && tm.style.display !== 'none') tm.style.display = 'none';
    const um = document.getElementById('usage-modal');
    if (um && um.style.display !== 'none') um.style.display = 'none';
  });

  // ── modal de coste ────────────────────────────────────────────────────────────
  // Al pinchar la chapa $: trae /api/tokens/run/:runId y pinta el total + cada
  // petición (agente · modelo · permisos · tokens · coste · textoEntrada plegable).
  function esc(s) { const d = document.createElement('div'); d.textContent = String(s == null ? '' : s); return d.innerHTML; }
  function fmtUsd(v) { return v == null ? '—' : '$' + Number(v).toFixed(4); }
  function fmtNum(v) { return v == null ? '—' : Number(v).toLocaleString('es-ES'); }
  function openCostModal(runId) {
    let cm = document.getElementById('cost-modal');
    if (!cm) {
      cm = document.createElement('div');
      cm.id = 'cost-modal'; cm.className = 'cost-modal';
      const box = document.createElement('div');
      box.className = 'cost-box';
      box.onclick = (ev) => ev.stopPropagation();
      cm.appendChild(box);
      cm.onclick = () => { cm.style.display = 'none'; };
      document.body.appendChild(cm);
    }
    const box = cm.querySelector('.cost-box');
    box.innerHTML = '<div class="cost-loading">Cargando coste…</div>';
    cm.style.display = 'flex';
    if (!runId) { box.innerHTML = '<div class="cost-loading">Sin runId para este mensaje.</div>'; return; }
    fetch('/api/tokens/run/' + encodeURIComponent(runId))
      .then((r) => r.json())
      .then((data) => {
        const t = data.total || {};
        let html = '<div class="cost-head">'
          + '<span class="cost-total">' + fmtUsd(t.costUsd) + '</span>'
          + '<span class="cost-sub">' + (data.requests ? data.requests.length : 0) + ' petición(es) · '
          + 'in ' + fmtNum(t.inputTokens) + ' · out ' + fmtNum(t.outputTokens)
          + ' · cache-read ' + fmtNum(t.cacheReadTokens) + ' · cache-new ' + fmtNum(t.cacheCreationTokens) + '</span>'
          + '<button class="cost-x" type="button">✕</button></div>';
        const reqs = data.requests || [];
        if (!reqs.length) {
          html += '<div class="cost-loading">No hay peticiones registradas para este run.</div>';
        } else {
          html += '<div class="cost-list">';
          for (const q of reqs) {
            const warn = q.usageFound === false;
            html += '<div class="cost-req' + (warn ? ' warn' : '') + '">'
              + '<div class="cost-req-head">'
              + '<b>' + esc(q.agente || '?') + '</b>'
              + ' <span class="cost-tag">' + esc(q.modelo || '—') + '</span>'
              + ' <span class="cost-tag">' + esc(q.permisos || '—') + '</span>'
              + ' <span class="cost-price">' + (warn ? '⚠️ ' : '') + fmtUsd(q.costUsd) + '</span>'
              + '</div>'
              + '<div class="cost-req-toks">in ' + fmtNum(q.inputTokens) + ' · out ' + fmtNum(q.outputTokens)
              + ' · cache-read ' + fmtNum(q.cacheReadTokens) + ' · cache-new ' + fmtNum(q.cacheCreationTokens)
              + (q.spawn ? ' · <i>' + esc(q.spawn) + '</i>' : '') + '</div>'
              + '<details class="cost-input" open><summary>texto de entrada (' + fmtNum(q.promptChars) + ' chars)</summary>'
              + '<pre>' + esc(q.textoEntrada || '') + '</pre></details>'
              + '</div>';
          }
          html += '</div>';
        }
        box.innerHTML = html;
        const x = box.querySelector('.cost-x');
        if (x) x.onclick = () => { cm.style.display = 'none'; };
      })
      .catch((e) => { box.innerHTML = '<div class="cost-loading">No se pudo cargar el coste: ' + esc(e.message) + '</div>'; });
  }

  // ── ticker EN VIVO de un build (cuenta los segundos en el navegador) ──────────
  // "hace Xs" se calcula AQUÍ desde el timestamp del último ping, así sube de verdad
  // segundo a segundo (en vez de un número congelado que escribió el servidor).
  function haceCuanto(ms) {
    const s = Math.max(0, Math.round((Date.now() - Number(ms)) / 1000));
    if (s < 60) return s + 's';
    const m = Math.floor(s / 60); const r = s % 60;
    return m + 'm' + (r ? ' ' + r + 's' : '');
  }
  function horaDe(ms) {
    try { return new Date(Number(ms)).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' }); } catch { return '?'; }
  }
  // si el último latido tiene más de este tiempo, damos el build por SIN SEÑAL
  // (el proceso pudo cortarse sin avisar). El latido sano repinta cada 10s.
  const TICKER_STALE_MS = 60 * 1000;
  function updateTicker(el) {
    const ping = el.dataset.ping;
    const started = el.dataset.started;
    const stale = ping && (Date.now() - Number(ping)) > TICKER_STALE_MS;
    const partes = [];
    if (started) partes.push('arrancado a las ' + horaDe(started));
    if (ping) partes.push((stale ? 'sin señal desde hace ' : 'último ping hace ') + haceCuanto(ping));
    el.classList.toggle('stale', !!stale);
    el.textContent = (stale ? '⚠️ ' : '🟢 ') + partes.join(' · ')
      + (stale ? ' — el build pudo cortarse' : '');
  }
  // un solo reloj global: cada segundo refresca todos los tickers vivos en pantalla.
  setInterval(() => { document.querySelectorAll('.live-ticker').forEach(updateTicker); }, 1000);

  // ── árbol de mensajes ─────────────────────────────────────────────────────────
  // F22: ya NO hay barra de acciones por mensaje. El nodo se SELECCIONA al hacer
  // clic en su burbuja (se vuelve el rey); las herramientas viven en la barra común.
  function renderNode(m, byParent, isProng) {
    const node = document.createElement('div');
    node.className = 'node' + (m.thinking ? ' thinking' : '') + (m.id === selectedId ? ' selected' : '');

    const who = document.createElement('div');
    who.className = 'who';
    const whoTxt = document.createElement('span');
    whoTxt.className = 'who-txt';
    whoTxt.textContent = m.thinking
      ? nameOf(m.author) + ' · pensando…'
      : nameOf(m.author) + ' · ' + m.type + (m.replyTo ? ' · ↳ #' + m.replyTo : '') + (m.edited ? ' · editado' : '') + '  (#' + m.id + ')'
        + (m.id === selectedId ? '  · 👑 rey' : '');
    who.appendChild(whoTxt);
    // botón de borrar por mensaje (oculto hasta el hover de la fila, como el ✕ de
    // conversación). No en fantasmas (aún sin id real). Llama a borrarMensaje, que
    // decide si preguntar cascada según tenga descendientes en el árbol local.
    if (!m.thinking) {
      const del = document.createElement('button');
      del.className = 'msg-del';
      del.type = 'button';
      del.textContent = '🗑';
      del.title = 'Borrar este mensaje';
      del.onclick = (e) => { e.stopPropagation(); borrarMensaje(m); };
      who.appendChild(del);
    }
    node.appendChild(who);

    if (m.thinking) {
      node.appendChild(makeSkeletonBubble());
      return node;
    }

    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + (m.author === 'tie' ? 'tie' : 'other');
    fillBubble(bubble, stripMachineBlocks(m.text));
    // stub de tarea aprobada ("[Tarea NNN creada: …]"): el plan ya vive en la tarea;
    // este mensaje es un LINK — clic en él abre la tarea en el carril central.
    if (m.tareaRef != null) {
      bubble.classList.add('tarea-link-msg');
      bubble.title = 'Abrir la tarea #' + m.tareaRef;
      bubble.onclick = (e) => { e.stopPropagation(); openTarea(m.tareaRef); };
    } else {
      bubble.title = 'Clic para seleccionar este mensaje (el rey)';
      bubble.onclick = () => selectMsg(m.id);
    }
    node.appendChild(bubble);

    // chapa de coste $ — solo en el mensaje "primario" de un run (uno por spawn).
    // Si el CLI no reportó coste (usageFound:false) → ⚠️ en vez de "$0.0000".
    if (m.cost && m.costPrimary) {
      const chip = document.createElement('span');
      chip.className = 'cost-chip';
      if (m.cost.usd != null) {
        chip.textContent = '$' + Number(m.cost.usd).toFixed(4);
      } else if (m.cost.usageFound === false) {
        chip.textContent = '⚠️';
        chip.title = 'El CLI no reportó coste para este mensaje';
      } else {
        chip.textContent = '⚠️';
      }
      chip.title = chip.title || 'Clic para ver el desglose de tokens y coste';
      chip.onclick = (ev) => { ev.stopPropagation(); openCostModal(m.runId); };
      node.appendChild(chip);
    }

    // build EN VIVO: botón "📸 Resumir" — genera una foto del avance A DEMANDA
    // (Haiku). Antes se relanzaba solo cada 10s; ahora solo cuando Tie lo pide.
    if (m.live) {
      const rb = document.createElement('button');
      rb.className = 'resume-chip';
      rb.textContent = '📸 Resumir';
      rb.title = 'Generar una foto del avance ahora mismo (resumen Haiku)';
      rb.onclick = async (ev) => {
        ev.stopPropagation();
        rb.disabled = true; rb.textContent = '📸 Resumiendo…';
        try {
          const res = await fetch('/api/chats/' + active + '/resumir-build', {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ msgId: m.id }),
          });
          const j = await res.json().catch(() => ({}));
          if (!res.ok) { rb.textContent = '📸 Resumir'; rb.disabled = false; if (j.error) alert(j.error); return; }
          if (j.note) alert(j.note);
          lastSig = ''; refreshThread();
        } catch (e) { rb.textContent = '📸 Resumir'; rb.disabled = false; alert('No se pudo resumir: ' + e.message); }
      };
      node.appendChild(rb);
      // ticker EN VIVO: "arrancado a las HH:MM · último ping hace Xs". Los timestamps
      // vienen del servidor (liveStartedAt/livePingAt); el navegador cuenta los
      // segundos solo, cada segundo (no un número congelado).
      if (m.livePingAt) {
        const tk = document.createElement('div');
        tk.className = 'live-ticker';
        if (m.liveStartedAt) tk.dataset.started = String(m.liveStartedAt);
        tk.dataset.ping = String(m.livePingAt);
        updateTicker(tk);
        node.appendChild(tk);
      }
    }

    // PREGUNTA de un agente: si nadie (Tie) le ha colgado respuesta, está esperando
    // → resáltala y ofrece la caja para contestar (la herramienta MCP está bloqueada
    // esperando justo esto). Cuando respondas, el agente la recibe y sigue.
    if (m.type === 'pregunta') {
      bubble.classList.add('pregunta');
      const answered = (byParent.get(m.id) || []).some((k) => k.author === 'tie');
      if (!answered) { bubble.classList.add('pregunta-pendiente'); node.appendChild(makeAnswerBox(m)); }
    }

    const kids = byParent.get(m.id) || [];
    if (kids.length) {
      const c = document.createElement('div');
      const isFork = kids.length > 1;
      // reddit: TODAS las respuestas expuestas a la vez (sin navegador ‹n/m›). Si
      // hay bifurcación (o este nodo ya es un diente de una de arriba), el grupo
      // se sangra y se marca con la línea del hilo; cada hermana es a su vez un
      // diente, así su propia continuación también se sangra.
      c.className = 'children' + (isFork || isProng ? ' branch' : '');
      for (const k of kids) c.appendChild(renderNode(k, byParent, isFork));
      node.appendChild(c);
    }
    return node;
  }

  function makeSkeletonBubble() {
    const bubble = document.createElement('div');
    bubble.className = 'bubble other skeleton-wrap';
    for (const w of [72, 92, 54]) {
      const line = document.createElement('div');
      line.className = 'skeleton';
      line.style.width = w + '%';
      bubble.appendChild(line);
    }
    return bubble;
  }

  // Caja para responder a una pregunta de un agente (la herramienta MCP espera).
  function makeAnswerBox(m) {
    const box = document.createElement('div'); box.className = 'answer-box';
    const ta = document.createElement('textarea'); ta.className = 'answer-input';
    ta.placeholder = 'Tu respuesta para ' + nameOf(m.author) + ' (está esperando)…';
    ta.onclick = (e) => e.stopPropagation();
    const btn = document.createElement('button'); btn.className = 'td-btn'; btn.textContent = '↩ Responder';
    btn.onclick = (e) => { e.stopPropagation(); responderPregunta(m.id, ta.value); };
    // Ctrl/⌘+Enter envía
    ta.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); responderPregunta(m.id, ta.value); }
    });
    box.append(ta, btn);
    return box;
  }

  async function responderPregunta(qId, text) {
    text = String(text || '').trim();
    if (!text) { alert('Escribe una respuesta.'); return; }
    if (!active) return;
    let res, j;
    try {
      res = await fetch('/api/chats/' + active + '/preguntas/' + qId + '/responder', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text }),
      });
      j = await res.json();
    } catch { alert('No se pudo enviar la respuesta.'); return; }
    if (!res.ok) { alert('No se pudo enviar: ' + (j.error || 'error')); return; }
    lastSig = ''; refreshThread();
  }

  const THINKING_ID = '__thinking__';

  function renderThread(chat) {
    lastChat = chat;
    const real = (chat.messages || []).filter((m) => !m.collapsed);
    // F22: SIEMPRE hay un rey. Si no había selección (o el rey desapareció tras
    // compactar/borrar), cae al último mensaje real — el que naturalmente
    // responderías/discutirías.
    // EXCEPCIÓN (modo tarea): si hay tarea abierta, selectedId == null es un estado
    // legítimo = "el rey es la definición de Aubé". No lo pisamos con el último
    // mensaje; solo recuperamos un rey-mensaje si el que había desapareció.
    const reyVivo = real.some((m) => m.id === selectedId);
    if (real.length && (selectedId == null || !reyVivo)) {
      // en modo tarea con selectedId==null el rey es la def: no rellenar.
      if (!currentTarea || (selectedId != null && !reyVivo)) {
        selectedId = real[real.length - 1].id;
      }
    }
    if (titleEl.getAttribute('contenteditable') !== 'true') {
      currentTitle = chat.title;
      titleEl.textContent = chat.title;
    }

    const present = new Set(real.map((m) => m.id));
    const msgs = real.slice();
    // un fantasma por personaje en vuelo (cada uno cuelga de su parent si sigue vivo).
    for (const p of pendings) {
      const parent = (p.parent != null && present.has(p.parent)) ? p.parent : null;
      msgs.push({ id: THINKING_ID + ':' + p.author, author: p.author, type: 'pensando', replyTo: parent, thinking: true, text: '' });
    }

    if (!msgs.length) {
      threadEl.innerHTML = '<div class="placeholder">Hilo vacío. Escribe abajo y pulsa Enviar u Opinión de Iris.</div>';
      updateSelectionUI();
      return;
    }
    const byParent = new Map();
    for (const m of msgs) {
      const k = (m.replyTo != null && present.has(m.replyTo)) ? m.replyTo : 'root';
      if (!byParent.has(k)) byParent.set(k, []);
      byParent.get(k).push(m);
    }
    const roots = byParent.get('root') || [];
    threadEl.innerHTML = '';
    // aviso global arriba: ¿hay preguntas de agentes esperando tu respuesta?
    const pendientes = msgs.filter((m) => m.type === 'pregunta'
      && !msgs.some((x) => x.author === 'tie' && Number(x.replyTo) === Number(m.id)));
    if (pendientes.length) {
      const b = document.createElement('div'); b.className = 'pregunta-banner';
      b.textContent = '⚠ ' + pendientes.length + (pendientes.length === 1 ? ' pregunta espera' : ' preguntas esperan') + ' tu respuesta — pulsa para ir a ella';
      b.onclick = () => { const el = threadEl.querySelector('.bubble.pregunta-pendiente'); if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' }); };
      threadEl.appendChild(b);
    }
    const frag = document.createDocumentFragment();
    const rootsAreProngs = roots.length > 1;
    for (const r of roots) frag.appendChild(renderNode(r, byParent, rootsAreProngs));
    threadEl.appendChild(frag);
    // el scroll vive ahora en el carril que envuelve ficha + hilo (centerScroll).
    const cs = document.getElementById('centerScroll');
    if (cs) cs.scrollTop = cs.scrollHeight;
    updateSelectionUI();
  }

  // ── F22: selección (el rey) + scope universal ───────────────────────────────
  function findMsg(id) {
    if (id == null || !lastChat) return null;
    return (lastChat.messages || []).find((m) => m.id === id) || null;
  }

  // Devuelve el id del PRIMER mensaje raíz real (en orden cronológico) = el hilo
  // principal. Raíz = mensaje real sin replyTo, o cuyo padre ya no está presente.
  function firstMsgId() {
    if (!lastChat) return null;
    const real = (lastChat.messages || []).filter((m) => !m.collapsed);
    if (!real.length) return null;
    const present = new Set(real.map((m) => m.id));
    const roots = real.filter((m) => m.replyTo == null || !present.has(m.replyTo));
    const first = (roots.length ? roots : real)[0];
    return first ? first.id : null;
  }

  function selectMsg(id) {
    if (selectedId === id) {
      // Re-clic sobre el rey actual: "salimos" del sub-hilo.
      // En modo tarea, salir aterriza en la DEF de Aubé (selectedId = null), que es
      // la verdadera raíz del hilo. En conversación, volvemos al primer mensaje.
      if (currentTarea) {
        selectedId = null;
        if (lastChat) renderThread(lastChat); else updateSelectionUI();
        return;
      }
      const first = firstMsgId();
      if (first != null && first !== id) {
        selectedId = first;
        if (lastChat) renderThread(lastChat); else updateSelectionUI();
      }
      return; // en conversación siempre hay un rey: no se deselecciona
    }
    selectedId = id;
    if (lastChat) renderThread(lastChat); else updateSelectionUI();
  }

  // Pinta la barra de selección: qué es el rey, sus acciones propias (editar /
  // compactar / aprobar según el autor) y resalta el scope activo.
  function updateSelectionUI() {
    const m = findMsg(selectedId);
    selInfo.innerHTML = '';
    selActs.innerHTML = '';
    if (m) {
      const lbl = document.createElement('span');
      lbl.innerHTML = 'Sobre <span class="king">👑 #' + m.id + ' · ' + nameOf(m.author) + '</span>';
      selInfo.appendChild(lbl);
      const prev = document.createElement('span');
      prev.className = 'preview';
      prev.textContent = '“' + (m.text || '').replace(/\s+/g, ' ').slice(0, 60) + '”';
      selInfo.appendChild(prev);

      // acciones propias del mensaje rey
      selActs.appendChild(selActBtn('Editar', () => startEdit(m)));
      if (m.author === 'anselmo') selActs.appendChild(selActBtn('Compactar', () => compactar(m.id), true));
      if (m.author === 'aube') selActs.appendChild(selActBtn('Aprobar', () => aprobarTarea(), true));
      // "Subir a master" YA NO cuelga del informe de Miguel aquí: se perdía con el
      // scroll. Ahora vive en la barra fija de acciones (renderTareaDef), siempre a
      // la vista encima del input.
    } else if (currentTarea) {
      // Modo tarea sin rey-mensaje: el rey es la DEF de Aubé. La barra lo anuncia.
      const lbl = document.createElement('span');
      lbl.innerHTML = 'Sobre <span class="king">👑 la tarea · Aubé</span>';
      selInfo.appendChild(lbl);
      const prev = document.createElement('span');
      prev.className = 'preview';
      prev.textContent = '“' + (currentTarea.body || '').replace(/\s+/g, ' ').slice(0, 60) + '”';
      selInfo.appendChild(prev);
      // acciones de la def (aprobar plan, etc.): si hay plan sin aprobar, ofrécelo.
      if (currentTarea.plan && !currentTarea.plan.aprobado) {
        selActs.appendChild(selActBtn('Aprobar plan', () => aprobarPlan(currentTarea.id), true));
      }
    } else {
      const lbl = document.createElement('span');
      lbl.innerHTML = active ? 'Escribe abajo para empezar el hilo'
                             : 'Elige una conversación a la izquierda';
      selInfo.appendChild(lbl);
    }

    for (const b of scopeSeg.querySelectorAll('.scope-btn')) {
      b.classList.toggle('active', b.dataset.scope === scope);
    }
  }

  function selActBtn(label, fn, special) {
    const b = document.createElement('button');
    b.className = 'sel-act' + (special ? ' special' : '');
    b.textContent = label;
    b.onclick = fn;
    return b;
  }

  for (const b of scopeSeg.querySelectorAll('.scope-btn')) {
    b.onclick = () => {
      scope = b.dataset.scope;
      // si pide mensaje/hilo sin rey, el scope se aplicará al último mensaje.
      updateSelectionUI();
    };
  }

  // El objetivo (targetId) de las acciones de agente: el rey si lo hay, si no el
  // último mensaje del hilo (los endpoints siempre necesitan un mensaje válido).
  function actionTarget() {
    if (selectedId != null && findMsg(selectedId)) return selectedId;
    return lastMsgId();
  }
  function lastMsgId() {
    const ms = ((lastChat && lastChat.messages) || []).filter((m) => !m.collapsed);
    return ms.length ? ms[ms.length - 1].id : null;
  }

  // ── borrar UN mensaje ────────────────────────────────────────────────────────
  // Si el mensaje tiene descendientes (otros le responden por replyTo, es raíz de un
  // sub-hilo) preguntamos: borrar TODO el hilo en cascada (cascade=true) o solo este
  // mensaje y re-colgar sus hijos del padre (cascade=false). Si es una hoja (sin
  // descendientes), se borra directo con confirm(). El back solo obedece el flag.
  async function borrarMensaje(m) {
    const msgs = (lastChat && lastChat.messages) || [];
    const hijos = msgs.filter((x) => x.replyTo === m.id);   // descendientes directos
    let cascade = false;
    if (hijos.length) {
      const todo = confirm('Este mensaje tiene ' + hijos.length + ' respuesta(s) colgando.\n\n'
        + 'Aceptar → borrar TODO el hilo en cascada.\n'
        + 'Cancelar → borrar SOLO este mensaje (los hijos se re-cuelgan del padre).');
      cascade = todo ? true : false;
    } else {
      if (!confirm('¿Borrar este mensaje? Es una hoja, no afecta a nadie.')) return;
    }
    const res = await fetch(`/api/chats/${active}/messages/${m.id}`, {
      method: 'DELETE', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cascade }),
    });
    const j = await res.json().catch(() => ({}));
    if (!res.ok) { alert(j.error || 'No se pudo borrar.'); return; }
    aplicarBorrado(j);
  }

  // Aplica { removed, reparented } al estado local y re-renderiza: limpia fantasmas
  // colgados de un mensaje borrado y suelta el rey si era uno de los borrados.
  function aplicarBorrado(j) {
    const fuera = new Set(j.removed || []);
    if (lastChat) {
      lastChat.messages = (lastChat.messages || []).filter((x) => !fuera.has(x.id));
      for (const r of (j.reparented || [])) {
        const mm = lastChat.messages.find((x) => x.id === r.id);
        if (mm) mm.replyTo = r.replyTo;
      }
    }
    pendings = (pendings || []).filter((p) => !fuera.has(p.parent));
    if (fuera.has(selectedId)) selectedId = null;
    lastSig = ''; refreshThread();
  }

  // ── editar ───────────────────────────────────────────────────────────────────
  function startEdit(m) {
    editTarget = m.id;
    inputEl.value = m.text;
    banner.style.display = 'block';
    banner.innerHTML = 'Editando <b>#' + m.id + '</b><a id="confEdit">confirmar</a><a id="cancEdit">cancelar</a>';
    banner.querySelector('#confEdit').onclick = confirmEdit;
    banner.querySelector('#cancEdit').onclick = cancelEdit;
    inputEl.focus();
  }
  function cancelEdit() {
    editTarget = null;
    inputEl.value = '';
    banner.style.display = 'none';
    banner.innerHTML = '';
  }
  async function confirmEdit() {
    if (editTarget == null || !active) return;
    const text = inputEl.value.trim();
    if (!text) return;
    const msgId = editTarget;
    const res = await fetch('/api/chats/' + active + '/edit', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ msgId, text }),
    });
    if (!res.ok) { alert('No se pudo editar.'); return; }
    cancelEdit();
    lastSig = ''; refreshThread();
  }

  // ── enviar (Tie escribe) ──────────────────────────────────────────────────────
  // charlar/responder cuelgan del REY si hay uno seleccionado (replyTo), si no, raíz.
  async function responder() {
    if (editTarget != null) return confirmEdit();
    const text = inputEl.value.trim();
    if (!text || !active) return;
    const res = await fetch('/api/chats/' + active + '/responder', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, replyTo: selectedId }),
    });
    if (!res.ok) { alert('No se pudo enviar.'); return; }
    inputEl.value = '';
    lastSig = ''; refreshThread();  // punto final: nadie contesta
  }

  async function charlar() {
    if (editTarget != null) return confirmEdit();
    const text = inputEl.value.trim();
    if (!active) return;
    // target de Iris: el rey si lo hay; si no, y sin texto, el ÚLTIMO mensaje del hilo
    // (Iris opina sobre lo último — p.ej. responde a William). Así "Siguiente paso:
    // Iris" y el botón sin selección ya no se quedan mudos. Solo se aborta si el chat
    // está REALMENTE vacío (ni texto, ni rey, ni mensajes).
    const replyTo = (selectedId != null) ? selectedId : (text ? null : lastMsgId());
    if (!text && replyTo == null) return;
    btnCharlar.disabled = true;
    const res = await fetch('/api/chats/' + active + '/charla', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, replyTo, scope }),
    });
    btnCharlar.disabled = false;
    if (await apagadoEnCurso(res, () => charlar())) return;
    if (!res.ok) { alert('No se pudo enviar.'); return; }
    const j = await res.json().catch(() => ({}));
    inputEl.value = '';
    addPending('iris', j.pendingParent != null ? j.pendingParent
      : (j.message && j.message.id != null ? j.message.id : null));
    lastSig = ''; refreshThread();
  }

  // ── acciones de agente sobre (target, scope) ────────────────────────────────
  // Convención común del contrato: body { scope, targetId, steer } → 202 { pendingParent }.
  // `steer` = lo que tengas escrito en la caja. El servidor lo PUBLICA como un
  // mensaje de Tie colgando del rey (ya no se pierde como susurro silencioso) y
  // devuelve en `pendingParent` el id de ESE mensaje, para que el fantasma y la
  // réplica del agente aterricen bajo él (cadena rey → texto-de-Tie → respuesta).
  // Se consume (se vacía la caja) al enviarse.
  async function spikeAction(path, author) {
    if (!active) return;
    const targetId = actionTarget();
    if (targetId == null && !currentTarea) { alert('No hay ningún mensaje sobre el que actuar. Escribe algo primero.'); return; }
    const steer = inputEl.value.trim();
    const res = await fetch('/api/chats/' + active + '/' + path, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ scope, targetId, steer }),
    });
    if (!res.ok) { alert('No se pudo lanzar.'); return; }
    const j = await res.json().catch(() => ({}));
    if (steer) inputEl.value = '';
    addPending(author, j.pendingParent != null ? j.pendingParent : targetId);
    lastSig = ''; refreshThread();
  }

  // Challenge usa el mismo (target, scope, steer). El motor cuelga la respuesta del objetivo.
  async function challengeAction() {
    if (!active) return;
    const targetId = actionTarget();
    if (targetId == null && !currentTarea) { alert('No hay ningún mensaje que cuestionar.'); return; }
    const steer = inputEl.value.trim();
    const res = await fetch('/api/chats/' + active + '/challenge', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ targetId, scope, steer }),
    });
    if (!res.ok) { alert('No se pudo lanzar el challenge.'); return; }
    const j = await res.json().catch(() => ({}));
    if (steer) inputEl.value = '';
    addPending('william', j.pendingParent != null ? j.pendingParent : targetId);
    lastSig = ''; refreshThread();
  }

  // ── Discutir: Romina y Ariel, turno a turno ──────────────────────────────────
  // Genera UN solo mensaje. Si el rey NO es de la pareja, se elige autor y lado
  // al AZAR. Si el rey YA es de la pareja, salta EL OTRO con el lado CONTRARIO.
  // La réplica cuelga del rey (cadena) y la selección salta a ella, así el
  // siguiente Discutir lo coge el otro y la pelea sigue mientras pulses.
  async function discutir() {
    if (!active) return;
    const targetId = actionTarget();
    if (targetId == null && !currentTarea) { alert('No hay nada sobre lo que discutir.'); return; }
    const king = findMsg(targetId);
    let author, stance;
    const flip = (s) => (s === 'defiende' ? 'rechaza' : s === 'rechaza' ? 'defiende' : null);
    if (king && (king.author === 'romina' || king.author === 'ariel')) {
      author = king.author === 'romina' ? 'ariel' : 'romina';        // el otro de la pareja
      stance = flip(king.stance) || (Math.random() < 0.5 ? 'defiende' : 'rechaza'); // el lado contrario
    } else {
      author = Math.random() < 0.5 ? 'romina' : 'ariel';             // azar
      stance = Math.random() < 0.5 ? 'defiende' : 'rechaza';         // azar
    }
    const steer = inputEl.value.trim();
    const res = await fetch('/api/chats/' + active + '/discutir', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ scope, targetId, author, stance, steer }),
    });
    if (!res.ok) { alert('No se pudo lanzar la discusión.'); return; }
    const j = await res.json().catch(() => ({}));
    if (steer) inputEl.value = '';
    addPending(author, j.pendingParent != null ? j.pendingParent : targetId);
    selectAfterReplyAuthor = author;   // al llegar SU réplica, el rey salta a ella
    lastSig = ''; refreshThread();
  }

  // ── Anselmo (resumir) + compactar ────────────────────────────────────────────
  async function anselmo() {
    if (!active) return;
    const steer = inputEl.value.trim();   // lo escrito (o el pantallazo): susurro, no se pierde
    const res = await fetch('/api/chats/' + active + '/anselmo', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ steer }),
    });
    if (!res.ok) { alert('No se pudo resumir.'); return; }
    const j = await res.json().catch(() => ({}));
    if (steer) inputEl.value = '';
    addPending('anselmo', j.pendingParent != null ? j.pendingParent : lastMsgId());
    lastSig = ''; refreshThread();
  }
  async function compactar(noteId) {
    if (!active) return;
    const res = await fetch('/api/chats/' + active + '/compactar', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ noteId }),
